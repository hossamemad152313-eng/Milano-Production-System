<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MILANO SPORT SHOES | Production System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  @media print{
    /* ورقة A4، هوامش صغيرة ومتساوية على كل الجهات (الاتجاه بيتغير ديناميكيًا عن طريق setPrintLandscape) */
    @page{ size:A4; margin:8mm; }
    html, body{ background:#fff !important; margin:0 !important; padding:0 !important; }
    /* إخفاء كل حاجة غير التقرير، واستخدام العرض الكامل للصفحة */
    body.print-rank-only{
      display:block !important;
      min-height:auto !important;
      margin:0 !important;
      padding:0 !important;
      background:#fff !important;
    }
    #print-rank-output .print-header{ page-break-inside: avoid; break-inside: avoid; page-break-after: avoid; break-after: avoid; }
      body.print-rank-only .phone{ display:none !important; }
    body.print-rank-only #print-rank-output{
      display:block !important;
      width:100% !important;
      max-width:100% !important;
      margin:0 !important;
      padding:0 !important;
    }
    body:not(.print-rank-only) #print-rank-output{ display:none !important; }
    #login-view, header.top .logout-btn, .tabs, .filters, .add-row-btn, .save-btn, footer.tag, .search-box { display:none !important; }
    .phone{ background:#fff !important; box-shadow:none !important; max-width:100% !important; }
    /* منع قطع الصفوف/الكروت بين الصفحات */
    .worker-card{ break-inside:avoid; page-break-inside:avoid; }
    #print-rank-output table{ page-break-inside:avoid; break-inside:avoid; }
    #print-rank-output tr{ break-inside:avoid; page-break-inside:avoid; }
    #print-rank-output .dt-card, #print-rank-output .hp-card{ break-inside:avoid; page-break-inside:avoid; }
    #print-rank-output .print-sheet{ min-height:auto !important; }
    /* الحفاظ على الألوان والخلفيات في الطباعة (Chrome/Edge) */
    #print-rank-output, #print-rank-output *{
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
      color-adjust:exact !important;
    }
    /* محاذاة عربية RTL أثناء الطباعة */
    #print-rank-output{ direction:rtl !important; }
  }
  #print-rank-output{ display:none; padding:24px; font-family:'Cairo',sans-serif; direction:rtl; text-align:center; color:#000; }
  #print-rank-output .print-sheet{ min-height:100%; width:100%; box-sizing:border-box; }
  #print-rank-output .print-header{ margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #E7DCCF; }
  #print-rank-output .print-header-top{ font-size:12px; color:#777; margin-bottom:6px; }
  /* صف العنوان: الاسم واسم الأدمن جنب بعض بالـflex؛ لو المساحة ضاقت، flex-wrap بيرجّع اسم الأدمن سطر تحت تلقائيًا بدون أي كود إضافي */
  #print-rank-output .print-title-row{ display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:2px 10px; margin-bottom:4px; }
  #print-rank-output .print-title{ font-size:20px; font-weight:800; }
  #print-rank-output .print-admin-tag{ font-size:9px; font-weight:600; color:#8A8A8A; white-space:nowrap; letter-spacing:.03em; }
  #print-rank-output .print-period{ font-size:13px; color:#333; }
  #print-rank-output .print-body{ margin-bottom:6px; }
  #print-rank-output h2{ font-size:20px; margin-bottom:4px; text-align:center; font-weight:800; }
  #print-rank-output h3{ font-size:14px; color:#333; margin-bottom:16px; font-weight:700; text-align:center; }
  #print-rank-output table{
    width:auto; min-width:75%; max-width:100%; border-collapse:separate; border-spacing:0; border:1px solid #D7CAB8;
    margin:0 auto 24px; box-shadow:0 10px 30px rgba(0,0,0,.08); border-radius:18px; overflow:hidden;
  }
  #print-rank-output th, #print-rank-output td{
    border-bottom:1px solid #E4D9C8; padding:12px 14px; font-size:13px; font-weight:600; text-align:center; color:#1F1F1F;
  }
  #print-rank-output th{
    background:#F8EFE1; font-weight:800; font-size:14px; color:#2A2A2A;
  }
  #print-rank-output td{
    background:#FFFFFF;
  }
  #print-rank-output tr:nth-child(even) td{ background:#FBF7F1; }
  #print-rank-output tr:last-child td{ border-bottom:none; }
  #print-rank-output tr:first-child th:first-child{ border-top-left-radius:18px; }
  #print-rank-output tr:first-child th:last-child{ border-top-right-radius:18px; }
  #print-rank-output tr:last-child td:first-child{ border-bottom-left-radius:18px; }
  #print-rank-output tr:last-child td:last-child{ border-bottom-right-radius:18px; }
  #print-rank-output .total-row td{ background:#F4E7D3; font-weight:800; }
  #print-rank-output table.print-onepage th, #print-rank-output table.print-onepage td{
    padding:10px 14px; font-size:13px;
  }
  #print-rank-output table.hall-grouped-table{ min-width:94%; }
  #print-rank-output table.hall-grouped-table th, #print-rank-output table.hall-grouped-table td{
    font-size:15px; padding:11px 12px; font-weight:700;
  }
  #print-rank-output table.hall-grouped-table th{ font-size:15.5px; }

  /* ---------- طباعة قوة الصالة: شبكة كروت (3 في الصف) صفحة واحدة لاند سكيب ---------- */
  /* ملحوظة: Flexbox مش Grid، عشان الطباعة (Chrome/Edge) بتوزّع صفوف الـ Flex على الصفحات صح
     وبتملأ أي مساحة فاضية باقية في آخر الورقة، بعكس CSS Grid اللي بيقفز بالصف الناقص لصفحة جديدة */
  #print-rank-output .hp-grid{
    display:flex; flex-wrap:wrap; justify-content:center; align-content:flex-start;
    gap:9px; direction:rtl; margin:0 auto; width:100%; box-sizing:border-box;
  }
  #print-rank-output .hp-grid.hp-grid-single{ max-width:300px; }
  #print-rank-output .hp-card{
    flex:0 0 calc(33.333% - 6px); max-width:calc(33.333% - 6px); box-sizing:border-box;
    border:2px solid var(--amber); border-radius:10px; overflow:hidden; break-inside:avoid; page-break-inside:avoid; background:#fff;
  }
  #print-rank-output .hp-grid.hp-grid-single .hp-card{ flex:0 0 100%; max-width:100%; }
  #print-rank-output .hp-card-head{
    background:#F8EFE1; color:#C7841C; font-weight:800; font-size:13.5px; text-align:center;
    padding:6px 4px; border-bottom:2px solid #E7A335;
  }
  #print-rank-output .hp-card table{
    width:100%; border-collapse:collapse; box-shadow:none; border-radius:0; margin:0; border:none; min-width:0;
  }
  #print-rank-output .hp-card th, #print-rank-output .hp-card td{
    border:1px solid #E4D9C8; padding:4.5px 3px; font-size:11px; font-weight:700; text-align:center;
  }
  #print-rank-output .hp-card th{ background:#FBF3E4; font-size:10.5px; font-weight:800; color:#2A2A2A; }
  #print-rank-output .hp-card tr.hp-total td{ background:#F4E7D3; font-weight:800; }
  #print-rank-output .hp-grand-total{
    flex:0 0 100%; max-width:100%; margin-top:8px; background:var(--navy); color:#fff; border-radius:10px;
    padding:9px 16px; display:flex; justify-content:space-around; flex-wrap:wrap; gap:6px;
    font-weight:800; font-size:13px;
  }

  /* ---------- طباعة تفاصيل التارجت: جدول لكل خط، شبكة جدولين في الصف (زي Excel)، بأحجام كبيرة تملأ الـA4 ---------- */
  /* الأحجام دي متغيرات CSS عشان لو المحتوى طويل نقدر نصغّرها تدريجيًا (خطوات) عشان تتظبط في صفحة واحدة
     من غير ما نلجأ لـ transform:scale إلا لو الخطوات دي كلها مش كفاية (آخر حل) */
  #print-rank-output .print-sheet{
    --dt-font: 14px;
    --dt-head-font: 13.5px;
    --dt-pad-v: 8px;
    --dt-pad-h: 6px;
    --dt-gap: 14px;
  }
  #print-rank-output .dt-grid{
    display:grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-auto-rows: minmax(0, auto);
    gap:var(--dt-gap);
    direction:rtl;
    margin:0 auto 10px;
    width:100%;
    max-width:100%;
    box-sizing:border-box;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  #print-rank-output .print-body .dt-grid:first-of-type{
    page-break-before: avoid;
    break-before: avoid;
  }
  #print-rank-output .dt-card{
    width:100%;
    max-width:100%;
    min-height:260px;
    box-sizing:border-box;
    border:2px solid var(--amber);
    border-radius:10px;
    overflow:hidden;
    break-inside:avoid;
    page-break-inside:avoid;
    background:#fff;
    display:flex;
    flex-direction:column;
  }
  #print-rank-output .dt-grid > .dt-card:nth-child(-n+2){
    min-height:300px;
  }
  #print-rank-output .dt-card:last-child:nth-child(odd){
    grid-column: 1 / -1;
    width:100%;
    max-width:100%;
  }
  #print-rank-output .dt-card-head{
    background:#F8EFE1;
    color:#C7841C;
    font-weight:800;
    font-size:var(--dt-head-font);
    text-align:center;
    padding:8px 6px;
    border-bottom:2px solid #E7A335;
  }
  #print-rank-output .dt-card table{
    width:100%;
    height:100%;
    border-collapse:collapse;
    box-shadow:none;
    border-radius:0;
    margin:0;
    border:none;
    min-width:0;
    table-layout: fixed;
  }
  #print-rank-output .dt-card th, #print-rank-output .dt-card td{
    border:1px solid #E4D9C8;
    padding:calc(var(--dt-pad-v) + 2px) calc(var(--dt-pad-h) + 2px);
    font-size:var(--dt-font);
    font-weight:700;
    text-align:center;
    word-break:break-word;
  }
  #print-rank-output .dt-card th:first-child,
  #print-rank-output .dt-card td:first-child{
    width:40%;
  }
  #print-rank-output .dt-card th:not(:first-child),
  #print-rank-output .dt-card td:not(:first-child){
    width:20%;
  }
  #print-rank-output .dt-card th{ background:#FBF3E4; font-size:calc(var(--dt-font) - 0.5px); font-weight:800; color:#2A2A2A; }
  #print-rank-output .dt-card tr.dt-total td{ background:#F4E7D3; font-weight:800; }
  :root{
    --navy:#12161F;
    --navy-2:#1D2433;
    --paper:#F4F1EC;
    --amber:#E7A335;
    --amber-dark:#C7841C;
    --green:#3E8F63;
    --red:#C24B37;
    --line:#DAD4C6;
    --muted:#6D7280;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:'Cairo', sans-serif; background: var(--paper); color: var(--navy); min-height:100vh; display:flex; justify-content:center; }
  .phone{ width:100%; max-width:460px; min-height:100vh; background:#fff; position:relative; box-shadow:0 0 40px rgba(0,0,0,.08); display:flex; flex-direction:column; }
  .num{ font-family:'JetBrains Mono', monospace; font-weight:700; }

  /* ---------- LOGIN ---------- */
  #login-view{
    flex:1; background: radial-gradient(circle at 30% 0%, #232C43 0%, var(--navy) 55%); color:#fff;
    display:flex; flex-direction:column; justify-content:center; padding:34px 28px; position:relative; overflow:hidden;
  }
  #login-view::before{
    content:""; position:absolute; inset:-20%;
    background-image: repeating-linear-gradient(115deg, rgba(231,163,53,.07) 0 3px, transparent 3px 34px);
    pointer-events:none;
  }
  #login-view::after{
    content:""; position:absolute; width:340px; height:340px; border-radius:50%;
    background: radial-gradient(circle, rgba(231,163,53,.16), transparent 70%);
    top:-120px; left:-100px; pointer-events:none;
  }
  .logo-block{ position:relative; z-index:2; margin-bottom:36px; }
  .sneaker-icon{ width:150px; height:auto; display:block; margin-bottom:10px; filter:drop-shadow(0 4px 10px rgba(231,163,53,.25)); }
  .logo-stripe{ width:44px; height:5px; background:var(--amber); border-radius:3px; margin-bottom:14px; transform:skewX(-20deg); }
  .logo-word{ font-family:'Oswald', sans-serif; font-size:34px; font-weight:700; letter-spacing:.03em; line-height:1; }
  .logo-word span{ color:var(--amber); }
  .logo-sub{ font-family:'Oswald', sans-serif; font-size:13px; letter-spacing:.5em; color:#9CA3B5; margin-top:6px; }
  .logo-caption{ font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.12em; color:#6E7690; margin-top:14px; }

  .field{ margin-bottom:16px; position:relative; z-index:2; }
  .field label{ display:block; font-size:12px; color:#B9BFCF; margin-bottom:6px; }
  .field select, .field input{
    width:100%; padding:13px 14px; border-radius:10px; border:1px solid #3A4257; background:#1B2233; color:#fff;
    font-family:'Cairo', sans-serif; font-size:15px;
  }
  .field select:focus, .field input:focus{ outline:2px solid var(--amber); }
  .btn-primary{
    width:100%; padding:14px; border:none; border-radius:10px; background: linear-gradient(90deg,var(--amber),var(--amber-dark));
    color: var(--navy); font-family:'Cairo', sans-serif; font-weight:800; font-size:15px; cursor:pointer; margin-top:8px; position:relative; z-index:2;
  }
  .btn-primary:active{ transform: translateY(1px); }
  .login-err{ color:#F3A9A0; font-size:13px; margin-top:10px; min-height:16px; position:relative; z-index:2; }
  .login-foot{
    margin-top:30px; font-size:10.5px; color:#6E7690; letter-spacing:.05em; border-top:1px dashed #333B50; padding-top:14px;
    position:relative; z-index:2; font-family:'JetBrains Mono',monospace;
  }

  /* ---------- APP SHELL ---------- */
  #app-view{ display:none; flex:1; flex-direction:column; }
  header.top{ background: var(--navy); color:#fff; padding:16px 18px 0; position:sticky; top:0; z-index:20; }
  header.top .row1{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;}
  header.top .hall-name{ font-size:17px; font-weight:800; }
  header.top .hall-sub{ font-size:10.5px; color:#9CA3B5; font-family:'JetBrains Mono',monospace; margin-top:2px; }
  .logout-btn{ background:none; border:1px solid #3A4257; color:#B9BFCF; font-family:'Cairo',sans-serif; font-size:11px; padding:7px 12px; border-radius:20px; cursor:pointer; }
  .tabs{ display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab-btn{
    flex:0 0 auto; min-width:84px; text-align:center; background:none; border:none; color:#8891A4; font-family:'Cairo',sans-serif; font-size:12.5px;
    font-weight:700; padding:11px 8px; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap;
  }
  .tab-btn.active{ color:var(--amber); border-bottom-color:var(--amber); }

  main{ padding:16px 14px 40px; flex:1; }

  .card-box{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:14px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .filters label{ font-size:10.5px; color:var(--muted); display:block; margin-bottom:4px; font-weight:600;}
  .filters input, .filters select, .rowcard select, .rowcard input{
    width:100%; padding:9px 10px; border-radius:8px; border:1px solid var(--line); font-family:'Cairo',sans-serif; font-size:13px; background:#FBFAF7;
  }
  .filters .full{ grid-column:1/-1; margin-top:10px; }
  .apply-btn{ width:100%; padding:11px; border:none; border-radius:9px; background:var(--navy); color:#fff; font-weight:700; font-size:14px; cursor:pointer; margin-top:12px; }
  .btn-amber{ background:linear-gradient(90deg,var(--amber),var(--amber-dark)); color:var(--navy); }
  .data-note{ font-size:10px; color:var(--muted); margin-top:8px; text-align:center; }

  .summary-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .kpi{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 13px; }
  .kpi .lbl{ font-size:10.5px; color:var(--muted); margin-bottom:5px; }
  .kpi .val{ font-size:18px; }
  .kpi .sub{ font-size:10.5px; color:var(--muted); margin-top:3px; }
  .kpi.good .val{ color:var(--green); }
  .kpi.bad .val{ color:var(--red); }
  .kpi.amber .val{ color:var(--amber-dark); }

  .perf-bar-wrap{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .perf-bar-wrap .lbl{ font-size:12px; color:var(--muted); margin-bottom:10px; font-weight:700; }
  .track{ height:14px; border-radius:7px; background:repeating-linear-gradient(90deg,#EFEBE1 0 8px,#E6E1D3 8px 9px); overflow:hidden; position:relative; }
  .fill{ height:100%; border-radius:7px; background:linear-gradient(90deg,var(--amber),var(--amber-dark)); transition:width .4s; }
  .track-labels{ display:flex; justify-content:space-between; margin-top:8px; font-size:15px; font-weight:800; }

  .aatal-strip{ display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px; }
  .aatal-chip{ flex:0 0 auto; background:#FBF2DF; border:1px solid #EEDBA8; color:var(--amber-dark); font-size:11px; padding:7px 11px; border-radius:20px; font-weight:700; white-space:nowrap; }

  .section-title{ font-size:13px; font-weight:800; margin:4px 2px 10px; display:flex; justify-content:space-between; align-items:center; }
  .section-title .count{ font-weight:600; color:var(--muted); font-size:11.5px; }

  .search-box{ width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line); font-family:'Cairo',sans-serif; font-size:13px; margin-bottom:10px; background:#fff; }

  .worker-card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:9px; }
  .worker-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; }
  .worker-name{ font-size:13.5px; font-weight:700; }
  .worker-code{ font-size:10.5px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
  .worker-pct{ font-size:16px; padding:4px 10px; border-radius:20px; font-weight:800; }
  .pct-good{ background:#E4F3EA; color:var(--green); }
  .pct-mid{ background:#FDF1DC; color:var(--amber-dark); }
  .pct-bad{ background:#FBE9E5; color:var(--red); }
  .worker-metrics{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:6px; }
  .wm{ background:#FAF9F6; border-radius:8px; padding:6px 7px; text-align:center; }
  .wm .l{ font-size:9.5px; color:var(--muted); }
  .wm .v{ font-size:12.5px; font-weight:700; }
  .wm .p{ font-size:9.5px; color:var(--muted); }
  .worker-lines{ margin-top:4px; font-size:10px; color:var(--muted); }

  .empty-state{ text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }

  .rank-wrap{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .rank-col{ flex:1 1 100%; min-width:0; background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; box-sizing:border-box; }
  .rank-col h4{ font-size:12px; margin-bottom:8px; word-break:break-word; }
  .rank-col.top h4{ color:var(--green); }
  .rank-col.bottom h4{ color:var(--red); }
  .rank-item{ display:flex; flex-wrap:wrap; justify-content:space-between; gap:6px; font-size:11px; padding:6px 0; border-bottom:1px dashed var(--line); min-width:0; }
  .rank-item > div{ min-width:0; }
  .rank-item:last-child{ border-bottom:none; }
  .rank-note{ font-size:10px; color:var(--muted); margin-bottom:10px; text-align:center; }
  .rank-col .jr-metrics{ grid-template-columns:repeat(2,1fr); }
  .cbar-row{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-bottom:8px; font-size:11px; min-width:0; }
  .cbar-label{ min-width:0; flex:1 1 100%; word-break:break-word; }
  .cbar-val{ min-width:0; }
  .chart-box{ width:100%; max-width:100%; overflow:hidden; }

  /* ---------- JARD (الجرد) ---------- */
  .jard-art-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:6px; }
  .jard-art-grid input{ padding:7px 4px; font-size:11.5px; border-radius:7px; border:1px solid var(--line); text-align:center; }
  .jline-card{ background:#fff; border:2px solid var(--amber); border-radius:12px; padding:14px; margin-bottom:14px; }
  .jline-card .rowhead{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .jline-card .rowhead .line-badge{ background:var(--navy); color:#fff; font-weight:800; font-family:'JetBrains Mono',monospace; padding:8px 16px; border-radius:8px; font-size:15px; }

let currentUser = null;

function fmtNum(n){ return Math.round(n).toLocaleString('en-US'); }
// هوامش الطباعة الموحدة (لازم تتطابق مع @page margin و setPrintLandscape)
const PRINT_MARGIN_MM = 8;
const MM_TO_PX = 96 / 25.4; // نفس التحويل اللي المتصفح بيستخدمه لأحجام الطباعة (96dpi)
// بيرجع عرض/ارتفاع منطقة الطباعة الفعلية بالبكسل، بعد خصم الهوامش، حسب اتجاه الورقة
function pageUsablePx(landscape){
  const pageWmm = landscape ? 297 : 210;
  const pageHmm = landscape ? 210 : 297;
  return {
    w: Math.round((pageWmm - PRINT_MARGIN_MM * 2) * MM_TO_PX),
    h: Math.round((pageHmm - PRINT_MARGIN_MM * 2) * MM_TO_PX)
  };
}
function buildPrintLayout(title, periodText, bodyHtml){
  return `
    <div class="print-sheet">
      <div class="print-header">
        <div class="print-header-top">الفترة المحددة</div>
        <div class="print-title-row">
          <span class="print-title">${title}</span>
          <span class="print-admin-tag">HOSSAM EMAD - ADMIN</span>
        </div>
        <div class="print-period">${periodText}</div>
      </div>
      <div class="print-body">${bodyHtml}</div>
    </div>
  `;
}
// بيبدّل اتجاه ورقة الطباعة لـ landscape مؤقتًا وقت الحاجة، وبيرجعها A4 عمودي عادي بعدها
function setPrintLandscape(on){
  let el = document.getElementById('dyn-print-orientation');
  if(!el){ el = document.createElement('style'); el.id = 'dyn-print-orientation'; document.head.appendChild(el); }
  el.textContent = on ? `@media print{ @page{ size:A4 landscape; margin:${PRINT_MARGIN_MM}mm; } }` : '';
}
// بيقيس عرض المحتوى الطبيعي (من غير أي تصغير) عشان يقرر الاتجاه الأنسب للطباعة تلقائيًا
function autoDecideLandscape(sheetEl){
  const prevTransform = sheetEl.style.transform, prevWidth = sheetEl.style.width;
  sheetEl.style.transform = '';
  sheetEl.style.width = 'max-content';
  const naturalWidth = sheetEl.scrollWidth;
  sheetEl.style.transform = prevTransform;
  sheetEl.style.width = prevWidth;
  const portraitUsable = pageUsablePx(false).w;
  return naturalWidth > portraitUsable * 1.02; // لو المحتوى أعرض من ورقة البورتريه بوضوح، استخدم لاندسكيب
}
// نظام طباعة احترافي موحّد (زي تقارير Excel): بيختار الاتجاه (Portrait/Landscape) تلقائيًا حسب عرض المحتوى،
// وبيصغّر التقرير عشان يتظبط في صفحة واحدة قدر الإمكان (زي Fit Sheet on One Page في Excel)
function printReportFitted(title, periodText, bodyHtml, opts={}){
  const container = document.getElementById('print-rank-output');
  container.innerHTML = buildPrintLayout(title, periodText, bodyHtml);
  const sheet = container.querySelector('.print-sheet');
  if(!sheet) return;
  const minScale = opts.minScale != null ? opts.minScale : 0.3;

  sheet.style.transform = '';
  sheet.style.width = '';
  // اظهار مؤقت خارج الشاشة بعرض حر عشان نقيس عرض المحتوى الطبيعي أولاً
  container.style.cssText = `display:block; position:fixed; left:-9999px; top:0; width:max-content; max-width:none;`;
  let landscape = opts.landscape;
  if(landscape == null) landscape = autoDecideLandscape(sheet);
  setPrintLandscape(landscape);

  const { w: usableW, h: usableH } = pageUsablePx(landscape);
  sheet.style.width = usableW + 'px';
  container.style.cssText = `display:block; position:fixed; left:-9999px; top:0; width:${usableW}px;`;
  const contentHeight = sheet.scrollHeight;
  // بنحسب نسبة التكبير/التصغير المطلوبة عشان المحتوى يملا الصفحة بالظبط زي "Fit Sheet on One Page" في Excel:
  // لو المحتوى أطول من الصفحة → نصغّر، ولو أقصر منها (زي طباعة صالة واحدة بخط واحد) → نكبّر عشان ملء الفراغ
  const maxScale = opts.maxScale != null ? opts.maxScale : 4.5; // سقف التكبير — رفعناه عشان المحتوى القليل (صالة بخط واحد) يملا الصفحة فعلاً
  let scale = usableH / Math.max(contentHeight, 1);
  scale = Math.min(maxScale, Math.max(minScale, scale));
  if(Math.abs(scale - 1) > 0.01){
    sheet.style.transform = `scale(${scale})`;
    sheet.style.transformOrigin = 'top center';
    sheet.style.width = (100/scale) + '%';
    sheet.style.marginRight = 'auto';
    sheet.style.marginLeft = 'auto';
  }
  container.style.cssText = '';
  document.body.classList.add('print-rank-only');
  // إجبار المتصفح يحسب التخطيط الجديد (بعد التصغير) قبل ما يفتح الطباعة، عشان مايطبعش الشكل القديم قبل التصغير
  void container.offsetHeight;
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.print();
    });
  });
  setTimeout(()=>{
    document.body.classList.remove('print-rank-only');
    if(sheet){ sheet.style.transform=''; sheet.style.width=''; }
    setPrintLandscape(false);
  }, 800);
}
// ---------- طباعة تفاصيل التارجت: تكبير الجداول + استغلال مساحة الـA4 كاملة + Fit to One Page ----------
// بدل تصغير التقرير كله دفعة واحدة بـ transform:scale (اللي بيسيب فراغات كبيرة)، بنقلل حجم الجداول
// على خطوات (خط + padding) لحد ما تتظبط في صفحة واحدة، وبنستخدم transform:scale في الآخر بس لو
// حتى أصغر خطوة متاحة لسه مش كفاية
const DT_FIT_LEVELS = [

];
function applyDtFitLevel(sheet, lvl){
  sheet.style.setProperty('--dt-font', lvl.font + 'px');
  sheet.style.setProperty('--dt-head-font', lvl.head + 'px');
  sheet.style.setProperty('--dt-pad-v', lvl.padV + 'px');

  setPrintLandscape(landscape);

  const { w: usableW, h: usableH } = pageUsablePx(landscape);
  sheet.style.width = usableW + 'px';
  container.style.cssText = `display:block; position:fixed; left:-9999px; top:0; width:${usableW}px;`;

  let fitted = false;
  for(const lvl of DT_FIT_LEVELS){
    applyDtFitLevel(sheet, lvl);
    void sheet.offsetHeight;
    if(sheet.scrollHeight <= usableH){ fitted = true; break; }
  }

  if(!fitted){
    const overflowRatio = sheet.scrollHeight / usableH;
    if(overflowRatio <= 1.08){
      const scale = Math.max(0.9, Math.min(0.95, 1 / overflowRatio));
      sheet.style.transform = `scale(${scale})`;
      sheet.style.transformOrigin = 'top center';
      sheet.style.width = (100/scale) + '%';
      sheet.style.marginRight = 'auto';
      sheet.style.marginLeft = 'auto';
    }
  }

  container.style.cssText = '';
  document.body.classList.add('print-rank-only');
  void container.offsetHeight;
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.print();
    });
  });
  setTimeout(()=>{
    document.body.classList.remove('print-rank-only');
    if(sheet){ sheet.style.transform=''; sheet.style.width=''; }
    setPrintLandscape(false);
  }, 800);
}
function fmtPct(n){ return (n*100).toFixed(1) + '%'; }
function normalizeNumber(value){ const n = parseFloat(String(value).replace(/,/g,'').trim()); return isNaN(n) ? 0 : n; }
function rankLabel(idx){
  const n = idx + 1;
  const unitsOrdinal = ['','الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن','التاسع'];
  const teenUnits = ['','الحادي','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن','التاسع'];
  const tensWords = {10:'العاشر',20:'العشرون',30:'الثلاثون',40:'الأربعون',50:'الخمسون',60:'الستون',70:'السبعون',80:'الثمانون',90:'التسعون'};
  if(n>=1 && n<=9) return unitsOrdinal[n];
  if(n===10) return tensWords[10];
  if(n<100){
    const tens = Math.floor(n/10)*10;
    const units = n%10;
    if(units===0) return tensWords[tens] || `${n}`;
    if(tens===10) return teenUnits[units] + ' عشر';
    return teenUnits[units] + ' و' + (tensWords[tens]||'');
  }
  return `${n}`;
}
function computeTieRankLabels(sortedRows, accessor){
  const labels = [];
  let lastValue = null;
  let lastRank = 0;
  sortedRows.forEach((row, idx) => {
    const value = accessor(row);
    const formatted = fmtPct(value);
    if(idx === 0 || formatted !== lastValue){ lastValue = formatted; lastRank = idx; }
    labels.push(rankLabel(lastRank));
  });
  return labels;
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function experienceText(hireDateStr, asOfStr){
  if(!hireDateStr) return 'تاريخ التعيين غير مسجل';
  const hire = new Date(hireDateStr+'T00:00:00');
  const asOf = new Date(asOfStr+'T00:00:00');
  if(isNaN(hire.getTime())) return 'تاريخ التعيين غير مسجل';
  if(asOf < hire) return 'لسه ما اتعينتش في الفترة دي';
  let years = asOf.getFullYear() - hire.getFullYear();
  let months = asOf.getMonth() - hire.getMonth();
  let days = asOf.getDate() - hire.getDate();
  if(days < 0){ months -= 1; days += new Date(asOf.getFullYear(), asOf.getMonth(), 0).getDate(); }
  if(months < 0){ years -= 1; months += 12; }
  const parts = [];
  if(years>0) parts.push(years + (years===1?' سنة': years===2?' سنتين':' سنين'));
  if(months>0) parts.push(months + (months===1?' شهر': months===2?' شهرين':' شهور'));
  if(days>0) parts.push(days + (days===1?' يوم': days===2?' يومين':' أيام'));
  return parts.length ? parts.join(' و') : 'أقل من يوم';
}

function sortLoginUsers(users){
  const order = {
    'Hossam.Emad': 1,
    'Mai.AbdElmohsen': 2,
    'Head.Dept': 3,
    'Quality.Manager': 4,
    'Technical.Manager': 5,
    'jard.entry': 6,
    'entry': 7,
    'power.entry': 8,
    'Hall.A': 9,
    'Hall.B': 10,
    'Hall.C': 11,
    'Hall.D': 12,
    'Hall.E': 13,
    'Hall.G': 14
  };
  return [...users].sort((a,b) => {
    const pa = order[a.user] ?? 999;
    const pb = order[b.user] ?? 999;
    if(pa !== pb) return pa - pb;
    return (a.label || a.user).localeCompare(b.label || b.user, 'ar');
  });
}
function populateLoginUsers(){
  const sel = document.getElementById('login-user');
  const help = document.getElementById('login-help');
  USERS = SEED_USERS.map(u => ({...u}));

    sel.innerHTML = '<option disabled selected>لا يوجد مستخدمين</option>';
    help.style.display = 'block';
    help.innerHTML = '⚠️ لم يتم العثور على أي مستخدمين. اضغط زر استرجاع المستخدمين أدناه.';

}

function searchWorkerByCode(){
  const qRaw = (document.getElementById('worker-search-code').value || '').trim();
  const box = document.getElementById('worker-search-result');
  if(!qRaw){ box.innerHTML = ''; return; }

  const fromEl = document.getElementById('f-from');
  const toEl = document.getElementById('f-to');
  const from = fromEl ? fromEl.value : '';
  const to = toEl ? toEl.value : '';

  let rows = ENTRIES.filter(e => (!from || e.d >= from) && (!to || e.d <= to));

  const isCode = /^\d+$/.test(qRaw);
  if(isCode){
    rows = rows.filter(e => String(e.c) === String(qRaw));
  } else {
    rows = rows.filter(e => e.n && e.n.includes(qRaw));
  }

  if(!rows.length){ box.innerHTML = '<div class="empty-state">مفيش سجلات للعاملة دي في الفترة المحددة.</div>'; return; }

  // Group by worker code, in case a name search matches more than one worker
  const byCode = new Map();
  rows.forEach(r => {
    if(!byCode.has(r.c)) byCode.set(r.c, []);
    byCode.get(r.c).push(r);
  });

  box.innerHTML = [...byCode.entries()].map(([code, wrows]) => {
    wrows.sort((a,b)=>a.d.localeCompare(b.d));
    const name = wrows[wrows.length-1].n || 'بدون اسم';
    const distinctDates = [...new Set(wrows.map(r=>r.d))];

    const dayCards = wrows.map(r => {
      const aatalParts = AATAL_KEYS
        .filter(k => (r.at && r.at[k]) > 0)
        .map(k => `${k} ${AATAL_LABELS[k]}: ${fmtNum(r.at[k])}`)
        .join(' · ');
      return `
        <div style="border-top:1px dashed var(--line); padding:8px 0; text-align:right;">
          <div style="font-weight:800;">${r.d} — ${r.h} · خط ${r.l}</div>
          <div class="jr-metrics" style="grid-template-columns:repeat(4,1fr); margin-top:6px;">
            <div class="wm"><div class="l">تارجت</div><div class="v">${fmtNum(r.t)}</div></div>
            <div class="wm"><div class="l">إنتاج</div><div class="v">${fmtNum(r.p)}</div></div>
            <div class="wm"><div class="l">هالك</div><div class="v">${fmtNum(r.hk)}</div></div>
            <div class="wm"><div class="l">إصلاح</div><div class="v">${fmtNum(r.es)}</div></div>

async function commitMissingNameCode(oldCode){
  const input = document.getElementById('mn-code-'+oldCode);
  const newCodeRaw = input ? input.value.trim() : '';
  if(!newCodeRaw){ showToast('⚠️ اكتب الكود الصحيح الأول'); return; }
  const newCode = Number(newCodeRaw);
  if(!newCode){ showToast('⚠️ الكود لازم يكون رقم'); return; }

  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  const hall = document.getElementById('f-hall').value;
  const line = document.getElementById('f-line').value;

  // لو فيه اسم معروف للكود الجديد في مكان تاني، هيتظبط تلقائي في كل الأيام دي
  const knownName = (ENTRIES.find(e => e.c === newCode && e.n) || {}).n
    || (OPERATORS.find(o => o.c === newCode) || {}).n
    || '';

  let count = 0;
  ENTRIES.forEach(e => {
    if(e.c !== oldCode) return;
    if(e.d < from || e.d > to) return;
    if(hall !== '__ALL__' && e.h !== hall) return;
    if(line !== '__ALL__' && String(e.l) !== String(line)) return;
    e.c = newCode;
    if(knownName) e.n = knownName;
    count++;
  });

  if(!count){ showToast('⚠️ مفيش سجلات اتعدلت'); return; }

  await saveEntries();
  showToast(`✅ اتعدّل الكود لـ ${fmtNum(count)} يوم — الكود الجديد ${newCode}`);
  renderMissingNameList();
}

function currentFilteredRows(){
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  const hall = document.getElementById('f-hall').value;
  const line = document.getElementById('f-line').value;
  let rows = ENTRIES.filter(r => r.d >= from && r.d <= to);
  if(hall && hall !== '__ALL__') rows = rows.filter(r => r.h === hall);
  if(line && line !== '__ALL__') rows = rows.filter(r => String(r.l) === String(line));
  return rows;
}
function aggregate(rows){
  const target = rows.reduce((s,r)=>s+r.t,0);
  const production = rows.reduce((s,r)=>s+r.p,0);
  const halak = rows.reduce((s,r)=>s+r.hk,0);
  const eslah = rows.reduce((s,r)=>s+r.es,0);
  let aatal = 0; AATAL_KEYS.forEach(k => rows.forEach(r => aatal += (r.at && r.at[k]) || 0));
  const deficit = target - production;
  const pDeficit = target ? deficit/target : 0;
  const pHalak = production ? halak/production : 0;
  const pEslah = production ? eslah/production : 0;
  const pAada = 1 - (pDeficit + pHalak + pEslah);
  return {target, production, halak, eslah, aatal, deficit, pDeficit, pHalak, pEslah, pAada};
}
function groupByWorker(rows){
  const map = new Map();
  rows.forEach(r => {
    if(!map.has(r.c)) map.set(r.c, {code:r.c, name:'', lines:new Set(), rows:[]});
    const w = map.get(r.c);
    if(r.n) w.name = r.n;
    w.lines.add(r.l);
    w.rows.push(r);
  });
  return [...map.values()].map(w => ({...w, agg: aggregate(w.rows)}));
}
function pctClass(p){ if(p >= 0.95) return 'pct-good'; if(p >= 0.8) return 'pct-mid'; return 'pct-bad'; }

function applyFilters(){
  const rows = currentFilteredRows();
  const box = document.getElementById('report-results');
  if(!rows.length){ box.innerHTML = `<div class="empty-state">مفيش بيانات في الفترة أو الفلتر ده.</div>`; return; }

  const agg = aggregate(rows);
  const workers = groupByWorker(rows).sort((a,b) => a.agg.pAada - b.agg.pAada);

  const aatalBreakdown = {}; AATAL_KEYS.forEach(k=>aatalBreakdown[k]=0);
  rows.forEach(r => AATAL_KEYS.forEach(k => aatalBreakdown[k] += (r.at && r.at[k]) || 0));

  let rankHtml = '';
  if(rankMode){
    const toDate = document.getElementById('f-to').value;
    const maxTarget = Math.max(...workers.map(w=>w.agg.target));
    const threshold = maxTarget / 2;
    const eligible = workers.filter(w => w.agg.target >= threshold);

    // الأفضل: لازم تكون نسبة أدائها 80% فأكتر
    const topCandidates = eligible.filter(w => w.agg.pAada >= 0.80).sort((a,b)=> b.agg.pAada - a.agg.pAada);
    const top10 = topCandidates.slice(0,10);
    const topCodes = new Set(top10.map(w=>w.code));

    // الأقل: من الباقي اللي مش داخل في الأفضل خالص (منع التكرار)
    const bottomCandidates = eligible.filter(w => !topCodes.has(w.code)).sort((a,b)=> a.agg.pAada - b.agg.pAada);
    const bottom10 = bottomCandidates.slice(0,10);

    const rankItemHtml = (w) => {
      const days = [...new Set(w.rows.map(r=>r.d))].sort();
      return `
      <div class="rank-item" style="display:block;">
        <div style="display:flex;justify-content:space-between;"><span><b>${w.code}</b> — ${w.name||'بدون اسم'}</span><b class="num">${fmtPct(w.agg.pAada)}</b></div>

          <div class="wm"><div class="l">هالك</div><div class="v">${fmtNum(w.agg.halak)}</div></div>

        </div>
        <div style="font-size:9px;color:var(--muted);">الأيام: ${days.join('، ')}</div>
      </div>`;
    };
    const cbar = (w, cls) => `
      <div class="cbar-row">
        <div class="cbar-label">${w.name||w.code}</div>
        <div class="cbar-track"><div class="cbar-fill ${cls}" style="width:${Math.max(2,Math.min(100,w.agg.pAada*100))}%"></div></div>
        <div class="cbar-val">${fmtPct(w.agg.pAada)}</div>
      </div>`;

    rankHtml = `
      <div class="section-title">🏆 ترتيب الأداء (أعلى تارجت في الفترة ${fmtNum(maxTarget)} — استبعاد اللي تارجته أقل من نصه ${fmtNum(threshold)}، والأفضل لازم ٨٠٪ فأكتر)</div>
      <div class="rank-note">${workers.length - eligible.length} عاملة اتستبعدت لقلة تارجتها${topCandidates.length===0?' — ومفيش حد وصل لـ٨٠٪ في الفترة دي':''}</div>
      <div class="chart-box top"><h4>✅ أعلى ${top10.length} (نسبة الأداء)</h4>${top10.map(w=>cbar(w,'g')).join('') || '<div class="empty-state">لا يوجد</div>'}</div>
      <div class="chart-box bottom"><h4>⚠️ أقل ${bottom10.length} (نسبة الأداء)</h4>${bottom10.map(w=>cbar(w,'r')).join('') || '<div class="empty-state">لا يوجد</div>'}</div>
      <div class="rank-wrap">
        <div class="rank-col top"><h4>✅ أفضل ${top10.length}</h4>${top10.map(rankItemHtml).join('') || '<div class="rank-item">لا يوجد</div>'}</div>
        <div class="rank-col bottom"><h4>⚠️ أقل ${bottom10.length}</h4>${bottom10.map(rankItemHtml).join('') || '<div class="rank-item">لا يوجد</div>'}</div>
      </div>
      <button class="apply-btn" style="background:#3A4257;" onclick="printRankOnly()">🖨️ طباعة الترتيب فقط</button>
    `;
    window.__rankTop10 = top10; window.__rankBottom10 = bottom10; window.__rankToDate = toDate;
  }

  document.getElementById('report-results').innerHTML = `
    <div class="summary-grid">
      <div class="kpi"><div class="lbl">إجمالي التارجت</div><div class="val num">${fmtNum(agg.target)}</div></div>
      <div class="kpi"><div class="lbl">إجمالي الإنتاج</div><div class="val num">${fmtNum(agg.production)}</div></div>

      <div class="kpi amber"><div class="lbl">عدد العاملات</div><div class="val num">${workers.length}</div></div>

      <div class="track"><div class="fill" style="width:${Math.max(0,Math.min(100, agg.pAada*100))}%"></div></div>
      <div class="track-labels"><span>${fmtPct(agg.pAada)}</span></div>

      ${AATAL_KEYS.filter(k=>aatalBreakdown[k]>0).map(k => `<div class="aatal-chip">${k} · ${AATAL_LABELS[k]}: ${fmtNum(aatalBreakdown[k])}</div>`).join('') || '<div class="aatal-chip">مفيش أعطال مسجلة</div>'}
    </div>

// نسبة عجز الوقت لكل خط = عجز الوقت المسجل في الجرد ÷ إجمالي الوقت المستهدف للخط في التارجت (من ساعات/دقايق الأرتيكلات)
function computeLineDeficitPerformance(from, to){
  const jardSessions = JARD.filter(s => s.from <= to && s.to >= from);
  const targetPlans = TARGET_PLANS.filter(p => p.from <= to && p.to >= from);

  const targetMinutesByLine = new Map(); // line -> minutes
  targetPlans.forEach(p => {
    (p.lines||[]).forEach(l => {
      let mins = 0;
      (l.rows||[]).forEach(r => { mins += (Number(r.h)||0)*60 + (Number(r.m)||0); });
      targetMinutesByLine.set(l.line, (targetMinutesByLine.get(l.line)||0) + mins);
    });
  });

  const deficitByLine = new Map(); // line -> {deficitMinutes, supervisor}
  jardSessions.forEach(s => {
    (s.lines||[]).forEach(l => {
      if(!deficitByLine.has(l.line)) deficitByLine.set(l.line, {deficitMinutes:0, supervisor:''});
      const agg = deficitByLine.get(l.line);
      agg.deficitMinutes += l.deficitMinutes||0;
      if(l.supervisor) agg.supervisor = l.supervisor;
    });
  });

  const allLines = new Set([...targetMinutesByLine.keys(), ...deficitByLine.keys()]);
  const rows = [...allLines].map(line => {
    const targetMinutes = targetMinutesByLine.get(line) || 0;
    const d = deficitByLine.get(line) || {deficitMinutes:0, supervisor:''};
    const deficitPct = targetMinutes ? d.deficitMinutes / targetMinutes : 0;
    const successPct = 1 - deficitPct;
    return {
      line, supervisor: d.supervisor, deficitMinutes: d.deficitMinutes,
      targetMinutes, deficitPct, successPct,
      hasData: targetMinutes > 0
    };
  }).filter(r => r.hasData);
  return rows.sort((a,b) => b.successPct - a.successPct);
}
function currentBestPerfFilteredData(){
  const from = document.getElementById('bf-from').value;
  const to = document.getElementById('bf-to').value;
  const hall = document.getElementById('bf-hall').value;
  const jardSessions = JARD.filter(s => s.from <= to && s.to >= from);
  const targetPlans = TARGET_PLANS.filter(p => p.from <= to && p.to >= from);
  const halls = hall === '__ALL__' ? HALLS : [hall];
  return halls.map(h => {
    const totalDeliveries = jardSessions.reduce((sum, s) => {
      if(s.hall !== h) return sum;
      return sum + (s.lines || []).reduce((lineSum, l) => lineSum + (l.articles || []).reduce((artSum, a) => artSum + normalizeNumber(a.qty), 0), 0);
    }, 0);
    const totalHalak = jardSessions.reduce((sum, s) => {
      if(s.hall !== h) return sum;
      return sum + (s.lines || []).reduce((lineSum, l) => lineSum + (l.articles || []).reduce((artSum, a) => artSum + normalizeNumber(a.halak), 0), 0);
    }, 0);
    const totalEslah = jardSessions.reduce((sum, s) => {
      if(s.hall !== h) return sum;
      return sum + (s.lines || []).reduce((lineSum, l) => lineSum + (l.articles || []).reduce((artSum, a) => artSum + normalizeNumber(a.eslah), 0), 0);
    }, 0);
    const totalTargetDeliveries = targetPlans.reduce((sum, p) => {
      if(p.hall !== h) return sum;
      return sum + normalizeNumber(p.hallTargetDeliveries);
    }, 0);
    const performancePct = totalTargetDeliveries ? totalDeliveries / totalTargetDeliveries : 0;
    const halakPct = totalDeliveries ? totalHalak / totalDeliveries : 0;
    const eslahPct = totalDeliveries ? totalEslah / totalDeliveries : 0;
    const qualityPct = 1 - halakPct - eslahPct;
    return {
      hall: h,
      actualDeliveries: totalDeliveries,
      targetDeliveries: totalTargetDeliveries,
      performancePct,
      totalHalak,
      totalEslah,
      halakPct,
      eslahPct,
      qualityPct,
      qualityRankValue: totalDeliveries ? qualityPct : -1,
      hasData: totalTargetDeliveries > 0 || totalDeliveries > 0
    };
  });
}

            <tbody>${qualityRankRows || '<tr><td colspan="8">مفيش بيانات جودة</td></tr>'}</tbody>

   وما بنعملش renderRows() مع كل حرف بيتكتب عشان الكتابة تفضل طبيعية. */
let pendingRowIds = [];
let rowIdCounter = 0;
let lastBulkCount = 15;

const ENTRY_COLS = ['code','target','production','eslah','halak','ص','ف','ج','س','ظ','ع','ن'];
function renderEntryTab(){
  pendingRowIds = [];
  for(let i=0;i<lastBulkCount;i++) pendingRowIds.push(rowIdCounter++);

    </div>

    <div class="jflat-wrap">
      <table class="jflat-table entry-table">
        <thead><tr>
          <th>#</th><th>كود</th><th>التارجت</th><th>الإنتاج</th><th>الإصلاح</th><th>الهالك</th>
          ${AATAL_KEYS.map(k=>`<th>${k}</th>`).join('')}
          <th>الاسم</th><th>تعيين (للجديدة)</th><th></th>
        </tr></thead>

      </table>
    </div>

    <div class="section-title" style="margin-top:18px;">📋 السجلات المتسجلة على الاختيار ده <span class="count">تقدر تعدّل أو تمسح أي سجل مباشرة</span></div>
    <div id="entry-records-list"></div>
  `;
  renderRowsContainer();
  renderEntryRecordsList();
}
function addMultipleRows(){
  const n = Math.max(1, Math.min(80, Number(document.getElementById('bulk-count').value) || 1));
  lastBulkCount = n;
  const startIdx = pendingRowIds.length;
  const newIds = [];
  for(let i=0;i<n;i++){ const id = rowIdCounter++; pendingRowIds.push(id); newIds.push(id); }
  const container = document.getElementById('rows-container');
  container.insertAdjacentHTML('beforeend', newIds.map((id,i)=>entryRowHtml(id, startIdx+i)).join(''));
  renumberRows();
  showToast(`✅ اتضاف ${n} صف جديد جنب اللي كتبته، من غير ما يتمسح حاجة`);
}
function addRow(){
  const id = rowIdCounter++;
  pendingRowIds.push(id);
  document.getElementById('rows-container').insertAdjacentHTML('beforeend', entryRowHtml(id, pendingRowIds.length-1));
  renumberRows();
}
function removeRow(id){
  pendingRowIds = pendingRowIds.filter(i => i !== id);
  const el = document.getElementById('rowcard-'+id);
  if(el) el.remove();
  if(pendingRowIds.length === 0){ addRow(); return; }
  renumberRows();
}
function renumberRows(){
  pendingRowIds.forEach((id, idx) => {
    const row = document.getElementById('rowcard-'+id);
    if(!row) return;
    const numEl = row.querySelector('.rownum');
    if(numEl) numEl.textContent = idx+1;
  });
}
function renderRowsContainer(){
  document.getElementById('rows-container').innerHTML =
    pendingRowIds.map((id, idx) => entryRowHtml(id, idx)).join('');
}
function entryRowHtml(id, idx){
  return `
    <tr id="rowcard-${id}">
      <td class="rownum">${idx+1}</td>
      <td><input type="number" id="code-${id}" oninput="onCodeInput(${id})" onpaste="handleEntryPaste(event, ${idx}, 0)"></td>
      <td><input type="number" id="target-${id}" onpaste="handleEntryPaste(event, ${idx}, 1)"></td>
      <td><input type="number" id="production-${id}" onpaste="handleEntryPaste(event, ${idx}, 2)"></td>
      <td><input type="number" id="eslah-${id}" onpaste="handleEntryPaste(event, ${idx}, 3)"></td>
      <td><input type="number" id="halak-${id}" onpaste="handleEntryPaste(event, ${idx}, 4)"></td>
      ${AATAL_KEYS.map((k, ki) => `<td><input type="number" id="aatal-${id}-${k}" onpaste="handleEntryPaste(event, ${idx}, ${5+ki})"></td>`).join('')}
      <td><input type="text" id="name-${id}" class="ename" placeholder="هيظهر لما تكتب الكود" readonly></td>
      <td><input type="date" id="newhire-${id}" disabled></td>
      <td><button class="rm-row-btn" onclick="removeRow(${id})">✕</button></td>
    </tr>
  `;
}
function handleEntryPaste(e, startIdx, startCol){
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if(!text) return;
  e.preventDefault();
  const aatalSet = new Set(AATAL_KEYS);
  const rowsTxt = text.split(/\r\n|\n|\r/).filter(r=>r.length);
  rowsTxt.forEach((rowText, ri) => {
    const targetIdx = startIdx + ri;
    while(targetIdx >= pendingRowIds.length) addRow();
    const id = pendingRowIds[targetIdx];
    const cells = rowText.split('\t');
    cells.forEach((val, ci) => {
      const colIdx = (startCol||0) + ci;
      if(colIdx >= ENTRY_COLS.length) return;
      const field = ENTRY_COLS[colIdx];
      const elId = aatalSet.has(field) ? ('aatal-'+id+'-'+field) : (field+'-'+id);
      const el = document.getElementById(elId);
      if(el){ el.value = val.trim(); }
    });
    onCodeInput(id);
  });
  showToast(`✅ اتلصق ${rowsTxt.length} صف بالترتيب: كود، تارجت، إنتاج، إصلاح، هالك، ص ف ج س ظ ع ن`);
}
function renderEntryRecordsList(){
  const list = document.getElementById('entry-records-list');
  if(!list) return;
  const date = document.getElementById('entry-date')?.value || '';
  const hall = document.getElementById('entry-hall')?.value || '';
  const line = document.getElementById('entry-line')?.value || '';
  const lineFiltered = Boolean(line) && line !== '__NEW__';
  let rows = ENTRIES.filter(e => e.d === date);
  if(hall) rows = rows.filter(e => e.h === hall);
  if(lineFiltered) rows = rows.filter(e => String(e.l) === String(line));
  rows.sort((a,b)=> String(a.c).localeCompare(String(b.c),'en',{numeric:true}));
  if(!rows.length){
    list.innerHTML = date ? '<div class="empty-state">مفيش سجلات متسجلة على الاختيار ده لسه</div>' : '<div class="empty-state">مفيش سجلات لسه</div>';
    return;
  }
  list.innerHTML = rows.map(recordRowHtml).join('');
}
function onHallChange(){
  const hall = document.getElementById('entry-hall').value;
  const lineSel = document.getElementById('entry-line');
  const lines = HALL_LINES[hall] || [];
  lineSel.innerHTML = `<option value="">اختار الخط</option>` + lines.map(l=>`<option value="${l}">خط ${l}</option>`).join('') + `<option value="__NEW__">➕ خط جديد</option>`;
}
function onLineChange(){
  const lineSel = document.getElementById('entry-line');
  if(lineSel.value === '__NEW__'){
    const n = prompt('اكتب رقم الخط الجديد:');
    if(n){
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = 'خط '+n; opt.selected = true;
      lineSel.insertBefore(opt, lineSel.lastElementChild);
    } else {
      lineSel.value = '';
    }
  }
}
function onCodeInput(id){
  const code = document.getElementById('code-'+id).value;
  const nameEl = document.getElementById('name-'+id);
  const hireEl = document.getElementById('newhire-'+id);
  const targetInput = document.getElementById('target-'+id);
  if(!code){
    nameEl.value = ''; nameEl.readOnly = true; nameEl.className = 'ename'; nameEl.placeholder = 'هيظهر لما تكتب الكود';
    hireEl.disabled = true; hireEl.value = '';
    return;
  }
  const found = OPERATORS.find(o => String(o.c) === String(code));
  if(found){
    nameEl.value = found.n; nameEl.readOnly = true; nameEl.className = 'ename found';
    hireEl.disabled = true; hireEl.value = '';
    if(!targetInput.value){
      const last = [...ENTRIES].reverse().find(e => e.c === Number(code));
      if(last) targetInput.placeholder = `آخر تارجت ${last.t}`;
    }
  } else {
    if(nameEl.readOnly) nameEl.value = '';
    nameEl.readOnly = false; nameEl.className = 'ename missing'; nameEl.placeholder = 'كود جديد — اكتب الاسم هنا';
    hireEl.disabled = false;
  }
}
async function saveAllRows(){
  const date = document.getElementById('entry-date').value;
  const hall = document.getElementById('entry-hall').value;
  const line = document.getElementById('entry-line').value;
  if(!hall || !line || line === '__NEW__'){ showToast('⚠️ لازم تحدد الصالة والخط فوق الأول'); return; }

  const readRows = pendingRowIds.map(id => {
    const code = document.getElementById('code-'+id).value;
    const found = OPERATORS.find(o => String(o.c) === String(code));
    const newName = found ? '' : document.getElementById('name-'+id).value.trim();
    const newHire = document.getElementById('newhire-'+id).value;
    const aatalObj = {}; AATAL_KEYS.forEach(k => aatalObj[k] = Number(document.getElementById('aatal-'+id+'-'+k).value)||0);
    return {
      code, name: found ? found.n : '', newName, newHire,
      target: document.getElementById('target-'+id).value,
      production: document.getElementById('production-'+id).value,
      halak: document.getElementById('halak-'+id).value,
      eslah: document.getElementById('eslah-'+id).value,
      aatal: aatalObj
    };
  });
  const valid = readRows.filter(r => r.code && (r.name || r.newName));
  if(!valid.length){ showToast('⚠️ لازم تكتب كود واسم على الأقل لصف واحد'); return; }
  if(valid.some(r => !r.target)){ showToast('⚠️ لازم تحدد التارجت لكل عاملة (ممكن يختلف من مكنة للتانية)'); return; }

  valid.forEach(r => {
    if(!r.name && r.newName){
      OPERATORS.push({c: Number(r.code), n: r.newName, a:true, hd: r.newHire || null});
    }
    ENTRIES.push({
      id: 'e'+Date.now()+Math.random().toString(36).slice(2,6),
      d: date, h: hall, l: Number(line), c: Number(r.code), n: r.name || r.newName,
      t: Number(r.target)||0, p: Number(r.production)||0, hk: Number(r.halak)||0, es: Number(r.eslah)||0,
      at: r.aatal, by: currentUser.user
    });
  });
  await saveEntries();
  if(valid.some(r=>!r.name && r.newName)) await saveOperators();
  showToast(`✅ ات��فظ ${valid.length} سجل بنجاح على ${hall} - خط ${line}`);
  renderEntryTab();
}

function renderOpImportTable(){
  let rows = '';
  for(let i=0;i<OP_IMPORT_ROWS;i++){
    rows += `
      <tr>
        <td>${i+1}</td>
        <td><input type="text" id="opimp-code-${i}" onpaste="handleGenericPaste(event,${i},0,'opimp-',['code','name','hire'],${OP_IMPORT_ROWS})"></td>

      </tr>`;
  }
  document.getElementById('op-import-body').innerHTML = rows;
}
async function importOperatorsBulk(){
  let added = 0, skipped = 0;
  for(let i=0;i<OP_IMPORT_ROWS;i++){
    const code = document.getElementById('opimp-code-'+i).value.trim();
    const name = document.getElementById('opimp-name-'+i).value.trim();
    const hire = document.getElementById('opimp-hire-'+i).value.trim();
    if(!code || !name) continue;
    if(OPERATORS.find(o=>String(o.c)===String(code))){ skipped++; continue; }
    OPERATORS.push({c:Number(code), n:name, a:true, hd: hire || null});
    added++;
  }
  if(added){ await saveOperators(); showToast(`✅ اتضاف ${added} عاملة${skipped?` (اتجاهل ${skipped} كود متكرر)`:''}`); renderOperatorsTab(); }
  else showToast('⚠️ مفيش صفوف صحيحة (لازم كود واسم على الأقل)');
}
function renderOperatorsList(list){
  document.getElementById('op-list').innerHTML = list.slice(0,200).map(op => `
    <div class="op-row ${op.a?'':'inactive'}">
      <input type="checkbox" class="op-select-cb" value="${op.c}" onchange="updateOpSelectedCount()" style="margin-left:6px;">
      <span class="op-code">${op.c}</span>
      <span class="op-name" id="opname-${op.c}">${op.n}</span>
      <button class="op-btn" onclick="editOperator(${op.c})">✏️</button>
      <button class="op-btn" onclick="toggleOperator(${op.c})">${op.a?'⏸️':'▶️'}</button>
      <button class="op-btn" onclick="deleteOperator(${op.c})">🗑️</button>
    </div>
    <div id="opedit-${op.c}"></div>
  `).join('') || '<div class="empty-state">مفيش عاملين</div>';
  if(list.length>200) document.getElementById('op-list').innerHTML += `<div class="data-note">في ${list.length-200} عاملة تانية، استخدم البحث عشان تلاقيها</div>`;
  updateOpSelectedCount();

function updateOpSelectedCount(){
  const n = document.querySelectorAll('.op-select-cb:checked').length;
  const el = document.getElementById('op-selected-count');
  if(el) el.textContent = n ? `(${n} متحدد)` : '';
}
async function deleteSelectedOperators(){
  const codes = [...document.querySelectorAll('.op-select-cb:checked')].map(cb=>Number(cb.value));
  if(!codes.length){ showToast('⚠️ متحددتش حد'); return; }
  if(!confirm(`متأكد إنك عايز تمسح ${codes.length} عاملة؟`)) return;
  OPERATORS = OPERATORS.filter(o=>!codes.includes(o.c));
  await saveOperators();
  showToast(`🗑️ اتمسح ${codes.length} عاملة`);
  renderOperatorsTab();
}
async function deleteAllOperators(){
  if(!confirm('متأكد إنك عايز تمسح كل العاملين خالص؟ الإجراء ده مينفعش يترجع!')) return;
  OPERATORS = [];
  await saveOperators();
  showToast('🗑️ اتمسح كل العاملين');
  renderOperatorsTab();
}
function filterOperators(q){
  q = q.trim();
  if(!q){ renderOperatorsList(OPERATORS); return; }
  renderOperatorsList(OPERATORS.filter(o => o.n.includes(q) || String(o.c).includes(q)));
}
async function addOperator(){
  const code = document.getElementById('new-op-code').value;

function renderJardFlatTable(){
  const body = document.getElementById('jard-flat-body');
  if(!body) return;
  let rows = '';
  for(let i=0;i<JARD_FLAT_ROWS;i++){
    rows += `
      <tr>
        <td>${i+1}</td>
        <td><input type="number" id="jflat-line-${i}" onpaste="handleJardPaste(event,${i},0)" oninput="markJardFlatFilled(${i})"></td>
        <td><input type="text" id="jflat-article-${i}" onpaste="handleJardPaste(event,${i},1)" oninput="markJardFlatFilled(${i})"></td>
        <td><input type="number" id="jflat-qty-${i}" onpaste="handleJardPaste(event,${i},2)" oninput="markJardFlatFilled(${i})"></td>
        <td><input type="number" id="jflat-halak-${i}" class="jempty-check" onpaste="handleJardPaste(event,${i},3)" oninput="markJardFlatFilled(${i})"></td>
        <td><input type="number" id="jflat-eslah-${i}" class="jempty-check" onpaste="handleJardPaste(event,${i},4)" oninput="markJardFlatFilled(${i})"></td>
      </tr>`;
  }
  body.innerHTML = rows;
}
function markJardFlatFilled(i){
  const line = document.getElementById('jflat-line-'+i).value;
  const article = document.getElementById('jflat-article-'+i).value;
  const qty = document.getElementById('jflat-qty-'+i).value;
  const halakEl = document.getElementById('jflat-halak-'+i);
  const eslahEl = document.getElementById('jflat-eslah-'+i);
  const hasData = line || article || qty;
  [halakEl, eslahEl].forEach(el=>{
    if(hasData && el.value==='') el.classList.add('jempty-warn');
    else el.classList.remove('jempty-warn');
  });
}
function handleJardPaste(e, startRow, startCol){
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if(!text) return;
  e.preventDefault();
  const cols = ['line','article','qty','halak','eslah'];
  const rowsTxt = text.split(/\r\n|\n|\r/).filter(r=>r.length);
  rowsTxt.forEach((rowText, ri) => {
    const cells = rowText.split('\t');
    cells.forEach((val, ci) => {
      const colIdx = startCol + ci;
      if(colIdx >= cols.length) return;
      const targetRow = startRow + ri;
      if(targetRow >= JARD_FLAT_ROWS) return;
      const el = document.getElementById('jflat-'+cols[colIdx]+'-'+targetRow);
      if(el) el.value = val.trim();
    });
  });
  for(let i=startRow;i<Math.min(startRow+rowsTxt.length,JARD_FLAT_ROWS);i++) markJardFlatFilled(i);
  showToast(`✅ اتلصق ${rowsTxt.length} صف بنجاح`);
}

async function saveJardSession(){
  const from = document.getElementById('jard-from').value;
  const to = document.getElementById('jard-to').value;
  const hall = document.getElementById('jard-hall').value;
  const hallManager = document.getElementById('jard-hall-manager').value.trim();
  if(!from || !to){ showToast('⚠️ حدد فترة الجرد من وإلى'); return; }

  const flatRows = [];
  for(let i=0;i<JARD_FLAT_ROWS;i++){
    const line = Number(document.getElementById('jflat-line-'+i).value)||0;
    const code = document.getElementById('jflat-article-'+i).value;
    const qty = Number(document.getElementById('jflat-qty-'+i).value)||0;
    const halak = Number(document.getElementById('jflat-halak-'+i).value)||0;
    const eslah = Number(document.getElementById('jflat-eslah-'+i).value)||0;
    if(line || code || qty || halak || eslah) flatRows.push({line, code, qty, halak, eslah});
  }

  const lines = pendingJardLineIds.map(id => {
    const lineNum = Number(document.getElementById('jline-num-'+id).value)||0;
    const articles = flatRows.filter(r=>r.line===lineNum).map(r=>({code:r.code, qty:r.qty, halak:r.halak, eslah:r.eslah}));
    const dH = Number(document.getElementById('jline-deficit-h-'+id).value)||0;
    const dM = Number(document.getElementById('jline-deficit-m-'+id).value)||0;
    const dSign = (dH<0 || dM<0) ? -1 : 1;
    const deficitMinutes = dSign * (Math.abs(dH)*60 + Math.abs(dM));
    return {
      line: lineNum,
      supervisor: document.getElementById('jline-supervisor-'+id).value.trim(),
      targetProduction: Number(document.getElementById('jline-target-'+id).value)||0,
      production: Number(document.getElementById('jline-prod-'+id).value)||0,
      deficitMinutes,
      needles: Number(document.getElementById('jline-needles-'+id).value)||0,
      maintOther: document.getElementById('jline-maint-'+id).value.trim(),
      articles
    };
  }).filter(l => l.line);

  if(!lines.length){ showToast('⚠️ لازم يكون في خط واحد على الأقل'); return; }

  const unmatched = flatRows.filter(r => !lines.some(l=>l.line===r.line));
  if(unmatched.length){ showToast(`⚠️ في ${unmatched.length} صف كتبت فيهم رقم خط مش موجود في الصالة دي — اتجاهلوا`); }

  if(editingJardSessionId){
    const idx = JARD.findIndex(s=>s.id===editingJardSessionId);

function aggregateJardLines(sessions){
  const map = new Map();
  sessions.forEach(s => {
    s.lines.forEach(l => {
      if(!map.has(l.line)) map.set(l.line, {
        line:l.line, supervisor:l.supervisor||'', targetProduction:0, production:0,
        deliveries:0, halak:0, eslah:0, deficitMinutes:0, needles:0, maintOther:[]
      });
      const agg = map.get(l.line);
      if(l.supervisor) agg.supervisor = l.supervisor;
      agg.targetProduction += l.targetProduction||0;
      agg.production += l.production||0;
      agg.deficitMinutes += l.deficitMinutes||0;
      agg.needles += l.needles||0;
      if(l.maintOther) agg.maintOther.push(l.maintOther);
      (l.articles||[]).forEach(a => {
        agg.deliveries += a.qty||0; agg.halak += a.halak||0; agg.eslah += a.eslah||0;
      });
    });
  });
  return [...map.values()].map(a => {
    const deficitProduction = a.targetProduction - a.production;
    const deficitProductionPct = a.targetProduction ? deficitProduction/a.targetProduction : 0;
    const halakPct = a.deliveries ? a.halak/a.deliveries : 0;
    const eslahPct = a.deliveries ? a.eslah/a.deliveries : 0;
    const successPct = 1 - (deficitProductionPct + halakPct + eslahPct);
    return {...a, deficitProduction, deficitProductionPct, halakPct, eslahPct, successPct};
  }).sort((a,b)=>a.line-b.line);
}
function hallTotals(lines){
  const t = lines.reduce((t,l)=>({
    targetProduction:t.targetProduction+l.targetProduction, production:t.production+l.production,
    deliveries:t.deliveries+l.deliveries,
    halak:t.halak+l.halak, eslah:t.eslah+l.eslah, deficitMinutes:t.deficitMinutes+l.deficitMinutes, needles:t.needles+l.needles
  }), {targetProduction:0,production:0,deliveries:0,halak:0,eslah:0,deficitMinutes:0,needles:0});
  const deficitProduction = t.targetProduction - t.production;
  const deficitProductionPct = t.targetProduction ? deficitProduction/t.targetProduction : 0;
  const halakPct = t.deliveries ? t.halak/t.deliveries : 0;
  const eslahPct = t.deliveries ? t.eslah/t.deliveries : 0;
  const successPct = 1 - (deficitProductionPct + halakPct + eslahPct);
  return {...t, deficitProduction, successPct};
}

const TARGET_ROWS = 20;

function targetCanEdit(){ return currentUser.role === 'admin'; }

function parseHMToMinutes(str){
  if(!str) return 0;
  const parts = String(str).split(':');
  if(parts.length===2){
    const h = parseInt(parts[0])||0, m = parseInt(parts[1])||0;
    return h*60+m;
  }
  const n = parseFloat(str);
  return isNaN(n) ? 0 : Math.round(n*60); // لو كتب رقم لوحده، اعتبره ساعات
}
function minutesToHM(mins){
  const h = Math.floor(mins/60), m = mins%60;
  return `${h}:${String(m).padStart(2,'0')}`;
}
function updateLineTimeTotal(lineId){
  let totalMinutes = 0, articleCount = 0;
  for(let i=0;i<TARGET_ROWS;i++){
    const article = document.getElementById('trow-article-'+lineId+'-'+i);
    const hEl = document.getElementById('trow-h-'+lineId+'-'+i);
    const mEl = document.getElementById('trow-m-'+lineId+'-'+i);
    if(!article) continue;
    if(article.value.trim()) articleCount++;
    const h = Math.abs(Number(hEl ? hEl.value : 0)||0);
    const m = Math.abs(Number(mEl ? mEl.value : 0)||0);
    totalMinutes += h*60 + m;
  }
  const lineTarget = Number(document.getElementById('target-line-total-input-'+lineId)?.value) || 0;
  const el = document.getElementById('target-line-total-'+lineId);
  if(el) el.textContent = `عدد الأرتيكلات المكتوبة: ${articleCount} — إجمالي الوقت المتوقع: ${Math.floor(totalMinutes/60)} ساعة و${totalMinutes%60} دقيقة — إجمالي تارجت الخط: ${fmtNum(lineTarget)}`;
  updateHallProductionTotal();
}
function updateLineTotals(lineId){
  updateLineTimeTotal(lineId);
}
function updateHallProductionTotal(){
  const el = document.getElementById('target-hall-production-total');
  if(!el) return;
  let totalQty = 0, totalArticles = 0, totalLineTargets = 0;
  pendingTargetLineIds.forEach(id => {
    const lineTargetInput = document.getElementById('target-line-total-input-'+id);
    const lineTarget = Number(lineTargetInput ? lineTargetInput.value : '') || 0;

  });

    el.textContent = `📐 إجمالي تارجت الإنتاج للصالة كلها: ${fmtNum(totalLineTargets)} — مجموع أعداد التارجت المكتوبة في الخطوط: ${fmtNum(totalQty)} — إجمالي عدد الأرتيكلات: ${totalArticles}`;

}

function handleGenericPaste(e, startRow, startCol, idPrefix, cols, maxRows, onDone){
  const text = (e.clipboardData || window.clipboardData).getData('text/plain') || (e.clipboardData || window.clipboardData).getData('text');
  if(!text) return;
  e.preventDefault();
  e.stopPropagation();
  const cleanedText = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\u00A0/g,' ').trim();
  const rowsTxt = cleanedText.split('\n').map(r => r.trim()).filter(r=>r.length);
  let baseRow = startRow;
  let baseCol = startCol;
  const activeId = e.target && e.target.id;
  if(activeId && activeId.startsWith(idPrefix)){
    const parts = activeId.slice(idPrefix.length).split('-');
    const colName = parts[0];
    const rowIndex = Number(parts[1]);
    const colIndex = cols.indexOf(colName);
    if(!isNaN(rowIndex) && colIndex >= 0){
      baseRow = rowIndex;
      baseCol = colIndex;
    }
  }
  rowsTxt.forEach((rowText, ri) => {
    const cells = rowText.includes('\t') ? rowText.split('\t') : rowText.split(/;|,/);
    cells.forEach((val, ci) => {
      const colIdx = baseCol + ci;
      if(colIdx >= cols.length) return;
      const targetRow = baseRow + ri;
      if(targetRow >= maxRows) return;
      const el = document.getElementById(idPrefix+cols[colIdx]+'-'+targetRow);
      if(el){
        el.value = val.trim();
      }
    });
  });
  showToast(`✅ اتلصق ${rowsTxt.length} صف بنجاح`);
  if(onDone) onDone();
}

function handleTargetRowPaste(e, startRow, startCol, idPrefix, cols, maxRows, onDone){
  handleGenericPaste(e, startRow, startCol, idPrefix, cols, maxRows, onDone);
}
async function saveTargetPlan(){
  const from = document.getElementById('target-from').value;
  const to = document.getElementById('target-to').value;
  const hall = document.getElementById('target-hall').value;
  const hallManager = document.getElementById('target-hall-manager').value.trim();
  const hallTargetDeliveries = document.getElementById('target-hall-deliveries').value.trim();
  if(!from || !to){ showToast('⚠️ حدد فترة التارجت من وإلى'); return; }

  const lines = pendingTargetLineIds.map(id => {
    const lineNum = Number(document.getElementById('target-num-'+id).value)||0;
    const rows = [];
    for(let i=0;i<TARGET_ROWS;i++){
      const article = document.getElementById('trow-'+id+'-article-'+i).value;
      const qty = document.getElementById('trow-'+id+'-qty-'+i).value;
      const h = document.getElementById('trow-'+id+'-h-'+i).value;
      const m = document.getElementById('trow-'+id+'-m-'+i).value;
      if(article || qty || h || m) rows.push({article, qty, h: Number(h)||0, m: Number(m)||0});
    }
    const lineTarget = Number(document.getElementById('target-line-total-input-'+id).value) || 0;
    const floorWork = Array.from({length:TARGET_WORK_ROWS}).map((_,i) => ({
      article: document.getElementById('target-floor-article-'+id+'-'+i).value,
      qty: document.getElementById('target-floor-qty-'+id+'-'+i).value
    })).filter(r=>r.article||r.qty);
    const lineWork = Array.from({length:TARGET_WORK_ROWS}).map((_,i) => ({
      article: document.getElementById('target-line-article-'+id+'-'+i).value,
      qty: document.getElementById('target-line-qty-'+id+'-'+i).value
    })).filter(r=>r.article||r.qty);
    return { line: lineNum, supervisor: document.getElementById('target-supervisor-'+id).value.trim(), lineTarget, rows, floorWork, lineWork };
  }).filter(l => l.line);

  if(!lines.length){ showToast('⚠️ لازم يكون في خط واحد على الأقل'); return; }

  if(editingTargetPlanId){
    const idx = TARGET_PLANS.findIndex(p=>p.id===editingTargetPlanId);
    if(idx>-1) TARGET_PLANS[idx] = {...TARGET_PLANS[idx], hall, from, to, hallManager, hallTargetDeliveries, lines};
    editingTargetPlanId = null;
    await saveTargetPlans();
    showToast('✅ اتحفظ التعديل على خطة التارجت');
  } else {
    TARGET_PLANS.push({
      id: 't'+Date.now()+Math.random().toString(36).slice(2,6),
      hall, from, to, hallManager, hallTargetDeliveries, lines, enteredBy: currentUser.user, ts: new Date().toISOString()
    });
    await saveTargetPlans();
    showToast(`✅ اتحفظت خطة تارجت ${hall} من ${from} إلى ${to}`);
  }
  renderTargetRegTab();
}

function renderTargetSummary(){
  const from = document.getElementById('tf-from').value;
  const to = document.getElementById('tf-to').value;
  const hall = document.getElementById('tf-hall').value;
  const container = document.getElementById('target-summary');
  let plans = TARGET_PLANS.filter(p => p.from <= to && p.to >= from);
  if(hall !== '__ALL__') plans = plans.filter(p=>p.hall===hall);
  if(!plans.length){ container.innerHTML = '<div class="empty-state">مفيش بيانات لملخص التارجت في الفترة دي.</div>'; return; }

  const map = new Map();
  plans.forEach(p => {
    const key = p.hall || '__ALL__';
    if(!map.has(key)) map.set(key, {hall:key, production:0, targetDeliveries:0, articles:0, floor:0, line:0});
    const agg = map.get(key);
    // sum per-plan values
    (p.lines||[]).forEach(l => {
      (l.rows||[]).forEach(r => {
        if(r.article) agg.articles++;
        const n = normalizeNumber(r.qty||0); if(n) agg.production += n;
      });
      (l.floorWork||[]).forEach(w => { agg.floor += normalizeNumber(w.qty||0); });
      (l.lineWork||[]).forEach(w => { agg.line += normalizeNumber(w.qty||0); });
    });
    agg.targetDeliveries += normalizeNumber(p.hallTargetDeliveries||0);
  });

  const rows = [...map.values()];
  const totals = rows.reduce((a,e)=>({production:a.production+e.production, targetDeliveries:a.targetDeliveries+e.targetDeliveries, articles:a.articles+e.articles, floor:a.floor+e.floor, line:a.line+e.line}), {production:0,targetDeliveries:0,articles:0,floor:0,line:0});

  // build per-hall lines aggregation
  const hallDetails = {};
  plans.forEach(p=>{
    const key = p.hall||'__ALL__';
    if(!hallDetails[key]) hallDetails[key] = {lines:new Map()};
    (p.lines||[]).forEach(l=>{
      const lm = hallDetails[key].lines;
      if(!lm.has(l.line)) lm.set(l.line, {line:l.line, lineTarget:0, production:0, articles:0, floor:0, lineWork:0});
      const item = lm.get(l.line);
      item.lineTarget += Number(l.lineTarget||0);
      (l.rows||[]).forEach(r=>{ const n=normalizeNumber(r.qty||0); if(n){ item.production += n; } if(r.article) item.articles++; });
      (l.floorWork||[]).forEach(w=>{ item.floor += normalizeNumber(w.qty||0); });
      (l.lineWork||[]).forEach(w=>{ item.lineWork += normalizeNumber(w.qty||0); });
    });
  });

  // per-hall summary cards (top)
  const hallsHtml = rows.map(r=>`
    <div class="jard-hall-summary" style="margin-bottom:10px;">
      <h4><span>${r.hall}</span></h4>
      <div class="jr-metrics">
        <div class="wm"><div class="l">إجمالي تارجت الإنتاج</div><div class="v num">${fmtNum(r.production)}</div></div>
        <div class="wm"><div class="l">إجمالي تارجت التسليمات</div><div class="v num">${fmtNum(r.targetDeliveries)}</div></div>
        <div class="wm"><div class="l">شغل الأرض</div><div class="v num">${fmtNum(r.floor)}</div></div>
        <div class="wm"><div class="l">شغل الخط</div><div class="v num">${fmtNum(r.line)}</div></div>
      </div>
    </div>`).join('');

  // overall totals block
  const totalsHtml = `
    <div class="jard-hall-summary" style="margin-top:12px;">
      <h4><span>إجماليات كل الصالات</span></h4>
      <div class="jr-metrics">
        <div class="wm"><div class="l">إجمالي تارجت الإنتاج</div><div class="v num">${fmtNum(totals.production)}</div></div>
        <div class="wm"><div class="l">إجمالي تارجت التسليمات</div><div class="v num">${fmtNum(totals.targetDeliveries)}</div></div>
        <div class="wm"><div class="l">شغل الأرض</div><div class="v num">${fmtNum(totals.floor)}</div></div>
        <div class="wm"><div class="l">شغل الخط</div><div class="v num">${fmtNum(totals.line)}</div></div>
      </div>
    </div>`;

  container.innerHTML = `
    <div>${hallsHtml}</div>
    ${totalsHtml}
  `;

}

  const from = document.getElementById('tf-from').value;

  const hall = document.getElementById('tf-hall').value;
  let plans = TARGET_PLANS.filter(p => p.from <= to && p.to >= from);
  if(hall !== '__ALL__') plans = plans.filter(p=>p.hall===hall);
  const isHallManager = currentUser.role === 'manager' && currentUser.hall;
  if(isHallManager) plans = plans.filter(p => p.hall === currentUser.hall);
  if(!plans.length){ showToast('⚠️ مفيش خطط تارجت في الفترة دي عشان تتطبع'); return; }
  const periodText = from===to ? `يوم ${from}` : `من ${from} إلى ${to}`;

  // بيبني جدول صغير مستقل لكل خط في الصالة (بدل جدول واحد طويل)، عشان يتترتب بعدين في Grid زي تقارير Excel
  const planBlock = (p) => {
    let hallProduction=0, hallFloorTotal=0, hallLineTotal=0;
    const lineMap = new Map();
    p.lines.forEach(l => {
      if(!lineMap.has(l.line)) lineMap.set(l.line, {line:l.line, supervisor:l.supervisor||'-', rows:[], totalMinutes:0, lineTarget:0});
      const item = lineMap.get(l.line);
      item.lineTarget += Number(l.lineTarget||0);
      (l.rows||[]).forEach(r=>{
        if(!r.article) return;
        item.rows.push({article:r.article, qty:r.qty||'-', h:r.h||0, m:r.m||0});
        const n=parseFloat(r.qty); if(!isNaN(n)) hallProduction += n;
        item.totalMinutes += (Number(r.h)||0)*60 + (Number(r.m)||0);
      });
      (l.floorWork||[]).forEach(w=>{ const n=parseFloat(w.qty); if(!isNaN(n)) hallFloorTotal += n; });
      (l.lineWork||[]).forEach(w=>{ const n=parseFloat(w.qty); if(!isNaN(n)) hallLineTotal += n; });
    });
    const lineCards = [...lineMap.values()].filter(item => item.rows.length).map(item => {
      const totalH = Math.floor(item.totalMinutes/60);
      const totalM = item.totalMinutes%60;
      return `
      <div class="dt-card">
        <div class="dt-card-head">خط ${item.line} — مشرف: ${item.supervisor}</div>
        <table>
          <thead><tr><th>الأرتيكل</th><th>العدد</th><th>ساعات</th><th>دقايق</th></tr></thead>
          <tbody>
            ${item.rows.map(r=>`<tr><td>${r.article}</td><td>${r.qty}</td><td>${r.h}</td><td>${r.m}</td></tr>`).join('')}
            <tr class="dt-total"><td>الإجمالي</td><td>${fmtNum(item.lineTarget)}</td><td>${totalH}</td><td>${totalM}</td></tr>
          </tbody>
        </table>
      </div>`;
    }).join('');
    return `
      <h2 style="margin-top:22px;">التارجت — ${p.hall}${p.hallManager ? ' — مدير الصالة: '+p.hallManager : ''}</h2>
      <h3>${p.from} → ${p.to} · إجمالي تارجت الإنتاج ${fmtNum(hallProduction)} · تارجت التسليم ${p.hallTargetDeliveries||'-'} · شغل الأرض ${fmtNum(hallFloorTotal)} · شغل الخط ${fmtNum(hallLineTotal)}</h3>
      <div class="dt-grid">${lineCards || '<div class="dt-card"><div class="dt-card-head">لا يوجد أرتيكلات</div></div>'}</div>
    `;
  };

  const body = plans.map(planBlock).join('');
  printTargetFitted('MILANO SPORT SHOES', periodText, body, { landscape:true });
}

function updateHpActual(hall, l){
  const basic = Number(document.getElementById('hp-basic-'+hall+'-'+l).value)||0;
  const clear = Number(document.getElementById('hp-clear-'+hall+'-'+l).value)||0;
  const absent = Number(document.getElementById('hp-absent-'+hall+'-'+l).value)||0;
  const actualEl = document.getElementById('hp-actual-'+hall+'-'+l);
  if(actualEl && actualEl.dataset.manual !== '1') actualEl.value = String(basic-clear-absent);
}
function markHpActualEdited(hall, l){
  const actualEl = document.getElementById('hp-actual-'+hall+'-'+l);
  if(actualEl) actualEl.dataset.manual = '1';
}
function parseHpNumericInput(val){
  const normalized = String(val ?? '').replace(/,/g, '').trim();
  return normalized === '' ? 0 : Number(normalized);
}
async function saveHallPower(){
  const date = document.getElementById('hp-date').value;
  if(!date){ showToast('⚠️ حدد التاريخ'); return; }
  const halls = HALL_POWER_HALLS.map(hall => ({
    hall,
    lines: (HALL_POWER_LINES[hall]||[]).map(l => ({
      line: l,
      basic: Number(document.getElementById('hp-basic-'+hall+'-'+l).value)||0,
      clearance: Number(document.getElementById('hp-clear-'+hall+'-'+l).value)||0,
      absence: Number(document.getElementById('hp-absent-'+hall+'-'+l).value)||0,
      manualActual: parseHpNumericInput(document.getElementById('hp-actual-'+hall+'-'+l).value)
    }))
  }));
  if(editingHallPowerId){
    const idx = HALL_POWER.findIndex(p=>p.id===editingHallPowerId);
    if(idx>-1) HALL_POWER[idx] = {...HALL_POWER[idx], date, halls};

    showToast(`✅ اتحفظت قوة كل الصالات يوم ${date}`);
  }
  renderHallPowerRegTab();
}

function applyHpFilter(){
  const from = document.getElementById('hpf-from').value;
  const to = document.getElementById('hpf-to').value;
  const hall = document.getElementById('hpf-hall').value;
  const results = document.getElementById('hp-results');
  let recs = HALL_POWER.filter(p => p.date >= from && p.date <= to);
  if(!recs.length){ results.innerHTML = '<div class="empty-state">مفيش بيانات قوة صالة في الفترة دي.</div>'; return; }

  // تجميع لكل خط: مجموع تصفية، مجموع غياب، متوسط فعلي
  const lineMap = new Map(); // key: hall|line
  recs.forEach(p => (p.halls||[]).forEach(h => {
    if(hall !== '__ALL__' && h.hall !== hall) return;
    h.lines.forEach(l => {
      const key = h.hall+'|'+l.line;
      if(!lineMap.has(key)) lineMap.set(key, {hall:h.hall, line:l.line, basicSum:0, clearanceSum:0, absenceSum:0, actualSum:0, days:0});
      const e = lineMap.get(key);
      e.basicSum += l.basic||0;
      e.clearanceSum += l.clearance||0;
      e.absenceSum += l.absence||0;
      // prefer manualActual if present on the recorded line
      e.actualSum += (typeof l.manualActual !== 'undefined') ? (Number(l.manualActual)||0) : ((l.basic||0)-(l.clearance||0)-(l.absence||0));
      if(typeof l.manualActual !== 'undefined') e.manualActual = l.manualActual;
      e.days++;
    });
  }));
  if(!lineMap.size){ results.innerHTML = '<div class="empty-state">مفيش بيانات قوة صالة في الفترة دي.</div>'; return; }
  const entries = [...lineMap.values()].map(e => ({...e,
    avgActual: e.days? Math.round(e.actualSum/e.days) : 0,
    avgBasic: e.days? Math.round(e.basicSum/e.days) : 0
  }));

  const maxClearance = Math.max(...entries.map(e=>e.clearanceSum));
  const maxAbsence = Math.max(...entries.map(e=>e.absenceSum));
  const topClearanceLines = entries.filter(e=>e.clearanceSum===maxClearance && maxClearance>0);
  const topAbsenceLines = entries.filter(e=>e.absenceSum===maxAbsence && maxAbsence>0);

  const isRange = from !== to;
  results.innerHTML = `
    <div class="jard-hall-summary">
      <h4><span>🏆 أعلى تصفية وأعلى غياب في الفترة</span></h4>
      <div class="data-note" style="margin-bottom:8px;">أعلى تصفية (${fmtNum(maxClearance)}): ${topClearanceLines.length? topClearanceLines.map(e=>`<span class="power-max-badge">${e.hall} — خط ${e.line}</span>`).join('') : 'لا يوجد'}</div>
      <div class="data-note">أعلى غياب (${fmtNum(maxAbsence)}): ${topAbsenceLines.length? topAbsenceLines.map(e=>`<span class="power-max-badge">${e.hall} — خط ${e.line}</span>`).join('') : 'لا يوجد'}</div>
    </div>
    <div class="section-title">${isRange? '���� متوسط العدد الفعلي لكل خط خلال الفترة' : '📋 التفاصيل ليوم '+from}</div>
    ${[...new Set(entries.map(e=>e.hall))].map(h => `
      <div class="jard-hall-summary">
        <h4><span>${h}</span></h4>
        <div class="jard-line-row head"><span>خط</span><span>أساسي</span><span>${isRange?'متوسط فعلي':'فعلي'}</span><span>إجمالي تصفية</span><span>إجمالي غياب</span></div>
        ${entries.filter(e=>e.hall===h).sort((a,b)=>String(a.line).localeCompare(String(b.line),'en',{numeric:true})).map(e=>{
          const actualCell = isRange? fmtNum(e.avgActual) : fmtNum(e.actualSum);
          return `<div class="jard-line-row"><span><b>${e.line}</b></span><span>${isRange?e.avgBasic:fmtNum(e.basicSum)}</span><span>${actualCell}</span><span>${fmtNum(e.clearanceSum)}</span><span>${fmtNum(e.absenceSum)}</span></div>`;
        }).join('')}
      </div>
    `).join('')}
  `;
}
