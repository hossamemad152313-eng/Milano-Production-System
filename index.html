<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MILANO SPORT SHOES | Production System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  @media print{
    @page{ size:A4; margin:10mm; }
    @page landscape-page{ size:A4 landscape; margin:10mm; }
    body.print-rank-only .phone{ display:none !important; }
    body.print-rank-only #print-rank-output{ display:block !important; }
    body:not(.print-rank-only) #print-rank-output{ display:none !important; }
    #login-view, header.top .logout-btn, .tabs, .filters, .add-row-btn, .save-btn, footer.tag, .search-box { display:none !important; }
    body, .phone{ background:#fff !important; box-shadow:none !important; max-width:100% !important; display:block !important; }
    .phone{ margin:0 auto !important; }
    .worker-card{ break-inside:avoid; }
    #print-rank-output table tr{ page-break-inside:avoid; break-inside:avoid; }
    #print-rank-output table thead{ display:table-header-group; }
  }
  #print-rank-output{ display:none; padding:24px; font-family:'Cairo',sans-serif; direction:rtl; text-align:center; color:#000; }
  #print-rank-output .print-sheet{ min-height:auto; }
  #print-rank-output .print-header{ margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid #E7DCCF; }
  #print-rank-output .print-header-top{ font-size:12px; color:#777; margin-bottom:6px; }
  #print-rank-output .print-title-row{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  #print-rank-output .print-title{ font-size:20px; font-weight:800; margin-bottom:4px; }
  #print-rank-output .print-signature{ font-size:10px; font-weight:400; color:#999; letter-spacing:.3px; }
  #print-rank-output .print-period{ font-size:13px; color:#333; }
  #print-rank-output .print-body{ margin-bottom:24px; }
  #print-rank-output h2{ font-size:20px; margin-bottom:4px; text-align:center; font-weight:800; }
  #print-rank-output h3{ font-size:14px; color:#333; margin-bottom:16px; font-weight:700; text-align:center; }
  #print-rank-output table{
    width:auto; min-width:75%; max-width:100%; border-collapse:separate; border-spacing:0; border:1px solid #D7CAB8;
    margin:0 auto 24px; box-shadow:0 10px 30px rgba(0,0,0,.08); border-radius:18px; overflow:hidden;
  }
  #print-rank-output th, #print-rank-output td{
    border-bottom:1px solid #E4D9C8; padding:12px 14px; font-size:13px; font-weight:600; text-align:center; color:#1F1F1F;
  }
  #print-rank-output th{
    background:#F8EFE1; font-weight:800; font-size:14px; color:#2A2A2A;
  }
  #print-rank-output td{
    background:#FFFFFF;
  }
  #print-rank-output tr:nth-child(even) td{ background:#FBF7F1; }
  #print-rank-output tr:last-child td{ border-bottom:none; }
  #print-rank-output tr:first-child th:first-child{ border-top-left-radius:18px; }
  #print-rank-output tr:first-child th:last-child{ border-top-right-radius:18px; }
  #print-rank-output tr:last-child td:first-child{ border-bottom-left-radius:18px; }
  #print-rank-output tr:last-child td:last-child{ border-bottom-right-radius:18px; }
  #print-rank-output .total-row td{ background:#F4E7D3; font-weight:800; }
  #print-rank-output table.print-onepage th, #print-rank-output table.print-onepage td{
    padding:10px 14px; font-size:13px;
  }
  #print-rank-output.deficit-compact-print{ padding:14px; }
  #print-rank-output.deficit-compact-print h2{ font-size:16px; margin-bottom:2px; }
  #print-rank-output.deficit-compact-print h3{ font-size:10.5px; margin-bottom:8px; font-weight:700; }
  #print-rank-output.deficit-compact-print table{ margin:0 auto 10px; box-shadow:none; border-radius:10px; }
  #print-rank-output.deficit-compact-print table.print-onepage th,
  #print-rank-output.deficit-compact-print table.print-onepage td{
    padding:4px 8px; font-size:11px; font-weight:800;
  }
  #print-rank-output .target-print-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; text-align:right;
  }
  #print-rank-output .target-print-card{ break-inside:avoid; page-break-inside:avoid; }
  #print-rank-output .target-print-card-full{ grid-column:1 / -1; display:flex; justify-content:center; }
  #print-rank-output .target-print-card-full table.target-print-table{ width:50%; min-width:280px; }
  #print-rank-output table.target-print-table{ width:100%; min-width:0; margin:0; }
  #print-rank-output table.target-print-table tr.total-row td{ background:#F4E7D3; font-weight:800; text-align:center; }
  #print-rank-output table.target-print-table th{
    font-size:14px; font-weight:800;
  }
  #print-rank-output table.target-print-table thead tr:first-child th{
    background:#2A2A2A; color:#fff; font-size:14px; text-align:center;
  }
  #print-rank-output table.target-print-table td{
    font-size:13.5px; font-weight:700; padding:8px 10px;
  }
  @media print{
    #print-rank-output .target-print-grid{ gap:8px; }
    #print-rank-output .target-print-card table{ box-shadow:none; }
  }
  #print-rank-output.landscape-mode{ page: landscape-page; }
  #print-rank-output .power-print-grid{
    display:flex; flex-wrap:wrap; align-items:flex-start; gap:12px; margin-bottom:14px;
    break-inside:avoid; page-break-inside:avoid;
  }
  #print-rank-output .power-print-card{
    flex:0 0 calc(25% - 9px); max-width:calc(25% - 9px); break-inside:avoid; page-break-inside:avoid;
  }
  #print-rank-output table.power-print-table{ width:100%; min-width:0; margin:0; }
  #print-rank-output table.power-print-table th{ font-size:14px; font-weight:800; }
  #print-rank-output table.power-print-table thead tr:first-child th{
    background:#2A2A2A; color:#fff; font-size:14px; text-align:center;
  }
  #print-rank-output table.power-print-table td{
    font-size:13.5px; font-weight:700; padding:7px 9px; text-align:center;
  }
  #print-rank-output table.power-print-table tr.total-row td{
    background:#F4E7D3; font-weight:800;
  }
  #print-rank-output .power-print-total table.power-print-table thead tr:first-child th{
    background:#3A4257;
  }
  #print-rank-output .hp-print-card{ flex:0 0 calc(25% - 9px); max-width:calc(25% - 9px); }
  #print-rank-output table.hp-print-table{ width:100%; min-width:0; margin:0; }
  #print-rank-output table.hp-print-table th{ font-size:9.5px; font-weight:800; padding:2.5px 4px; }
  #print-rank-output table.hp-print-table thead tr:first-child th{
    background:#2A2A2A; color:#fff; font-size:10px; text-align:center;
  }
  #print-rank-output table.hp-print-table td{
    font-size:9px; font-weight:800; padding:2px 4px; text-align:center;
  }
  #print-rank-output table.hp-print-table tr.total-row td{
    background:#F4E7D3; font-weight:800;
  }
  #print-rank-output .power-print-total table.hp-print-table thead tr:first-child th{
    background:#3A4257;
  }
  #print-rank-output .power-print-total-bar{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    background:#3A4257; color:#fff; border-radius:8px; padding:6px 14px; margin-top:5px;
    break-inside:avoid; page-break-inside:avoid;
  }
  #print-rank-output .power-print-total-bar .ptb-label{ font-weight:800; font-size:11.5px; white-space:nowrap; }
  #print-rank-output .power-print-total-bar .ptb-item{ display:flex; gap:6px; align-items:baseline; font-size:10.5px; white-space:nowrap; }
  #print-rank-output .power-print-total-bar .ptb-item span{ opacity:.75; font-weight:600; }
  #print-rank-output .power-print-total-bar .ptb-item b{ font-weight:800; font-size:12.5px; }
  #print-rank-output.hp-compact-print{ padding:10px; }
  #print-rank-output.hp-compact-print .print-header{ margin-bottom:5px; padding-bottom:4px; }
  #print-rank-output.hp-compact-print .print-title{ font-size:15px; }
  #print-rank-output.hp-compact-print .print-signature{ font-size:8px; }
  #print-rank-output.hp-compact-print .print-period{ font-size:10px; }
  #print-rank-output.hp-compact-print .power-print-grid{ gap:5px; margin-bottom:5px; }
  #print-rank-output.hp-compact-print h2{ font-size:12px; margin-bottom:1px; }
  #print-rank-output.hp-compact-print h3{ font-size:9px; margin-bottom:4px; }
  #print-rank-output .power-print-card.target-card{ flex:0 0 calc(20% - 6px); max-width:calc(20% - 6px); }
  #print-rank-output.hp-compact-print table.target-print-table{ border-radius:8px; }
  #print-rank-output.hp-compact-print table.target-print-table th{
    font-weight:800; font-size:9.5px; padding:3px 4px;
  }
  #print-rank-output.hp-compact-print table.target-print-table thead tr:first-child th{ font-size:9.5px; padding:3px 4px; }
  #print-rank-output.hp-compact-print table.target-print-table td{
    font-weight:800; font-size:9px; padding:2.5px 4px;
  }
  :root{
    --navy:#12161F;
    --navy-2:#1D2433;
    --paper:#F4F1EC;
    --amber:#E7A335;
    --amber-dark:#C7841C;
    --green:#3E8F63;
    --red:#C24B37;
    --red-dark:#8F2F20;
    --line:#DAD4C6;
    --muted:#6D7280;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{ height:100%; }
  body{ font-family:'Cairo', sans-serif; background: var(--paper); color: var(--navy); min-height:100vh; height:100%; display:flex; justify-content:center; }
  .phone{ width:100%; max-width:460px; min-height:100vh; background:#fff; position:relative; box-shadow:0 0 40px rgba(0,0,0,.08); display:flex; flex-direction:column; }
  .num{ font-family:'JetBrains Mono', monospace; font-weight:700; }

  /* ---------- LOGIN ---------- */
  #login-view{
    flex:1; background: radial-gradient(circle at 30% 0%, #232C43 0%, var(--navy) 55%); color:#fff;
    display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:34px 28px; position:relative; overflow:hidden;
  }
  #login-view::before{
    content:""; position:absolute; inset:-20%;
    background-image: repeating-linear-gradient(115deg, rgba(231,163,53,.07) 0 3px, transparent 3px 34px);
    pointer-events:none;
  }
  #login-view::after{
    content:""; position:absolute; width:340px; height:340px; border-radius:50%;
    background: radial-gradient(circle, rgba(231,163,53,.16), transparent 70%);
    top:-120px; left:-100px; pointer-events:none;
  }
  .logo-block{ position:relative; z-index:2; margin-bottom:36px; display:flex; flex-direction:column; align-items:center; width:100%; }
  .sneaker-icon{ width:150px; height:auto; display:block; margin:0 auto 10px; filter:drop-shadow(0 4px 10px rgba(231,163,53,.25)); }
  .logo-stripe{ width:44px; height:5px; background:var(--amber); border-radius:3px; margin:0 auto 14px; transform:skewX(-20deg); }
  .logo-word{ font-family:'Oswald', sans-serif; font-size:34px; font-weight:700; letter-spacing:.03em; line-height:1; text-align:center; }
  .logo-word span{ color:var(--amber); }
  .logo-sub{ font-family:'Oswald', sans-serif; font-size:13px; letter-spacing:.5em; color:#9CA3B5; margin-top:6px; text-align:center; }
  .logo-caption{ font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.12em; color:#6E7690; margin-top:14px; text-align:center; }

  #login-view .field{ margin-bottom:16px; position:relative; z-index:2; width:100%; max-width:340px; }
  .field label{ display:block; font-size:12px; color:#B9BFCF; margin-bottom:6px; text-align:center; }
  .field select, .field input{
    width:100%; padding:13px 20px; border-radius:999px; border:1px solid #3A4257; background:#1B2233; color:#fff;
    font-family:'Cairo', sans-serif; font-size:15px; transition:border-color .2s ease, box-shadow .2s ease;
  }
  .field select:focus, .field input:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.22); }
  .btn-primary{
    width:100%; max-width:340px; padding:14px; border:none; border-radius:999px; background: linear-gradient(90deg,var(--amber),var(--amber-dark));
    color: var(--navy); font-family:'Cairo', sans-serif; font-weight:800; font-size:15px; cursor:pointer; margin-top:8px; position:relative; z-index:2;
    box-shadow:0 6px 18px rgba(231,163,53,.28); transition:transform .15s ease;
  }
  .btn-primary:active{ transform: translateY(1px); }
  .login-err{ color:#F3A9A0; font-size:13px; margin-top:10px; min-height:16px; position:relative; z-index:2; text-align:center; width:100%; max-width:340px; }
  .login-foot{
    margin-top:30px; font-size:10.5px; color:#6E7690; letter-spacing:.05em; border-top:1px dashed #333B50; padding-top:14px;
    position:relative; z-index:2; font-family:'JetBrains Mono',monospace; text-align:center; width:100%; max-width:340px;
  }

  /* ---------- APP SHELL ---------- */
  #app-view{ display:none; flex:1; flex-direction:column; }
  header.top{ background: var(--navy); color:#fff; padding:16px 18px 0; position:sticky; top:0; z-index:20; }
  header.top .row1{ display:flex; justify-content:center; align-items:center; margin-bottom:12px; position:relative; }
  header.top .hall-badge{
    display:inline-flex; flex-direction:column; align-items:center; gap:3px;
    background:linear-gradient(180deg, rgba(231,163,53,.16), rgba(231,163,53,.05));
    border:1px solid rgba(231,163,53,.4); border-radius:999px; padding:9px 30px 8px;
    box-shadow:0 4px 14px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.05);
    text-align:center; max-width:calc(100% - 90px);
  }
  header.top .hall-name{ font-size:14.5px; font-weight:800; letter-spacing:.02em; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  header.top .hall-sub{ font-size:10px; color:var(--amber); font-family:'JetBrains Mono',monospace; letter-spacing:.05em; margin-top:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .logout-btn{
    position:absolute; left:0; top:50%; transform:translateY(-50%);
    background:none; border:1px solid #3A4257; color:#B9BFCF; font-family:'Cairo',sans-serif; font-size:11px; padding:7px 12px; border-radius:20px; cursor:pointer;
    transition:border-color .2s ease, color .2s ease;
  }
  .logout-btn:hover{ border-color:var(--amber); color:var(--amber); }
  .notify-btn{
    position:absolute; right:0; top:50%; transform:translateY(-50%);
    background:none; border:1px solid #25D366; color:#25D366; font-family:'Cairo',sans-serif; font-size:11px; padding:7px 12px; border-radius:20px; cursor:pointer;
    transition:background .2s ease;
  }
  .notify-btn:hover{ background:rgba(37,211,102,.12); }
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9999;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-box{
    background:#1B2030; border:1px solid #3A4257; border-radius:18px 18px 0 0;
    width:100%; max-width:420px; padding:18px; max-height:88vh; overflow-y:auto;
  }
  .modal-box h3{ margin:0 0 12px; font-size:15px; color:#fff; }
  .modal-box .field{ margin-bottom:10px; }
  .modal-box .field label{ display:block; font-size:11.5px; color:#B9BFCF; margin-bottom:4px; }
  .modal-box .close-btn{ position:absolute; left:16px; top:14px; background:none; border:none; color:#B9BFCF; font-size:20px; cursor:pointer; }
  .modal-box-wrap{ position:relative; }
  .tabs{
    display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; align-items:center;
    background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.06); border-radius:999px;
    padding:5px; margin-bottom:14px;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab-btn{
    flex:0 0 auto; min-width:84px; text-align:center; background:transparent; border:1px solid transparent; color:#8891A4; font-family:'Cairo',sans-serif; font-size:12.5px;
    font-weight:700; padding:10px 18px; cursor:pointer; border-radius:999px; white-space:nowrap; transition:background .2s ease, color .2s ease, box-shadow .2s ease, transform .15s ease;
  }
  .tab-btn:hover{ color:#E8EAF0; background:rgba(255,255,255,.06); }
  .tab-btn.active{
    color:var(--navy); background:linear-gradient(90deg,var(--amber),var(--amber-dark));
    box-shadow:0 5px 16px rgba(231,163,53,.35); transform:translateY(-1px);
  }
  .tab-btn.active:hover{ color:var(--navy); }

  main{ padding:16px 14px 40px; flex:1; }

  /* شكل بيضاوي شيك افتراضي لأي خانة كتابة في التطبيق مالهاش تنسيق خاص بيها */
  main input:not([type="checkbox"]):not([type="radio"]), main select, main textarea{
    border-radius:999px; border:1px solid var(--line); padding:9px 14px; font-family:'Cairo',sans-serif;
    font-size:13px; background:#fff; color:var(--navy); transition:border-color .2s ease, box-shadow .2s ease;
  }
  main input:not([type="checkbox"]):not([type="radio"]):focus, main select:focus, main textarea:focus{
    outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.15);
  }

  .card-box{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:14px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .bestperf-grid{ display:grid; grid-template-columns:1fr; gap:18px; }
  .bestperf-grid > .card-box{ min-width:0; }
  @media (min-width: 860px){
    .bestperf-grid{ grid-template-columns:1fr 1fr; }
  }
  .filters label{ font-size:10.5px; color:var(--muted); display:block; margin-bottom:4px; font-weight:600;}
  .filters input, .filters select, .rowcard select, .rowcard input{
    width:100%; padding:10px 16px; border-radius:999px; border:1px solid var(--line); font-family:'Cairo',sans-serif; font-size:13px; background:#FBFAF7;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .filters input:focus, .filters select:focus, .rowcard select:focus, .rowcard input:focus{
    outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.15); background:#fff;
  }
  .filters .full{ grid-column:1/-1; margin-top:10px; }
  .apply-btn{ width:100%; padding:12px; border:none; border-radius:999px; background:var(--navy); color:#fff; font-weight:700; font-size:14px; cursor:pointer; margin-top:12px; transition:transform .15s ease, box-shadow .2s ease; }
  .apply-btn:active{ transform:translateY(1px); }
  .btn-amber{ background:linear-gradient(90deg,var(--amber),var(--amber-dark)); color:var(--navy); box-shadow:0 5px 14px rgba(231,163,53,.28); }
  .data-note{ font-size:10px; color:var(--muted); margin-top:8px; text-align:center; }

  .summary-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .kpi{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 13px; }
  .kpi .lbl{ font-size:10.5px; color:var(--muted); margin-bottom:5px; }
  .kpi .val{ font-size:18px; }
  .kpi .sub{ font-size:10.5px; color:var(--muted); margin-top:3px; }
  .kpi.good .val{ color:var(--green); }
  .kpi.bad .val{ color:var(--red); }
  .kpi.amber .val{ color:var(--amber-dark); }

  .perf-bar-wrap{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .perf-bar-wrap .lbl{ font-size:12px; color:var(--muted); margin-bottom:10px; font-weight:700; }
  .track{ height:14px; border-radius:7px; background:repeating-linear-gradient(90deg,#EFEBE1 0 8px,#E6E1D3 8px 9px); overflow:hidden; position:relative; }
  .fill{ height:100%; border-radius:7px; background:linear-gradient(90deg,var(--amber),var(--amber-dark)); transition:width .4s; }
  .track-labels{ display:flex; justify-content:space-between; margin-top:8px; font-size:15px; font-weight:800; }

  .aatal-strip{ display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px; }
  .aatal-chip{ flex:0 0 auto; background:#FBF2DF; border:1px solid #EEDBA8; color:var(--amber-dark); font-size:11px; padding:7px 11px; border-radius:20px; font-weight:700; white-space:nowrap; }

  .section-title{ font-size:13px; font-weight:800; margin:4px 2px 10px; display:flex; justify-content:space-between; align-items:center; }
  .section-title .count{ font-weight:600; color:var(--muted); font-size:11.5px; }

  .search-box{ width:100%; padding:11px 18px; border-radius:999px; border:1px solid var(--line); font-family:'Cairo',sans-serif; font-size:13px; margin-bottom:10px; background:#fff; transition:border-color .2s ease, box-shadow .2s ease; }
  .search-box:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.15); }

  .worker-card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:9px; }
  .worker-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; }
  .worker-name{ font-size:13.5px; font-weight:700; }
  .worker-code{ font-size:10.5px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
  .worker-pct{ font-size:16px; padding:4px 10px; border-radius:20px; font-weight:800; }
  .pct-good{ background:#E4F3EA; color:var(--green); }
  .pct-mid{ background:#FDF1DC; color:var(--amber-dark); }
  .pct-bad{ background:#FBE9E5; color:var(--red); }
  .worker-metrics{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:6px; }
  .wm{ background:#FAF9F6; border-radius:8px; padding:6px 7px; text-align:center; }
  .wm .l{ font-size:9.5px; color:var(--muted); }
  .wm .v{ font-size:12.5px; font-weight:700; }
  .wm .p{ font-size:9.5px; color:var(--muted); }
  .worker-lines{ margin-top:4px; font-size:10px; color:var(--muted); }

  .empty-state{ text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }

  .rank-wrap{ display:flex; gap:10px; margin-bottom:14px; }
  .rank-col{ flex:1; background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; }
  .rank-col h4{ font-size:12px; margin-bottom:8px; }
  .rank-col.top h4{ color:var(--green); }
  .rank-col.bottom h4{ color:var(--red); }
  .rank-item{ display:flex; justify-content:space-between; font-size:11px; padding:6px 0; border-bottom:1px dashed var(--line); }
  .rank-item:last-child{ border-bottom:none; }
  .rank-note{ font-size:10px; color:var(--muted); margin-bottom:10px; text-align:center; }

  /* ---------- JARD (الجرد) ---------- */
  .jard-art-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:6px; }
  .jard-art-grid input{ padding:7px 4px; font-size:11.5px; border-radius:999px; border:1px solid var(--line); text-align:center; transition:box-shadow .2s ease; }
  .jard-art-grid input:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.15); }
  .jline-card{ background:#fff; border:2px solid var(--amber); border-radius:16px; padding:14px; margin-bottom:14px; }
  .jline-card .rowhead{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .jline-card .rowhead .line-badge{ background:var(--navy); color:#fff; font-weight:800; font-family:'JetBrains Mono',monospace; padding:8px 16px; border-radius:999px; font-size:15px; }
  .jline-card label{ display:block; font-size:10px; color:var(--muted); font-weight:700; margin-bottom:4px; }
  .jline-card input, .jline-card select{
    width:100%; padding:9px 14px; text-align:center; border-radius:999px; border:1.5px solid var(--amber);
    font-weight:700; font-family:'Cairo',sans-serif; background:#FFFCF5; color:var(--navy); font-size:13px; transition:box-shadow .2s ease;
  }
  .jline-card input:focus{ outline:none; border-color:var(--navy); background:#fff; box-shadow:0 0 0 3px rgba(18,22,31,.12); }
  .jline-card .jfield{ margin-bottom:9px; }

  /* ---------- جدول الأرتيكلات المسطح (60 صف لكل صالة) ---------- */
  .jflat-wrap{ overflow:auto; border:1px solid var(--line); border-radius:12px; margin-bottom:14px; max-height:min(560px, 62vh); }
  .jflat-table{ border-collapse:collapse; width:100%; min-width:520px; }
  .jflat-table th{ background:var(--navy); color:#fff; font-size:10.5px; padding:8px 4px; position:sticky; top:0; z-index:15; box-shadow:0 1px 0 rgba(0,0,0,.15); }
  .jflat-table td{ padding:2px; border-bottom:1px solid var(--line); }
  .jflat-table td:first-child{ text-align:center; font-size:9.5px; color:var(--muted); font-family:'JetBrains Mono',monospace; width:26px; }
  .jflat-table input{ width:100%; min-width:64px; padding:6px 4px; border:none; text-align:center; font-size:11.5px; font-family:'Cairo',sans-serif; background:transparent; }
  .jflat-table input:focus{ background:#FBF2DF; outline:1px solid var(--amber); }
  .jflat-table tr:nth-child(even){ background:#FAF9F6; }
  .jard-hall-summary{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
  .jard-hall-summary h4{ font-size:13.5px; margin-bottom:10px; display:flex; justify-content:space-between; }
  .jard-line-row{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; font-size:10.5px; text-align:center; padding:6px 0; border-bottom:1px dashed var(--line); }
  .jard-line-row.head{ font-weight:800; color:var(--muted); font-size:9.5px; }
  .jard-line-row b{ font-family:'JetBrains Mono',monospace; }
  .jempty-warn{ background:#FBE9E5 !important; border-color:var(--red) !important; }

  .jline-result-card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .jline-result-card .jr-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; }
  .jline-result-card .jr-line{ font-size:13.5px; font-weight:800; }
  .jline-result-card .jr-sup{ font-size:10.5px; color:var(--muted); }
  .jline-result-card .jr-success{ font-size:16px; padding:4px 10px; border-radius:20px; font-weight:800; }
  .jr-metrics{ display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .jr-metrics .wm{ background:#FAF9F6; border-radius:8px; padding:6px 5px; text-align:center; }
  .jr-metrics .wm .l{ font-size:9px; color:var(--muted); }
  .jr-metrics .wm .v{ font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace; }
  .jr-metrics .wm .p{ font-size:9px; color:var(--muted); }

  /* ---------- التارجت (موديول جديد) ---------- */
  .ttab-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--line); border-radius:10px; margin-bottom:10px; }
  .ttab{ border-collapse:collapse; width:100%; min-width:400px; }
  .ttab th{ background:var(--amber-dark); color:#fff; font-size:10px; padding:6px 6px; text-align:center; white-space:nowrap; }
  .ttab td{ padding:5px 6px; border-bottom:1px solid var(--line); text-align:center; white-space:nowrap; }
  .ttab td:first-child{ text-align:center; font-size:9px; color:var(--muted); width:22px; white-space:nowrap; }
  .ttab input{ width:100%; min-width:60px; padding:5px 4px; border:none; text-align:center; font-size:11px; background:transparent; }
  .ttab input:focus{ background:#FBF2DF; outline:1px solid var(--amber); }
  .ttab tr:nth-child(even){ background:#FAF9F6; }
  /* ---------- جدول تنفيذ التارجت (خط أوضح وأكبر، مع مسافات معقولة من غير ما نحتاج سحب/swipe) ---------- */
  .ttab-exec-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--line); border-radius:8px; margin-bottom:10px; }
  .ttab-exec{ border-collapse:collapse; width:100%; min-width:0; table-layout:fixed; }
  .ttab-exec th{ background:var(--amber-dark); color:#fff; font-size:10.5px; font-weight:800; padding:6px 3px; text-align:center; white-space:normal; line-height:1.2; word-break:break-word; }
  .ttab-exec td{ padding:5px 3px; border-bottom:1px solid var(--line); text-align:center; font-size:11px; font-weight:700; white-space:normal; word-break:break-word; }
  .ttab-exec td:first-child{ text-align:center; font-size:11px; font-weight:700; color:var(--muted); white-space:normal; word-break:break-word; }
  .ttab-exec input{ width:100%; min-width:0; padding:4px 2px; border:none; text-align:center; font-size:11px; font-weight:700; background:transparent; }
  .ttab-exec input:focus{ background:#FBF2DF; outline:1px solid var(--amber); }
  .ttab-exec .hm-pair{ display:flex; align-items:center; justify-content:center; gap:2px; }
  .ttab-exec .hm-pair input{ width:26px; flex:0 0 26px; padding:4px 0; }
  .ttab-exec .hm-pair span{ font-size:10px; color:var(--muted); }
  .ttab-exec .act-cell{ display:flex; align-items:center; justify-content:center; gap:6px; }
  .ttab-exec .act-cell input[type="checkbox"]{
    appearance:none; -webkit-appearance:none; -moz-appearance:none;
    width:40px; height:22px; margin:0; padding:0;
    border-radius:999px; border:1.5px solid var(--line); background:#FBFAF7;
    position:relative; cursor:pointer; outline:none; flex:0 0 auto;
    transition:background .15s ease, border-color .15s ease;
  }
  .ttab-exec .act-cell input[type="checkbox"]::after{
    content:''; position:absolute; top:2px; right:2px; width:16px; height:16px;
    border-radius:50%; background:#fff; border:1px solid var(--line);
    transition:right .15s ease, border-color .15s ease;
  }
  .ttab-exec .act-cell input[type="checkbox"]:checked{ background:var(--green); border-color:var(--green); }
  .ttab-exec .act-cell input[type="checkbox"]:checked::after{ right:20px; border-color:var(--green); }
  .ttab-exec .act-cell input[type="checkbox"]:hover{ border-color:var(--green); }
  .ttab-exec .act-cell .op-btn{ padding:2px 5px; font-size:11px; }
  .ttab-exec tr:nth-child(even){ background:#FAF9F6; }
  .pct-pill{ display:inline-flex; align-items:center; justify-content:center; min-width:80px; padding:4px 10px; border-radius:999px; background:#F9F0D8; color:#8A5A12; font-weight:800; font-size:11px; border:1px solid rgba(234,194,121,0.5); }
  .twork-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:8px; }
  .twork-grid input{ padding:6px 4px; font-size:10.5px; border-radius:999px; border:1px solid var(--line); text-align:center; transition:box-shadow .2s ease; }
  .twork-grid input:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.15); }

  /* ---------- قوة الصالة / قوة السهر ---------- */
  .power-line-card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; }
  .power-line-card .rowhead{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .power-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .power-grid .pf{ text-align:center; }
  .power-grid label{ display:block; font-size:9.5px; color:var(--muted); margin-bottom:3px; }
  .power-grid input{ width:100%; padding:8px 4px; text-align:center; border-radius:999px; border:1.5px solid var(--amber); font-weight:700; background:#FFFCF5; transition:box-shadow .2s ease; }
  .power-grid input:focus{ outline:none; box-shadow:0 0 0 3px rgba(231,163,53,.2); }
  .power-actual{ background:var(--navy); color:#fff; border-radius:7px; padding:8px 2px; font-weight:800; text-align:center; }
  .power-max-badge{ background:#FBE9E5; color:var(--red); border-radius:8px; padding:3px 9px; font-size:10.5px; font-weight:800; display:inline-block; margin:2px; }
  .hp-summary-row{ display:flex; flex-wrap:wrap; gap:6px; align-items:stretch; }
  .hp-mini-box{ flex:1 1 130px; min-width:110px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:6px 8px; }
  .hp-mini-title{ font-size:9.5px; font-weight:800; color:var(--muted); text-align:center; margin-bottom:4px; }
  .hp-mini-val{ font-size:10px; text-align:center; }
  .hp-mini-val .power-max-badge{ font-size:9.5px; padding:2px 6px; margin:1px; }
  .hp-daily-box{ flex:2 1 200px; }
  .hp-daily-chips{ display:flex; flex-wrap:wrap; gap:4px; justify-content:center; max-height:64px; overflow-y:auto; }
  .hp-daily-chip{ background:#F3F1EC; border-radius:6px; padding:2px 6px; font-size:9px; font-weight:700; white-space:nowrap; color:#4A4A4A; }
  .hp-daily-chip b{ color:var(--navy); }
  .np-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .np-card{ background:#fff; border:2px solid var(--amber); border-radius:14px; padding:14px 12px; text-align:center; box-shadow:0 3px 10px rgba(231,163,53,.12); }
  .np-card .np-hall{ display:inline-block; background:var(--navy); color:#fff; font-weight:800; padding:6px 16px; border-radius:8px; font-size:13px; margin-bottom:10px; font-family:'JetBrains Mono',monospace; }
  .np-card label{ display:block; font-size:10.5px; color:var(--muted); font-weight:700; margin-bottom:6px; }
  .np-card input{ width:100%; padding:12px 10px; text-align:center; font-size:22px; font-weight:800; font-family:'JetBrains Mono',monospace; border:1.5px solid var(--amber); border-radius:999px; background:#FFFCF5; color:var(--navy); transition:box-shadow .2s ease; }
  .np-card input:focus{ outline:none; border-color:var(--navy); background:#fff; box-shadow:0 0 0 3px rgba(18,22,31,.12); }

  /* ---------- ENTRY TAB ---------- */
  .entry-table{ min-width:1050px; }
  .entry-table th{ font-size:12.5px; padding:9px 5px; line-height:1.25; }
  .entry-table input[type="number"]{ min-width:58px; font-size:16px; font-weight:800; padding:8px 4px; }
  .entry-table .ename{ min-width:180px; text-align:right; font-size:13px; font-weight:700; padding:8px 8px !important; }
  .entry-table .ename.found{ color:var(--green); font-weight:700; background:#E4F3EA !important; border-radius:6px; }
  .entry-table .ename.missing{ color:var(--red); background:#FBE9E5 !important; border-radius:6px; }
  .entry-table input[type="date"]{ min-width:112px; font-size:11px; }
  .entry-table .rownum{ font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--amber-dark); font-weight:800; text-align:center; }
  /* الخانة اللي بتتكتب فيها دلوقتي تتلون بالأحمر، والصف كله يتحدد عشان تلاقيه بسهولة */
  .entry-table input:focus{
    background:var(--red) !important;
    color:#fff !important;
    outline:2px solid var(--red-dark);
    outline-offset:-2px;
    font-weight:800;
  }
  .entry-table tr.row-active{ background:#FBE4DF; }
  .entry-table tr.row-active td:first-child{ background:var(--amber); color:var(--navy); font-weight:800; border-radius:4px; }
  .entry-table input:disabled{ opacity:.35; }
  .rowcard{ background:#FAF9F6; border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px; position:relative; }
  .rowcard .rowhead{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .rowcard .rownum{ font-size:11px; font-weight:800; color:var(--amber-dark); font-family:'JetBrains Mono',monospace; }
  .rm-row-btn{ background:none; border:none; color:var(--red); font-size:16px; cursor:pointer; }
  .rowcard .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
  .name-preview{ font-size:11.5px; padding:8px 10px; border-radius:8px; background:#fff; border:1px dashed var(--line); margin-bottom:8px; min-height:16px;}
  .name-preview.found{ color:var(--green); border-style:solid; border-color:#BFE0CC; }
  .name-preview.missing{ color:var(--red); border-style:solid; border-color:#F0C4BC; }
  .aatal-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:6px; }
  .aatal-grid .ag{ text-align:center; }
  .aatal-grid label{ display:block; font-size:9.5px; color:var(--muted); margin-bottom:3px; }
  .aatal-grid input{ text-align:center; padding:6px 2px; font-size:12px; }
  .add-row-btn{ width:100%; padding:12px; border:2px dashed var(--amber); border-radius:999px; background:#FBF2DF; color:var(--amber-dark); font-weight:800; font-size:13px; cursor:pointer; margin-bottom:14px; transition:background .2s ease; }
  .add-row-btn:hover{ background:#F7E8C9; }
  .save-btn{ width:100%; padding:15px; border:none; border-radius:999px; background:linear-gradient(90deg,var(--amber),var(--amber-dark)); color:var(--navy); font-weight:800; font-size:15px; cursor:pointer; box-shadow:0 6px 18px rgba(231,163,53,.3); transition:transform .15s ease; }
  .save-btn:active{ transform:translateY(1px); }
  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:12px 20px;
    border-radius:30px; font-size:13px; font-weight:700; z-index:99; box-shadow:0 8px 24px rgba(0,0,0,.25); display:none;
  }

  /* ---------- OPERATORS TAB ---------- */
  .op-add{ display:flex; gap:8px; margin-bottom:14px; }
  .op-add input{ flex:1; padding:10px 16px; border-radius:999px; border:1px solid var(--line); font-family:'Cairo',sans-serif; font-size:13px; transition:border-color .2s ease, box-shadow .2s ease; }
  .op-add input:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.15); }
  .op-add button{ padding:0 16px; border:none; border-radius:8px; background:var(--navy); color:#fff; font-weight:700; cursor:pointer; }
  .op-row{ display:flex; align-items:center; gap:8px; padding:9px 4px; border-bottom:1px solid var(--line); }
  .op-row .op-code{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); width:56px; flex:0 0 56px; }
  .op-row .op-name{ flex:1; font-size:12.5px; }
  .op-row .op-name input{ width:100%; padding:6px 12px; border-radius:999px; border:1px solid var(--line); font-size:12.5px; font-family:'Cairo',sans-serif; transition:box-shadow .2s ease;}
  .op-row .op-name input:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.15); }
  .op-row.inactive .op-name{ color:var(--muted); text-decoration:line-through; }
  .op-btn{ background:none; border:none; cursor:pointer; font-size:14px; padding:3px; }

  footer.tag{ padding:12px 16px; font-size:9.5px; color:var(--muted); text-align:center; font-family:'JetBrains Mono',monospace; letter-spacing:.03em; }
  .loading{ text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; }

  /* ---------- RANK CHART (CSS bars — no external library) ---------- */
  .chart-box{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
  .chart-box h4{ font-size:12px; margin-bottom:10px; }
  .chart-box.top h4{ color:var(--green); }
  .chart-box.bottom h4{ color:var(--red); }
  .cbar-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:11px; }
  .cbar-label{ width:110px; flex:0 0 110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--navy); }
  .cbar-track{ flex:1; height:16px; background:#F1EEE6; border-radius:8px; overflow:hidden; }
  .cbar-fill{ height:100%; border-radius:8px; }
  .cbar-fill.g{ background:linear-gradient(90deg,#5CAE7E,var(--green)); }
  .cbar-fill.r{ background:linear-gradient(90deg,#DD7C6B,var(--red)); }
  .cbar-val{ width:46px; flex:0 0 46px; text-align:left; font-weight:800; font-family:'JetBrains Mono',monospace; }

  /* ---------- ENTRY HEADER (شكل شيك زي شاشة الدخول) ---------- */
  .entry-header-box{
    background: radial-gradient(circle at 20% 0%, #232C43 0%, var(--navy) 60%);
    border-radius:14px; padding:16px; margin-bottom:14px; position:relative; overflow:hidden;
  }
  .entry-header-box::before{
    content:""; position:absolute; inset:-20%;
    background-image: repeating-linear-gradient(115deg, rgba(231,163,53,.08) 0 3px, transparent 3px 30px);
    pointer-events:none;
  }
  .entry-header-box .ehb-eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.12em; color:var(--amber);
    margin-bottom:10px; position:relative; z-index:1;
  }
  .entry-header-box .grid3{ position:relative; z-index:1; }
  .entry-header-box label{ display:block; font-size:10.5px; color:#9CA3B5; font-weight:600; margin-bottom:5px; }
  .entry-header-box input, .entry-header-box select{
    width:100%; padding:10px 16px; border-radius:999px; border:1px solid #3A4257; background:#1B2233; color:#fff;
    font-family:'Cairo',sans-serif; font-size:13px; transition:border-color .2s ease, box-shadow .2s ease;
  }
  .entry-header-box input:focus, .entry-header-box select:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 3px rgba(231,163,53,.22); }
  .bulk-add-row{ display:flex; gap:8px; margin-bottom:10px; }
  .bulk-add-row input{ width:70px; padding:10px 6px; border-radius:999px; border:1px solid var(--line); text-align:center; font-family:'JetBrains Mono',monospace; }
  .bulk-add-row button{ flex:1; padding:10px; border:2px dashed var(--amber); border-radius:999px; background:#FBF2DF; color:var(--amber-dark); font-weight:800; font-size:12.5px; cursor:pointer; transition:background .2s ease; }
  .bulk-add-row button:hover{ background:#F7E8C9; }

  /* ---------- RECORDS TAB (admin edit/delete) ---------- */
  .record-row{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; }
  .record-row .rtop{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .record-row .rname{ font-size:12.5px; font-weight:700; }
  .record-row .rmeta{ font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
  .record-row .ractions{ display:flex; gap:6px; }
  .record-edit-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px; }

function fmtPct(n){ return (n*100).toFixed(1) + '%'; }
function normalizeNumber(value){ const n = parseFloat(String(value).replace(/,/g,'').trim()); return isNaN(n) ? 0 : n; }
function rankLabel(idx){ const labels = ['الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن','التاسع','العاشر']; return labels[idx] || `${idx+1}`; }
function computeTieRankLabels(sortedRows, accessor){
  const labels = [];
  if(!sortedRows.length) return labels;
  // بنجمع الصفوف المتعادلة (نفس النسبة) في مجموعات، بنفس ترتيبها الأصلي
  const groups = [];
  sortedRows.forEach(row => {
    const value = accessor(row);
    const formatted = fmtPct(value);
    const lastGroup = groups[groups.length - 1];
    if(lastGroup && lastGroup.formatted === formatted){ lastGroup.rows.push(row); }
    else { groups.push({ formatted, value, rows: [row] }); }
  });
  // لو المتصدر عدّى نسبته الـ100% بيبقى "سوبر سبيشيال" برا الترتيب العادي،
  // وبعدها الترقيم بيبدأ من "الأول" تاني (مش من "الثاني")
  const topIsSuper = groups[0].value > 1;
  groups.forEach((group, gIdx) => {
    let label;
    if(gIdx === 0 && topIsSuper){ label = '⭐ سوبر سبيشيال'; }
    else { label = rankLabel(topIsSuper ? gIdx - 1 : gIdx); }
    group.rows.forEach(() => labels.push(label));
  });
  return labels;
}

function experienceText(hireDateStr, asOfStr){
  if(!hireDateStr) return 'تاريخ التعيين غير مسجل';
  const hire = new Date(hireDateStr+'T00:00:00');
  const asOf = new Date(asOfStr+'T00:00:00');
  if(isNaN(hire.getTime())) return 'تاريخ التعيين غير مسجل';
  if(asOf < hire) return 'لسه ما اتعينتش في الفترة دي';
  let years = asOf.getFullYear() - hire.getFullYear();
  let months = asOf.getMonth() - hire.getMonth();
  let days = asOf.getDate() - hire.getDate();
  if(days < 0){ months -= 1; days += new Date(asOf.getFullYear(), asOf.getMonth(), 0).getDate(); }
  if(months < 0){ years -= 1; months += 12; }
  const parts = [];
  if(years>0) parts.push(years + (years===1?' سنة': years===2?' سنتين':' سنين'));
  if(months>0) parts.push(months + (months===1?' شهر': months===2?' شهرين':' شهور'));
  if(days>0) parts.push(days + (days===1?' يوم': days===2?' يومين':' أيام'));
  return parts.length ? parts.join(' و') : 'أقل من يوم';
}

// محرك الحفظ الآمن الموحّد: بيستخدم Firestore Transaction حقيقية، يعني القراءة والكتابة
// بيحصلوا كعملية واحدة ذرية على السيرفر — مفيش نافذة زمنية ممكن يحصل فيها تصادم بين
// جهازين بيحفظوا في نفس اللحظة بالظبط (اللي كان ممكن يحصل مع الأسلوب القديم get() ثم set()
// منفصلين).
//
// تتبّع الحذف (مهم جدًا): عشان نفرّق بين "سجل جهاز تاني ضافه بعد آخر تحميل عندي" (لازم يتضاف)
// و"سجل أنا نفسي مسحته دلوقتي" (لازم يفضل متمسوح ومايرجعش)، بنحتفظ بـ"أساس مرجعي" (baseline)
// لكل قسم = آخر نسخة معروفة من السيرفر. أي سجل كان موجود في الأساس ومش موجود في نسختي المحلية
// دلوقتي = أنا مسحته فعلاً، فمنضيفوش تاني حتى لو لسه موجود عند السيرفر.
let BASELINES = {}; // { docId: Set(ids) }
function setBaseline(docId, arr, idKey){
  BASELINES[docId] = new Set(arr.map(e => e[idKey]));
}
// طابور حفظ لكل مستند: لو المستخدم علّم على أكتر من أرتيكل (أو عمل أكتر من تعديل) بسرعة ورا
// بعض، كل نداء لدالة الحفظ كان بيبدأ transaction خاصة بيه فورًا من غير ما ينتظر اللي قبله يخلص،
// فكانت كل حفظة بتاخد آخر نسخة معروفة عندها وقت ما بدأت هي (مش وقت ما هي فعليًا بتتنفذ)، فالحفظة
// اللي تخلص بعد كده كانت ممكن تدوس على التعديل اللي حصل بعدها في نفس اللحظة تقريبًا وتضيّعه.
// هنا بنضمن إن كل حفظة تستنى اللي قبلها يخلص الأول، وبعدين تاخد أحدث نسخة من البيانات وقت
// ما هي فعليًا بتتنفذ — مش وقت ما اتطلبت.
let SAVE_QUEUES = {}; // { docId: Promise }
function queueSave(docId, taskFn){
  const prev = SAVE_QUEUES[docId] || Promise.resolve();
  const next = prev.then(taskFn, taskFn);
  SAVE_QUEUES[docId] = next.catch(()=>{});
  return next;
}
async function transactionalArraySave(docId, localArr, idKey){
  const docRef = db.collection(FS_COLLECTION).doc(docId);
  const baseline = BASELINES[docId] || new Set();
  let merged;
  await db.runTransaction(async (tx) => {
    const snap = await tx.get(docRef);
    const remote = snap.exists ? JSON.parse(snap.data().value) : [];
    const localKeys = new Set(localArr.map(e => e[idKey]));
    // سجلات موجودة عند السيرفر بس مش عندي محليًا: بتتضاف بس لو معرفتش عنها قبل كده
    // (يعني مش في الأساس المرجعي بتاعي) — أما لو كانت في الأساس ومش موجودة عندي، يبقى أنا مسحتها.
    const keepFromRemote = remote.filter(r => !localKeys.has(r[idKey]) && !baseline.has(r[idKey]));
    merged = [...localArr, ...keepFromRemote];
    tx.set(docRef, {value: JSON.stringify(merged)});
  });
  setBaseline(docId, merged, idKey);
  return merged;
}
// مراقبة لحظية (Real-time): بمجرد ما جهاز تاني يحفظ حاجة، البيانات بتتحدث تلقائيًا عند كل
// الأجهزة التانية اللي فاتحة التطبيق من غير ما حد يحتاج يعمل ريفريش للصفحة. كل مستند بيتراقب
// بدالة onSnapshot، ولو المستخدم دلوقتي واقف في تاب بيعرض نفس البيانات دي (وملوش focus على
// حقل إدخال بيكتب فيه دلوقتي) — بيتم إعادة الرسم تلقائيًا بالبيانات الجديدة.
// لو تحديث لحظي جه وإحنا شايلينه لأن فيه خانة واخدة focus، بنسيب نسخته هنا بدل ما نرميه،
// عشان لما نسيب الخانة نلحق نطبّقه على طول من غير ما نستنى تعديل تاني يوصل من السيرفر.
let PENDING_SNAPSHOTS = {}; // { docId: {spec, data} }
function applySnapshotNow(spec, data){
  // لو المستخدم عامل تعليم/تعديل في تنفيذ التارجت محليًا ولسه مادوسش "حفظ التنفيذ"،
  // منستبدلش TARGET_EXEC بنسخة السيرفر عشان مانمسحش تعديلاته اللي لسه في انتظار الحفظ.
  if(spec.docId === 'mlp_targetexec' && typeof execHasUnsaved !== 'undefined' && execHasUnsaved) return;
  spec.apply(data);
  setBaseline(spec.docId, data, spec.idKey);
  if(spec.tabs.includes(activeTab)){
    // تنفيذ التارجت بقى ليه زرار حفظ يدوي (مش بيتحفظ على السيرفر مع كل تعليم أرتيكل)،
    // وتصحيح الأداء (جوه تسجيل الأداء) ممكن حد يحفظ فيه أي سجل في أي صالة تانية في أي لحظة —
    // فلو عملنا switchTab عادي هيرجّع فلتر التاريخ/الصالة/البحث للقيم الافتراضية كل مرة
    // ويوهم المستخدم إنه "اتنقل لفترة تانية" أو "فقد بحثه". فبنعيد رسم النتائج بس بنفس
    // الفلتر اللي هو واقف عليه من غير ما نلمس خانات الفلتر.
    if(activeTab === 'targetexec' && document.getElementById('tex-from')) applyTargetExecFilter();
    else if(activeTab === 'entry'){
      // ماتلمسش فورم تسجيل الأداء عشان مايمسحش صفوف لسه بتتكتب فيها؛ لو لوحة تصحيح
      // الأداء مفتوحة تحت بس، حدّث نتائجها بنفس الفلتر اللي هو واقف عليه.
      if(document.getElementById('rec-from')) applyRecordsFilter();
    }
    else switchTab(activeTab);
  }
}
// لما المستخدم يسيب أي خانة كتابة، نتأكد إنه مش لسه واقف في خانة تانية (زي التنقل بـ Tab)
// وبعدين نطبّق أي تحديثات كانت اتأجلت وهو بيكتب.
document.addEventListener('focusout', function(){
  setTimeout(function(){
    const pendingIds = Object.keys(PENDING_SNAPSHOTS);
    if(!pendingIds.length) return;
    const activeEl = document.activeElement;
    const mainEl = document.getElementById('main-content');
    const stillTyping = activeEl && ['INPUT','TEXTAREA','SELECT'].includes(activeEl.tagName) && mainEl && mainEl.contains(activeEl);
    if(stillTyping) return;
    pendingIds.forEach(docId => {
      const pending = PENDING_SNAPSHOTS[docId];
      delete PENDING_SNAPSHOTS[docId];
      if(pending) applySnapshotNow(pending.spec, pending.data);
    });
  }, 0);
}, true);
function startRealtimeSync(){
  if(!firebaseReady) return;
  stopRealtimeSync();
  const specs = [
    {docId:'mlp_entries',     apply:v=>{ENTRIES=v;},      tabs:['report','entry','bestperf'], idKey:'id'},
    {docId:'mlp_operators',   apply:v=>{OPERATORS=v;},    tabs:['operators'], idKey:'c'},
    {docId:'mlp_users',       apply:v=>{USERS=v;},        tabs:['users'], idKey:'user'},
    {docId:'mlp_jard',        apply:v=>{JARD=v;},         tabs:['jard'], idKey:'id'},
    {docId:'mlp_targets',     apply:v=>{TARGET_PLANS=v;}, tabs:['target','targetexec'], idKey:'id'},
    {docId:'mlp_targetexec',  apply:v=>{TARGET_EXEC=v;},  tabs:['targetexec'], idKey:'planId'},
    {docId:'mlp_hallpower',   apply:v=>{HALL_POWER=v;},   tabs:['hallpower'], idKey:'id'},
    {docId:'mlp_nightpower',  apply:v=>{NIGHT_POWER=v;},  tabs:['nightpower'], idKey:'id'},
    {docId:'mlp_hallmanagers',apply:v=>{HALL_MANAGERS=v;},tabs:[], idKey:'hall'},
  ];
  specs.forEach(spec => {
    const unsub = db.collection(FS_COLLECTION).doc(spec.docId).onSnapshot(snap => {
      if(!snap.exists || !currentUser) return;
      let data;
      try{ data = JSON.parse(snap.data().value); }catch(e){ return; }
      // منستبدلش البيانات المحلية خالص لو المستخدم دلوقتي بيكتب في حقل إدخال أو لسه واقف
      // في عنصر جوه الصفحة (زي مربع تعليم اتحطّط منذ لحظات) — عشان لو فيه تعديل لسه
      // بيتحفظ في الخلفية، نسخة السيرفر القديمة متمسحوش التعديل ده قبل ما يوصل ويتحفظ.
      // بس بدل ما نرمي التحديث خالص، بنسيبه معلّق (pending) عشان نطبّقه أول ما يسيب الخانة.
      const activeEl = document.activeElement;
      const mainEl = document.getElementById('main-content');
      const isTyping = activeEl && ['INPUT','TEXTAREA','SELECT'].includes(activeEl.tagName) && mainEl && mainEl.contains(activeEl);
      if(isTyping){ PENDING_SNAPSHOTS[spec.docId] = {spec, data}; return; }
      delete PENDING_SNAPSHOTS[spec.docId];
      applySnapshotNow(spec, data);
    }, ()=>{ /* تجاهل أخطاء الاتصال المؤقتة — هترجع تتزامن تاني لما الاتصال يرجع */ });
    realtimeUnsubs.push(unsub);
  });
}
function stopRealtimeSync(){
  realtimeUnsubs.forEach(u => { try{ u(); }catch(e){} });
  realtimeUnsubs = [];
  PENDING_SNAPSHOTS = {};
}

    jardHallWrap.style.display = 'none';

async function commitSendNotify(){

/* ---------------- LOGIN ---------------- */
function sortLoginUsers(users){
  const order = {
    'Hossam.Emad': 1,
    'Mai.AbdElmohsen': 2,
    'Head.Dept': 3,
    'Owner': 4,
    'Quality.Manager': 5,
    'Technical.Manager': 6,
    'jard.entry': 7,
    'entry': 8,
    'power.entry': 9,
    'Hall.A': 10,
    'Hall.B': 11,
    'Hall.C': 12,
    'Hall.D': 13,
    'Hall.E': 14,
    'Hall.G': 15
  };
  return [...users].sort((a,b) => {
    const pa = order[a.user] ?? 999;
    const pb = order[b.user] ?? 999;
    if(pa !== pb) return pa - pb;
    return (a.label || a.user).localeCompare(b.label || b.user, 'ar');
  });
}
function populateLoginUsers(){
  const sel = document.getElementById('login-user');
  const help = document.getElementById('login-help');
  USERS = SEED_USERS.map(u => ({...u}));
  const sortedUsers = sortLoginUsers(USERS);
  if(sortedUsers.length === 0){
    sel.innerHTML = '<option disabled selected>لا يوجد مستخدمين</option>';
    help.style.display = 'block';
    help.innerHTML = '⚠️ لم يتم العثور على أي مستخدمين. أعد تحميل الصفحة، ولو استمرت المشكلة كلّم المطوّر.';
    return;
  }
  help.style.display = 'none';
  sel.innerHTML = '<option disabled selected>اختر مستخدمًا</option>' + sortedUsers.map(u => `<option value="${u.user}">${u.label}</option>`).join('');
  sel.selectedIndex = 1;
}

function selectLoginUser(user){
  const sel = document.getElementById('login-user');
  sel.value = user;
  document.getElementById('login-pass').focus();
}
async function doLogin(){
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const found = USERS.find(u => u.user === user && u.pass === pass);
  const err = document.getElementById('login-err');

  err.textContent = '';

function doLogout(){

function currentFilteredRows(){
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  const hall = document.getElementById('f-hall').value;
  const line = document.getElementById('f-line').value;
  let rows = ENTRIES.filter(r => r.d >= from && r.d <= to);
  if(hall && hall !== '__ALL__') rows = rows.filter(r => r.h === hall);
  if(line && line !== '__ALL__') rows = rows.filter(r => String(r.l) === String(line));
  return rows;
}
function aggregate(rows){
  const target = rows.reduce((s,r)=>s+r.t,0);
  const production = rows.reduce((s,r)=>s+r.p,0);
  const halak = rows.reduce((s,r)=>s+r.hk,0);
  const eslah = rows.reduce((s,r)=>s+r.es,0);
  let aatal = 0; AATAL_KEYS.forEach(k => rows.forEach(r => aatal += (r.at && r.at[k]) || 0));
  const deficit = target - production;
  const pDeficit = target ? deficit/target : 0;
  const pHalak = production ? halak/production : 0;
  const pEslah = production ? eslah/production : 0;
  const pAada = 1 - (pDeficit + pHalak + pEslah);
  return {target, production, halak, eslah, aatal, deficit, pDeficit, pHalak, pEslah, pAada};
}
function groupByWorker(rows){
  const map = new Map();
  rows.forEach(r => {
    if(!map.has(r.c)) map.set(r.c, {code:r.c, name:'', lines:new Set(), rows:[]});
    const w = map.get(r.c);
    if(r.n) w.name = r.n;
    w.lines.add(r.l);
    w.rows.push(r);
  });
  return [...map.values()].map(w => ({...w, agg: aggregate(w.rows)}));
}
function pctClass(p){ if(p >= 0.95) return 'pct-good'; if(p >= 0.8) return 'pct-mid'; return 'pct-bad'; }

function applyFilters(){
  const box = document.getElementById('report-results');
  const fromVal = document.getElementById('f-from').value;
  const toVal = document.getElementById('f-to').value;
  if(!fromVal || !toVal){
    box.innerHTML = '<div class="empty-state">🔎 حدد من تاريخ وإلى تاريخ الأول عشان تشوف تقييم الأداء.</div>';
    return;
  }
  const rows = currentFilteredRows();
  if(!rows.length){ box.innerHTML = `<div class="empty-state">مفيش بيانات في الفترة أو الفلتر ده.</div>`; return; }

  const agg = aggregate(rows);
  const workers = groupByWorker(rows).sort((a,b) => a.agg.pAada - b.agg.pAada);

  const aatalBreakdown = {}; AATAL_KEYS.forEach(k=>aatalBreakdown[k]=0);
  rows.forEach(r => AATAL_KEYS.forEach(k => aatalBreakdown[k] += (r.at && r.at[k]) || 0));

  let rankHtml = '';
  if(rankMode){
    const toDate = document.getElementById('f-to').value;
    const maxTarget = Math.max(...workers.map(w=>w.agg.target));

    const topCandidates = eligible.filter(w => w.agg.pAada >= 0.80).sort((a,b)=> b.agg.pAada - a.agg.pAada);

    const bottomCandidates = eligible.filter(w => !topCodes.has(w.code)).sort((a,b)=> a.agg.pAada - b.agg.pAada);
    const bottom10 = bottomCandidates.slice(0,10);

    const rankItemHtml = (w) => {

      <div class="chart-box top"><h4>✅ أعلى ${top10.length} (نسبة الأداء)</h4>${top10.map(w=>cbar(w,'g')).join('') || '<div class="empty-state">لا يوجد</div>'}</div>

      <div class="rank-wrap">

        <div class="rank-col bottom"><h4>⚠️ أقل ${bottom10.length}</h4>${bottom10.map(rankItemHtml).join('') || '<div class="rank-item">لا يوجد</div>'}</div>

  document.getElementById('report-results').innerHTML = `

// نسبة عجز الوقت لكل خط = عجز الوقت المسجل في الجرد ÷ إجمالي الوقت المستهدف للخط في التارجت (من ساعات/دقايق الأرتيكلات)
function computeLineDeficitPerformance(from, to){
  const jardSessions = JARD.filter(s => s.from <= to && s.to >= from);
  const targetPlans = TARGET_PLANS.filter(p => p.from <= to && p.to >= from);

  const targetMinutesByLine = new Map(); // line -> minutes
  targetPlans.forEach(p => {
    (p.lines||[]).forEach(l => {
      let mins = 0;
      (l.rows||[]).forEach(r => { mins += (Number(r.h)||0)*60 + (Number(r.m)||0); });
      targetMinutesByLine.set(l.line, (targetMinutesByLine.get(l.line)||0) + mins);
    });
  });

  const deficitByLine = new Map(); // line -> {deficitMinutes, supervisor}
  jardSessions.forEach(s => {
    (s.lines||[]).forEach(l => {
      if(!deficitByLine.has(l.line)) deficitByLine.set(l.line, {deficitMinutes:0, supervisor:''});
      const agg = deficitByLine.get(l.line);
      agg.deficitMinutes += l.deficitMinutes||0;
      if(l.supervisor) agg.supervisor = l.supervisor;
    });
  });

  const allLines = new Set([...targetMinutesByLine.keys(), ...deficitByLine.keys()]);
  const rows = [...allLines].map(line => {
    const targetMinutes = targetMinutesByLine.get(line) || 0;
    const d = deficitByLine.get(line) || {deficitMinutes:0, supervisor:''};
    const deficitPct = targetMinutes ? d.deficitMinutes / targetMinutes : 0;
    const successPct = 1 - deficitPct;
    return {
      line, supervisor: d.supervisor, deficitMinutes: d.deficitMinutes,
      targetMinutes, deficitPct, successPct,
      hasData: targetMinutes > 0
    };
  }).filter(r => r.hasData);
  return rows.sort((a,b) => b.successPct - a.successPct);
}
function currentBestPerfFilteredData(){
  const from = document.getElementById('bf-from').value;
  const to = document.getElementById('bf-to').value;
  const hall = document.getElementById('bf-hall').value;
  const jardSessions = JARD.filter(s => s.from <= to && s.to >= from);
  const targetPlans = TARGET_PLANS.filter(p => p.from <= to && p.to >= from);
  const halls = hall === '__ALL__' ? HALLS : [hall];
  return halls.map(h => {
    const totalDeliveries = jardSessions.reduce((sum, s) => {
      if(s.hall !== h) return sum;
      return sum + (s.lines || []).reduce((lineSum, l) => lineSum + (l.articles || []).reduce((artSum, a) => artSum + normalizeNumber(a.qty), 0), 0);
    }, 0);
    const totalHalak = jardSessions.reduce((sum, s) => {
      if(s.hall !== h) return sum;
      return sum + (s.lines || []).reduce((lineSum, l) => lineSum + (l.articles || []).reduce((artSum, a) => artSum + normalizeNumber(a.halak), 0), 0);
    }, 0);
    const totalEslah = jardSessions.reduce((sum, s) => {
      if(s.hall !== h) return sum;
      return sum + (s.lines || []).reduce((lineSum, l) => lineSum + (l.articles || []).reduce((artSum, a) => artSum + normalizeNumber(a.eslah), 0), 0);
    }, 0);
    const totalTargetDeliveries = targetPlans.reduce((sum, p) => {
      if(p.hall !== h) return sum;
      return sum + normalizeNumber(p.hallTargetDeliveries);
    }, 0);
    const performancePct = totalTargetDeliveries ? totalDeliveries / totalTargetDeliveries : 0;
    const halakPct = totalDeliveries ? totalHalak / totalDeliveries : 0;
    const eslahPct = totalDeliveries ? totalEslah / totalDeliveries : 0;
    const qualityPct = 1 - halakPct - eslahPct;
    return {
      hall: h,
      actualDeliveries: totalDeliveries,
      targetDeliveries: totalTargetDeliveries,
      performancePct,
      totalHalak,
      totalEslah,
      halakPct,
      eslahPct,
      qualityPct,
      qualityRankValue: totalDeliveries ? qualityPct : -1,
      hasData: totalTargetDeliveries > 0 || totalDeliveries > 0
    };
  });
}

  const deficitRows = computeLineDeficitPerformance(document.getElementById('bf-from').value, document.getElementById('bf-to').value);
  const deficitRanks = computeTieRankLabels(deficitRows, r => r.successPct);
  const deficitRankRows = deficitRows.map((row, idx) => {

function addMultipleRows(){
  const n = Math.max(1, Math.min(80, Number(document.getElementById('bulk-count').value) || 1));
  lastBulkCount = n;
  const startIdx = pendingRowIds.length;
  const newIds = [];
  for(let i=0;i<n;i++){ const id = rowIdCounter++; pendingRowIds.push(id); newIds.push(id); }
  const container = document.getElementById('rows-container');
  container.insertAdjacentHTML('beforeend', newIds.map((id,i)=>entryRowHtml(id, startIdx+i)).join(''));
  renumberRows();
  showToast(`✅ اتضاف ${n} صف جديد جنب اللي كتبته، من غير ما يتمسح حاجة`);

function addRow(){
  const id = rowIdCounter++;
  pendingRowIds.push(id);
  document.getElementById('rows-container').insertAdjacentHTML('beforeend', entryRowHtml(id, pendingRowIds.length-1));
  renumberRows();
}
function removeRow(id){
  pendingRowIds = pendingRowIds.filter(i => i !== id);

  if(el) el.remove();
  if(pendingRowIds.length === 0){ addRow(); return; }
  renumberRows();
}
function renumberRows(){
  pendingRowIds.forEach((id, idx) => {
    const row = document.getElementById('rowcard-'+id);

    const numEl = row.querySelector('.rownum');

function handleEntryPaste(e, startIdx, startCol){
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if(!text) return;
  e.preventDefault();
  const aatalSet = new Set(AATAL_KEYS);
  const rowsTxt = text.split(/\r\n|\n|\r/).filter(r=>r.length);
  rowsTxt.forEach((rowText, ri) => {
    const targetIdx = startIdx + ri;
    while(targetIdx >= pendingRowIds.length) addRow();
    const id = pendingRowIds[targetIdx];
    const cells = rowText.split('\t');
    cells.forEach((val, ci) => {
      const colIdx = (startCol||0) + ci;
      if(colIdx >= ENTRY_COLS.length) return;
      const field = ENTRY_COLS[colIdx];
      const elId = aatalSet.has(field) ? ('aatal-'+id+'-'+field) : (field+'-'+id);
      const el = document.getElementById(elId);
      if(el){ el.value = val.trim(); }
    });
    onCodeInput(id);
  });
  showToast(`✅ اتلصق ${rowsTxt.length} صف بالترتيب: كود، تارجت، إنتاج، إصلاح، هالك، ص ف ج س ظ ع ن`);
}

function onLineChange(){

    if(n){
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = 'خط '+n; opt.selected = true;
      lineSel.insertBefore(opt, lineSel.lastElementChild);

function onCodeInput(id){
  const code = document.getElementById('code-'+id).value;
  const nameEl = document.getElementById('name-'+id);
  const hireEl = document.getElementById('newhire-'+id);
  const targetInput = document.getElementById('target-'+id);
  if(!code){
    nameEl.value = ''; nameEl.readOnly = true; nameEl.className = 'ename'; nameEl.placeholder = 'هيظهر لما تكتب الكود';
    hireEl.disabled = true; hireEl.value = '';
    return;
  }
  const found = OPERATORS.find(o => String(o.c) === String(code));
  if(found){
    nameEl.value = found.n; nameEl.readOnly = true; nameEl.className = 'ename found';
    hireEl.disabled = true; hireEl.value = '';
    if(!targetInput.value){
      const last = [...ENTRIES].reverse().find(e => e.c === Number(code));
      if(last) targetInput.placeholder = `آخر تارجت ${last.t}`;
    }
  } else {
    if(nameEl.readOnly) nameEl.value = '';
    nameEl.readOnly = false; nameEl.className = 'ename missing'; nameEl.placeholder = 'كود جديد — اكتب الاسم لو عارفه (اختياري)';
    hireEl.disabled = false;
  }
}
async function saveAllRows(){
  const date = document.getElementById('entry-date').value;
  const hall = document.getElementById('entry-hall').value;
  const line = document.getElementById('entry-line').value;
  if(!hall || !line || line === '__NEW__'){ showToast('⚠️ لازم تحدد الصالة والخط فوق الأول'); return; }

  const readRows = pendingRowIds.map(id => {
    const code = document.getElementById('code-'+id).value;
    const found = OPERATORS.find(o => String(o.c) === String(code));
    const newName = found ? '' : document.getElementById('name-'+id).value.trim();
    const newHire = document.getElementById('newhire-'+id).value;
    const aatalObj = {}; AATAL_KEYS.forEach(k => aatalObj[k] = Number(document.getElementById('aatal-'+id+'-'+k).value)||0);
    return {
      code, name: found ? found.n : '', newName, newHire,
      target: document.getElementById('target-'+id).value,
      production: document.getElementById('production-'+id).value,
      halak: document.getElementById('halak-'+id).value,
      eslah: document.getElementById('eslah-'+id).value,
      aatal: aatalObj
    };
  });
  const valid = readRows.filter(r => r.code);
  if(!valid.length){ showToast('⚠️ لازم تكتب كود على الأقل لصف واحد'); return; }
  if(valid.some(r => !r.target)){ showToast('⚠️ لازم تحدد التارجت لكل عاملة (ممكن يختلف من مكنة للتانية)'); return; }

  valid.forEach(r => {
    if(!r.name && r.newName){
      OPERATORS.push({c: Number(r.code), n: r.newName, a:true, hd: r.newHire || null});
    }
    ENTRIES.push({
      id: 'e'+Date.now()+Math.random().toString(36).slice(2,6),
      d: date, h: hall, l: Number(line), c: Number(r.code), n: r.name || r.newName,
      t: Number(r.target)||0, p: Number(r.production)||0, hk: Number(r.halak)||0, es: Number(r.eslah)||0,
      at: r.aatal, by: currentUser.user
    });
  });
  await saveEntries();
  if(valid.some(r=>!r.name && r.newName)) await saveOperators();
  const namelessCount = valid.filter(r => !r.name && !r.newName).length;
  showToast(`✅ اتحفظ ${valid.length} سجل بنجاح على ${hall} - خط ${line}${namelessCount ? ` (${namelessCount} كود اتسجل من غير اسم — تقدر تدخّل الاسم بعدين من لوحة تصحيح الأداء)` : ''}`);
  renderEntryTab();
}

  renderOpImportTable();
  renderOperatorsList(OPERATORS);
}
function renderOpImportTable(){
  let rows = '';
  for(let i=0;i<OP_IMPORT_ROWS;i++){
    rows += `
      <tr>
        <td>${i+1}</td>
        <td><input type="text" id="opimp-code-${i}" onpaste="handleGenericPaste(event,${i},0,'opimp-',['code','name','hire'],${OP_IMPORT_ROWS})"></td>
        <td><input type="text" id="opimp-name-${i}" onpaste="handleGenericPaste(event,${i},1,'opimp-',['code','name','hire'],${OP_IMPORT_ROWS})"></td>
        <td><input type="text" id="opimp-hire-${i}" placeholder="YYYY-MM-DD" onpaste="handleGenericPaste(event,${i},2,'opimp-',['code','name','hire'],${OP_IMPORT_ROWS})"></td>
      </tr>`;
  }
  document.getElementById('op-import-body').innerHTML = rows;
}
async function importOperatorsBulk(){
  let added = 0, skipped = 0;
  for(let i=0;i<OP_IMPORT_ROWS;i++){
    const code = document.getElementById('opimp-code-'+i).value.trim();
    const name = document.getElementById('opimp-name-'+i).value.trim();
    const hire = document.getElementById('opimp-hire-'+i).value.trim();
    if(!code || !name) continue;
    if(OPERATORS.find(o=>String(o.c)===String(code))){ skipped++; continue; }
    OPERATORS.push({c:Number(code), n:name, a:true, hd: hire || null});
    added++;
  }
  if(added){ await saveOperators(); showToast(`✅ اتضاف ${added} عاملة${skipped?` (اتجاهل ${skipped} كود متكرر)`:''}`); renderOperatorsTab(); }
  else showToast('⚠️ مفيش صفوف صحيحة (لازم كود واسم على الأقل)');
}
function renderOperatorsList(list){
  document.getElementById('op-list').innerHTML = list.slice(0,200).map(op => `
    <div class="op-row ${op.a?'':'inactive'}">
      <input type="checkbox" class="op-select-cb" value="${op.c}" onchange="updateOpSelectedCount()" style="margin-left:6px;">
      <span class="op-code">${op.c}</span>
      <span class="op-name" id="opname-${op.c}">${op.n}</span>
      <button class="op-btn" onclick="editOperator(${op.c})">✏️</button>
      <button class="op-btn" onclick="toggleOperator(${op.c})">${op.a?'⏸️':'▶️'}</button>

    </div>
    <div id="opedit-${op.c}"></div>
  `).join('') || '<div class="empty-state">مفيش عاملين</div>';
  if(list.length>200) document.getElementById('op-list').innerHTML += `<div class="data-note">في ${list.length-200} عاملة تانية، استخدم البحث عشان تلاقيها</div>`;

function updateOpSelectedCount(){

async function deleteSelectedOperators(){

  OPERATORS = OPERATORS.filter(o=>!codes.includes(o.c));
  await saveOperators();
  showToast(`🗑️ اتمسح ${codes.length} عاملة`);
  renderOperatorsTab();
}
async function deleteAllOperators(){
  if(!confirm('متأكد إنك عايز تمسح كل العاملين خالص؟ الإجراء ده مينفعش يترجع!')) return;

}
function filterOperators(q){

  renderOperatorsList(OPERATORS.filter(o => o.n.includes(q) || String(o.c).includes(q)));

async function addOperator(){

function editOperator(code){

async function commitEditOperator(code){

/* ---------------- RECORDS PANEL (جوه تسجيل الأداء: تعديل/حذف سجلات + عرض الأكواد بدون اسم) ---------------- */
let recordsPanelOpenState = false;

/* بيرجع السجلات المطابقة لفلتر التاريخ/الصالة/الخط/البحث الحالي (من غير فلتر "بدون اسم") — مستخدمة في العرض وفي الحذف الجماعي */
function getFilteredEntries(){
  const from = document.getElementById('rec-from').value;
  const to = document.getElementById('rec-to').value;
  const hall = document.getElementById('rec-hall').value;
  const line = document.getElementById('rec-line')?.value;
  const q = document.getElementById('rec-search').value.trim();
  let rows = ENTRIES.filter(e => e.d >= from && e.d <= to);
  if(hall !== '__ALL__') rows = rows.filter(e => e.h === hall);
  if(line && line !== '__ALL__') rows = rows.filter(e => String(e.l) === String(line));
  if(q) rows = rows.filter(e => (e.n||'').includes(q) || String(e.c).includes(q));
  return rows;
}
/* حذف جماعي لكل السجلات المطابقة للفلتر الحالي (تاريخ من/لـ + صالة + خط)، بعد تأكيد صريح من المستخدم */
async function deleteFilteredRecords(){
  if(currentUser.role !== 'admin'){ showToast('🚫 الحذف الجماعي متاح لحسام (admin) بس'); return; }
  const rows = getFilteredEntries();
  if(!rows.length){ showToast('⚠️ مفيش سجلات مطابقة للفلتر ده عشان تتمسح'); return; }
  const from = document.getElementById('rec-from').value;
  const to = document.getElementById('rec-to').value;
  const hall = document.getElementById('rec-hall').value;
  const line = document.getElementById('rec-line')?.value;
  const hallTxt = hall==='__ALL__' ? 'كل الصالات' : hall;
  const lineTxt = (!line || line==='__ALL__') ? 'كل الخطوط' : ('خط '+line);
  const ok = confirm(`هتمسح ${rows.length} سجل — من ${from} لـ${to} — ${hallTxt} — ${lineTxt}.\n\nالخطوة دي مالهاش رجوع بعد الحفظ. متأكد؟`);
  if(!ok) return;
  const idsToDelete = new Set(rows.map(r=>r.id));
  ENTRIES = ENTRIES.filter(e => !idsToDelete.has(e.id));
  await saveEntries();
  showToast(`🗑️ اتمسح ${rows.length} سجل بنجاح`);
  applyRecordsFilter();
}
function onRecHallChange(){
  const hallSel = document.getElementById('rec-hall');
  const lineSel = document.getElementById('rec-line');
  if(!hallSel || !lineSel) return;
  const hall = hallSel.value;
  let lines;
  if(hall === '__ALL__'){
    const set = new Set();
    Object.values(HALL_LINES).forEach(arr => (arr||[]).forEach(l=>set.add(l)));
    lines = [...set].sort((a,b)=>a-b);
  } else {
    lines = HALL_LINES[hall] || [];
  }
  lineSel.innerHTML = `<option value="__ALL__">كل الخطوط</option>` + lines.map(l=>`<option value="${l}">خط ${l}</option>`).join('');
  applyRecordsFilter();
}
function applyRecordsFilter(){
  const nonameOnly = document.getElementById('rec-noname-only')?.checked;
  let rows = getFilteredEntries();
  if(nonameOnly) rows = rows.filter(e => !e.n || !e.n.trim());
  const list = document.getElementById('records-list');
  if(!list) return;
  if(!rows.length){ list.innerHTML = `<div class="empty-state">${nonameOnly ? '🎉 مفيش ولا كود بدون اسم دلوقتي في الفلتر ده.' : 'مفيش سجلات مطابقة.'}</div>`; return; }
  if(nonameOnly){
    list.innerHTML = renderNoNameGroupedHtml(rows);
    return;
  }
  rows.sort((a,b)=> (b.d+String(b.l)).localeCompare(a.d+String(a.l)));
  list.innerHTML = rows.slice(0,300).map(recordRowHtml).join('') +
    (rows.length>300 ? `<div class="data-note">في ${rows.length-300} سجل تاني، ضيق البحث أكتر عشان تشوفهم</div>` : '');
}
/* تجميع الأكواد اللي بدون اسم حسب الصالة: كام يوم اشتغل، على أنهي خط، إجمالي التارجت والإنتاج */
function renderNoNameGroupedHtml(rows){
  LAST_NONAME_GROUPS = {};
  const byHall = {};
  rows.forEach(e => {
    const hall = e.h || '—';
    if(!byHall[hall]) byHall[hall] = {};
    const code = e.c;
    if(!byHall[hall][code]) byHall[hall][code] = { code, days:new Set(), lines:new Set(), target:0, production:0, halak:0, eslah:0, entries:[] };
    const g = byHall[hall][code];
    g.days.add(e.d);
    g.lines.add(e.l);
    g.target += (e.t||0);
    g.production += (e.p||0);
    g.halak += (e.hk||0);
    g.eslah += (e.es||0);
    g.entries.push(e);
    LAST_NONAME_GROUPS[hall+'|'+code] = g.entries;
  });
  const hallsSorted = Object.keys(byHall).sort();
  let totalCodes = 0;
  const sections = hallsSorted.map(hall => {
    const codes = Object.values(byHall[hall]).sort((a,b)=>a.code-b.code);
    totalCodes += codes.length;
    const rowsHtml = codes.map(g => {
      const linesStr = [...g.lines].sort((a,b)=>a-b).map(l=>'خط '+l).join('، ');
      const safeHall = hall.replace(/'/g,"\\'");
      return `
        <div class="record-row" id="nn-${hall}-${g.code}">
          <div class="rtop">
            <div>
              <div class="rname">🚫 كود ${g.code} — بدون اسم</div>
              <div class="rmeta">صالة ${hall} · ${linesStr || '—'} · اشتغل ${g.days.size} يوم</div>
            </div>
            <div class="ractions">
              <button class="op-btn" onclick="toggleNoNameDetail('${safeHall}', ${g.code})">📋 التفاصيل</button>
            </div>
          </div>
          <div class="rmeta">إجمالي تارجت ${fmtNum(g.target)} · إجمالي إنتاج ${fmtNum(g.production)} · هالك ${fmtNum(g.halak)} · إصلاح ${fmtNum(g.eslah)}</div>
          <div id="nn-detail-${hall}-${g.code}"></div>
        </div>`;
    }).join('');
    return `<div class="section-title" style="margin-top:14px;">🏭 صالة ${hall} <span class="count">(${codes.length} كود بدون اسم)</span></div>${rowsHtml}`;
  }).join('');
  const note = `<div class="data-note" style="margin-bottom:8px;">في ${totalCodes} كود بدون اسم إجمالاً في ${hallsSorted.length} صالة — دوس "📋 التفاصيل" عشان تشوف كل يوم اشتغل فيه وتقدر تعدل الاسم أو تحذف. لما تسجل الاسم لأي كود، هينزرع تلقائي على كل السجلات التانية لنفس الكود.</div>`;
  return note + sections;
}
function toggleNoNameDetail(hall, code){
  const wrap = document.getElementById('nn-detail-'+hall+'-'+code);
  if(!wrap) return;
  if(wrap.innerHTML.trim()){ wrap.innerHTML = ''; return; }
  const entries = (LAST_NONAME_GROUPS[hall+'|'+code] || []).slice().sort((a,b)=> a.d.localeCompare(b.d));
  wrap.innerHTML = entries.map(recordRowHtml).join('');
}
function recordRowHtml(e){
  return `
    <div class="record-row" id="rec-${e.id}">
      <div class="rtop">
        <div><div class="rname">${e.n || 'بدون اسم'} — كود ${e.c}</div><div class="rmeta">${e.d} · ${e.h} · خط ${e.l} · تسجيل: ${e.by||'-'}</div></div>
        <div class="ractions">
          <button class="op-btn" onclick="startEditRecord('${e.id}')">✏️</button>
          <button class="op-btn" onclick="deleteRecord('${e.id}')">🗑️</button>
        </div>
      </div>
      <div class="rmeta">تارجت ${fmtNum(e.t)} · إنتاج ${fmtNum(e.p)} · هالك ${fmtNum(e.hk)} · إصلاح ${fmtNum(e.es)}</div>
      <div id="rec-edit-${e.id}"></div>
    </div>
  `;
}
function startEditRecord(id){
  const e = ENTRIES.find(x=>x.id===id);
  if(!e) return;
  const hasName = !!(e.n && e.n.trim());
  document.getElementById('rec-edit-'+id).innerHTML = `
    ${!hasName ? `<div class="data-note" style="margin-bottom:6px;">⚠️ الكود ده لسه بدون اسم — ممكن يكون الكود اتكتب غلط أصلاً. تقدر تصحح الكود نفسه تحت، أو تكتب الاسم وسيبه يتحفظ في جدول العاملين تلقائي.</div>` : ''}
    <div class="record-edit-grid">
      <div><label>الكود</label><input type="number" id="edit-c-${id}" value="${e.c}" placeholder="كود العاملة" oninput="onEditCodeInput('${id}')"></div>
      <div><label>الاسم</label><input type="text" id="edit-n-${id}" class="ename${OPERATORS.find(o=>Number(o.c)===Number(e.c))?' found':''}" value="${e.n||''}" placeholder="اكتب الاسم هنا"${OPERATORS.find(o=>Number(o.c)===Number(e.c))?' readonly':''}></div>
      <div><label>تارجت</label><input type="number" id="edit-t-${id}" value="${e.t}"></div>
      <div><label>إنتاج</label><input type="number" id="edit-p-${id}" value="${e.p}"></div>
      <div><label>هالك</label><input type="number" id="edit-hk-${id}" value="${e.hk}"></div>
      <div><label>إصلاح</label><input type="number" id="edit-es-${id}" value="${e.es}"></div>
      ${AATAL_KEYS.map(k=>`<div><label>${AATAL_LABELS[k]}</label><input type="number" id="edit-at-${id}-${k}" value="${(e.at&&e.at[k])||0}"></div>`).join('')}
    </div>
    <button class="apply-btn" style="margin-top:8px;" onclick="commitEditRecord('${id}')">💾 حفظ التعديل</button>
  `;
}
function onEditCodeInput(id){
  const codeEl = document.getElementById('edit-c-'+id);
  const nameEl = document.getElementById('edit-n-'+id);
  if(!codeEl || !nameEl) return;
  const code = codeEl.value;
  if(!code){
    nameEl.readOnly = false; nameEl.className = 'ename'; nameEl.placeholder = 'اكتب الاسم هنا';
    return;
  }
  const found = OPERATORS.find(o => String(o.c) === String(code));
  if(found){
    nameEl.value = found.n; nameEl.readOnly = true; nameEl.className = 'ename found';
  } else {
    if(nameEl.readOnly) nameEl.value = '';
    nameEl.readOnly = false; nameEl.className = 'ename missing'; nameEl.placeholder = 'كود جديد — اكتب الاسم لو عارفه (اختياري)';
  }
}
async function commitEditRecord(id){
  const e = ENTRIES.find(x=>x.id===id);
  if(!e) return;
  const hadNoName = !e.n || !e.n.trim();
  const oldCode = e.c;
  const codeInput = document.getElementById('edit-c-'+id);
  let newCode = codeInput ? Number(codeInput.value) : oldCode;
  if(!newCode || isNaN(newCode)){ showToast('⚠️ لازم تكتب كود صحيح'); return; }
  let newName = (document.getElementById('edit-n-'+id).value || '').trim();
  const codeChanged = newCode !== Number(oldCode);
  // لو الكود اتغيّر ومفيش اسم مكتوب، حاول نجيب الاسم من جدول العاملين لو الكود الجديد ده معروف
  if(codeChanged && !newName){
    const matchOp = OPERATORS.find(o => Number(o.c) === newCode);
    if(matchOp) newName = matchOp.n || '';
  }
  e.c = newCode;
  e.n = newName;
  e.t = Number(document.getElementById('edit-t-'+id).value)||0;
  e.p = Number(document.getElementById('edit-p-'+id).value)||0;
  e.hk = Number(document.getElementById('edit-hk-'+id).value)||0;
  e.es = Number(document.getElementById('edit-es-'+id).value)||0;
  e.at = e.at || {};
  AATAL_KEYS.forEach(k => e.at[k] = Number(document.getElementById('edit-at-'+id+'-'+k).value)||0);
  let operatorsChanged = false;
  let propagatedCount = 0;
  if(newName){
    const op = OPERATORS.find(o => Number(o.c) === newCode);
    if(op){
      if(op.n !== newName){ op.n = newName; operatorsChanged = true; }
    } else {
      OPERATORS.push({c: newCode, n: newName, a:true, hd: null});
      operatorsChanged = true;
    }
    // لو الكود كان من غير اسم، انزرع الاسم على كل سجلاته التانية اللي لسه من غير اسم (بنفس الكود الجديد)
    if(hadNoName){
      ENTRIES.forEach(x => {
        if(x.id !== id && Number(x.c) === newCode && (!x.n || !x.n.trim())){
          x.n = newName;
          propagatedCount++;
        }
      });
    }
  }
  await saveEntries();
  if(operatorsChanged) await saveOperators();
  const codeMsg = codeChanged ? `✅ اتصحّح الكود من ${oldCode} إلى ${newCode}` : '✅ اتعدّل السجل';
  showToast(propagatedCount ? `${codeMsg}، وانسحب الاسم "${newName}" على ${propagatedCount} سجل تاني لنفس الكود` : codeMsg);
  applyRecordsFilter();
}
async function deleteRecord(id){
  ENTRIES = ENTRIES.filter(e => e.id !== id);
  await saveEntries();
  showToast('🗑️ اتمسح السجل');
  applyRecordsFilter();
}

function fmtMinutes(m){
  const sign = m < 0 ? '-' : '';
  const abs = Math.abs(Math.round(m));
  const h = Math.floor(abs/60), mm = abs%60;
  return `${sign}${h}:${String(mm).padStart(2,'0')}`;
}
function fmtSignedMinutes(m){
  const r = Math.round(m);
  return r > 0 ? '+'+fmtMinutes(r) : fmtMinutes(r);
}
