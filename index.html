        <table>
          <thead><tr><th>الخط</th><th>أساسي</th><th>تصفية</th><th>غياب</th><th>${actualHeadLabel}</th></tr></thead>
          <tbody>
            ${rows.map(e => `
              <tr>
                <td><b>${e.line}</b></td>
                <td>${isRange ? Math.round(e.basicSum/e.days).toLocaleString('en-US') : fmtNum(e.basicSum)}</td>
                <td>${fmtNum(e.clearanceSum)}</td>
                <td>${fmtNum(e.absenceSum)}</td>
                <td><b>${isRange ? Math.round(e.actualSum/e.days).toLocaleString('en-US') : fmtNum(e.actualSum)}</b></td>
              </tr>`).join('')}
            ${rows.length > 1 ? `<tr class="hp-total"><td>إجمالي</td><td>${fmtNum(sub.basic)}</td><td>${fmtNum(sub.clear)}</td><td>${fmtNum(sub.abs)}</td><td>${fmtNum(sub.act)}</td></tr>` : ''}
          </tbody>
        </table>
      </div>`;
  }

  if(hall === '__ALL__'){
    // كل الصالات: شبكة كروت عريضة (كذا صالة جنب بعض) => الورقة بتتطبع Landscape تلقائيًا
    // صالة واحدة بس (كارت واحد ضيق) => الورقة بتتطبع Portrait تلقائيًا (شوف الفرع else تحت)
    const body = `
      <div class="hp-grid">
        ${hallsOrdered.map(h => hallCard(h)).join('')}
      </div>
      <div class="hp-grand-total">
        <span>الإجمالي العام — أساسي: ${fmtNum(totals.basic)}</span>
        <span>تصفية: ${fmtNum(totals.clear)}</span>
        <span>غياب: ${fmtNum(totals.abs)}</span>
        <span>${actualHeadLabel}: ${fmtNum(totals.act)}</span>
      </div>
    `;
    printReportFitted('MILANO SPORT SHOES', periodText, body, {landscape:true, minScale:0.4});
  } else {
    // صالة واحدة بس: كارت واحد، ورقة عمودية عادية
    const body = `<div class="hp-grid hp-grid-single">${hallCard(hall)}</div>`;
    printReportFitted('MILANO SPORT SHOES', periodText, body, {landscape:false, minScale:0.4});
  }
}

/* ==================================================================
   ============ قوة السهر (يومي: عدد السهرانين لكل صالة فقط) ============
   ================================================================== */
let editingNightPowerId = null;
const NIGHT_HALLS = [...HALLS, 'اللسان', 'سنجر'];
function renderNightPowerRegTab(){
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-title">🌙 تسجيل قوة السهر — كل الصالات مع بعض <span class="count" id="np-edit-label"></span></div>
    <div class="entry-header-box">
      <label>التاريخ</label>
      <input type="date" id="np-date" value="${todayStr()}" onchange="renderNpList()">
    </div>
    <div class="np-grid" id="np-halls-container">
      ${NIGHT_HALLS.map(h => `
        <div class="np-card">
          <span class="np-hall">${h}</span>
          <label>عدد اللي سهروا</label>
          <input type="number" id="np-count-${h}" placeholder="0" min="0">
        </div>
      `).join('')}
    </div>
    <button class="save-btn" style="margin-bottom:10px;" onclick="saveNightPower()">💾 حفظ قوة السهر لكل الصالات</button>
    <button class="apply-btn" style="background:#8891A4;margin-bottom:18px;" onclick="cancelNpEdit()">✖️ إلغاء / تسجيل جديد فاضي</button>
    <div class="section-title">📋 السجلات المتسجلة</div>
    <div id="np-list"></div>
  `;
  renderNpList();
}
async function saveNightPower(){
  const date = document.getElementById('np-date').value;
  if(!date){ showToast('⚠️ حدد التاريخ'); return; }
  const halls = NIGHT_HALLS.map(h => ({hall:h, count: Number(document.getElementById('np-count-'+h).value)||0}));
  if(editingNightPowerId){
    const idx = NIGHT_POWER.findIndex(p=>p.id===editingNightPowerId);
    if(idx>-1) NIGHT_POWER[idx] = {...NIGHT_POWER[idx], date, halls};
    editingNightPowerId = null;
    await saveNightPowerToDb();
    showToast('✅ اتحفظ التعديل');
  } else {
    NIGHT_POWER.push({id:'np'+Date.now()+Math.random().toString(36).slice(2,6), date, halls, enteredBy: currentUser.user, ts: new Date().toISOString()});
    await saveNightPowerToDb();
    showToast(`✅ اتحفظت قوة السهر لكل الصالات يوم ${date}`);
  }
  renderNightPowerRegTab();
}
function cancelNpEdit(){ editingNightPowerId = null; renderNightPowerRegTab(); }
function renderNpList(){
  const list = document.getElementById('np-list');
  if(!list) return;
  const dateEl = document.getElementById('np-date');
  const date = dateEl ? dateEl.value : '';
  const isFiltered = Boolean(date);
  let recs = [...NIGHT_POWER];
  if(isFiltered) recs = recs.filter(p => p.date === date);
  const sorted = recs.sort((a,b)=>(b.date).localeCompare(a.date));
  list.innerHTML = sorted.slice(0,30).map(p => `
    <div class="record-row">
      <div class="rtop">
        <div><div class="rname">كل الصالات — ${p.date}</div><div class="rmeta">بواسطة ${p.enteredBy||'-'}</div></div>
        <div class="ractions">
          <button class="op-btn" onclick="editNightPower('${p.id}')">✏️</button>
          <button class="op-btn" onclick="deleteNightPower('${p.id}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('') || (isFiltered ? '<div class="empty-state">مفيش سجل متسجل في اليوم ده</div>' : '<div class="empty-state">مفيش سجلات لسه</div>');
}
function editNightPower(id){
  const p = NIGHT_POWER.find(x=>x.id===id);
  if(!p) return;
  editingNightPowerId = id;
  renderNightPowerRegTab();
  document.getElementById('np-edit-label').textContent = `— بتعدّل يوم ${p.date}`;
  document.getElementById('np-date').value = p.date;
  (p.halls||[]).forEach(h => { 
    let el = document.getElementById('np-count-'+h.hall);
    if(!el){ const short = String(h.hall).replace(/^صالة\s*/,''); el = document.getElementById('np-count-'+short); }
    if(el) el.value = h.count||''; 
  });
  showToast('✏️ بتعدّل السجل ده');
  window.scrollTo(0,0);
}
async function deleteNightPower(id){
  NIGHT_POWER = NIGHT_POWER.filter(p=>p.id!==id);
  await saveNightPowerToDb();
  showToast('🗑️ اتمسح السجل');
  renderNpList();
}

function renderNightPowerTab(){
  const main = document.getElementById('main-content');
  const hallLocked = currentUser.hall;
  const dates = NIGHT_POWER.map(p=>p.date).sort();
  const defFrom = dates[0] || todayStr();
  const defTo = dates[dates.length-1] || todayStr();
  const hallOptions = hallLocked
    ? `<option value="${hallLocked}">${hallLocked}</option>`
    : `<option value="__ALL__">كل الصالات</option>` + NIGHT_HALLS.map(h=>`<option value="${h}">${h}</option>`).join('');
  main.innerHTML = `
    <div class="card-box filters">
      <div class="grid2">
        <div><label>من تاريخ</label><input type="date" id="npf-from" value="${defFrom}"></div>
        <div><label>إلى تاريخ</label><input type="date" id="npf-to" value="${defTo}"></div>
      </div>
      <div class="grid2 full"><div><label>الصالة</label><select id="npf-hall" ${hallLocked?'disabled':''}>${hallOptions}</select></div><div></div></div>
      <button class="apply-btn" onclick="applyNpFilter()">اعرض النتيجة</button>
      <button class="apply-btn" style="background:#3A4257;" onclick="printNightPower()">🖨️ طباعة</button>
    </div>
    <div id="np-results"></div>
  `;
  applyNpFilter();
}
function applyNpFilter(){
  const from = document.getElementById('npf-from').value;
  const to = document.getElementById('npf-to').value;
  const hall = document.getElementById('npf-hall').value;
  const results = document.getElementById('np-results');
  let recs = NIGHT_POWER.filter(p => p.date >= from && p.date <= to);
  if(!recs.length){ results.innerHTML = '<div class="empty-state">مفيش بيانات قوة سهر في الفترة دي.</div>'; return; }

  const hallMap = new Map();
  recs.forEach(p => (p.halls||[]).forEach(h => {
    if(hall !== '__ALL__' && h.hall !== hall) return;
    if(!hallMap.has(h.hall)) hallMap.set(h.hall, {hall:h.hall, sum:0, days:0});
    const e = hallMap.get(h.hall);
    e.sum += h.count||0; e.days++;
  }));
  if(!hallMap.size){ results.innerHTML = '<div class="empty-state">مفيش بيانات قوة سهر في الفترة دي.</div>'; return; }
  const entries = [...hallMap.values()].map(e => ({...e, avg: e.days? Math.round(e.sum/e.days) : 0}));
  const isRange = from !== to;

  results.innerHTML = `
    <div class="jard-hall-summary">
      <h4><span>🌙 قوة السهر ${isRange?'— متوسط الفترة':'— يوم '+from}</span></h4>
      <div class="jard-line-row head"><span>الصالة</span><span>${isRange?'متوسط عدد السهرانين':'عدد السهرانين'}</span></div>
      ${entries.map(e=>`<div class="jard-line-row"><span><b>${e.hall}</b></span><span>${isRange?e.avg:fmtNum(e.sum)}</span></div>`).join('')}
    </div>
  `;
}
function printNightPower(){
  const from = document.getElementById('npf-from').value;
  const to = document.getElementById('npf-to').value;
  const hall = document.getElementById('npf-hall').value;
  let recs = NIGHT_POWER.filter(p => p.date >= from && p.date <= to);
  if(!recs.length){ showToast('⚠️ مفيش بيانات في الفترة دي عشان تتطبع'); return; }
  const hallMap = new Map();
  recs.forEach(p => (p.halls||[]).forEach(h => {
    if(hall !== '__ALL__' && h.hall !== hall) return;
    if(!hallMap.has(h.hall)) hallMap.set(h.hall, {hall:h.hall, sum:0, days:0});
    const e = hallMap.get(h.hall);
    e.sum += h.count||0; e.days++;
  }));
  if(!hallMap.size){ showToast('⚠️ مفيش بيانات في الفترة دي عشان تتطبع'); return; }
  let entries = [...NIGHT_HALLS.map(h=>hallMap.get(h)).filter(Boolean)];
  // ensure avg is computed for range printing (fixes `undefined` display)
  entries = entries.map(e => ({...e, avg: e.days? Math.round(e.sum/e.days) : 0}));
  const isRange = from !== to;
  const total = entries.reduce((a,e)=>a+e.sum, 0);
  const body = `
    <h2>MILANO SPORT SHOES — قوة السهر</h2>
    <h3>${isRange ? `الفترة من ${from} إلى ${to}` : `يوم ${from}`}${hall!=='__ALL__' ? ' — '+hall : ' — كل الصالات'}</h3>
    <table class="print-onepage">
      <thead><tr><th>الصالة</th><th>${isRange?'متوسط عدد السهرانين':'عدد السهرانين'}</th></tr></thead>
      <tbody>
        ${entries.map(e=>`<tr><td><b>${e.hall}</b></td><td>${isRange ? e.avg : fmtNum(e.sum)}</td></tr>`).join('')}
        <tr class="total-row"><td>الإجمالي</td><td><b>${fmtNum(total)}</b></td></tr>
      </tbody>
    </table>
  `;
  document.body.classList.add('print-rank-only');
  window.print();
  setTimeout(()=> document.body.classList.remove('print-rank-only'), 800);
}

bootApp();
</script>
