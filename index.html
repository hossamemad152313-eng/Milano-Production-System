/* ---------- جلب تارجت الإنتاج للخط تلقائي من التارجت ---------- */
function getLineTargetProduction(hall, from, to, lineNum){
  if(!hall || !from || !to) return null;
  const plans = TARGET_PLANS.filter(p => p.hall===hall && p.from<=to && p.to>=from);
  if(!plans.length) return null;
  const latest = plans.reduce((a,b) => (b.from > a.from ? b : a));
  const line = (latest.lines||[]).find(l => l.line===lineNum);
  return line ? (line.lineTarget||0) : null;
}
function getLineSupervisor(hall, from, to, lineNum){
  if(!hall || !from || !to) return null;
  const plans = TARGET_PLANS.filter(p => p.hall===hall && p.from<=to && p.to>=from);
  if(!plans.length) return null;
  const latest = plans.reduce((a,b) => (b.from > a.from ? b : a));
  const line = (latest.lines||[]).find(l => l.line===lineNum);
  return line && line.supervisor ? line.supervisor : null;
}
function applyJardTargetAutofill(hall){
  if(editingJardSessionId!==null) return;
  const from = document.getElementById('jard-from')?.value;
  const to = document.getElementById('jard-to')?.value;
  pendingJardLineIds.forEach((lid, i) => {
    const lineNum = (HALL_LINES[hall]||[])[i];
    if(!lineNum) return;
    const el = document.getElementById('jline-target-'+lid);
    if(el && el.value.trim() === ''){
      const t = getLineTargetProduction(hall, from, to, lineNum);
      if(t!==null) el.value = t;
    }
    const supEl = document.getElementById('jline-supervisor-'+lid);
    if(supEl && supEl.value.trim() === ''){
      const s = getLineSupervisor(hall, from, to, lineNum);
      if(s) supEl.value = s;
    }
  });
}

/* ---------- ترحيل أرتيكلات الإصلاح المستنية من آخر جرد لنفس الصالة ---------- */
function getJardCarryoverRows(hall){
  const priorSessions = JARD.filter(s => s.hall===hall && s.id!==editingJardSessionId);
  if(!priorSessions.length) return [];
  const latest = priorSessions.reduce((a,b) => (b.to > a.to ? b : a));
  const rows = [];
  (latest.lines||[]).forEach(l => {
    (l.articles||[]).forEach(a => {
      if(a.eslah===null || a.eslah===undefined){
        rows.push({line:l.line, code:a.code});
      }
    });
  });
  return rows;
}
function applyJardCarryover(hall){
  const rows = getJardCarryoverRows(hall);
  rows.forEach((r, i) => {
    if(i >= JARD_FLAT_ROWS) return;
    document.getElementById('jflat-line-'+i).value = r.line;
    document.getElementById('jflat-article-'+i).value = r.code;
    document.getElementById('jflat-qty-'+i).value = 0;
    document.getElementById('jflat-halak-'+i).value = 0;
    markJardFlatFilled(i);
  });
  if(rows.length){
    showToast(`↩️ اترحّل ${rows.length} أرتيكل لسه مستني إصلاح من آخر جرد لصالة ${hall} — حط قيمة الإصلاح بتاعتهم`);
  }
}

function renderJardFlatTable(){
  const body = document.getElementById('jard-flat-body');
  if(!body) return;
  let rows = '';
  for(let i=0;i<JARD_FLAT_ROWS;i++){
    rows += `
      <tr>
        <td>${i+1}</td>
        <td><input type="number" id="jflat-line-${i}" onpaste="handleJardPaste(event,${i},0)" oninput="markJardFlatFilled(${i})"></td>
        <td><input type="text" id="jflat-article-${i}" onpaste="handleJardPaste(event,${i},1)" oninput="markJardFlatFilled(${i})"></td>
        <td><input type="number" id="jflat-qty-${i}" onpaste="handleJardPaste(event,${i},2)" oninput="markJardFlatFilled(${i})"></td>
        <td><input type="number" id="jflat-halak-${i}" class="jempty-check" onpaste="handleJardPaste(event,${i},3)" oninput="markJardFlatFilled(${i})"></td>
        <td><input type="number" id="jflat-eslah-${i}" class="jempty-check" onpaste="handleJardPaste(event,${i},4)" oninput="markJardFlatFilled(${i})"></td>
      </tr>`;
  }
  body.innerHTML = rows;
}
function markJardFlatFilled(i){
  const line = document.getElementById('jflat-line-'+i).value;
  const article = document.getElementById('jflat-article-'+i).value;
  const qty = document.getElementById('jflat-qty-'+i).value;
  const halakEl = document.getElementById('jflat-halak-'+i);
  const eslahEl = document.getElementById('jflat-eslah-'+i);
  const hasData = line || article || qty;
  [halakEl, eslahEl].forEach(el=>{
    if(hasData && el.value==='') el.classList.add('jempty-warn');
    else el.classList.remove('jempty-warn');
  });
}
function handleJardPaste(e, startRow, startCol){
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if(!text) return;
  e.preventDefault();
  const cols = ['line','article','qty','halak','eslah'];
  const rowsTxt = text.split(/\r\n|\n|\r/).filter(r=>r.length);
  rowsTxt.forEach((rowText, ri) => {
    const cells = rowText.split('\t');
    cells.forEach((val, ci) => {
      const colIdx = startCol + ci;
      if(colIdx >= cols.length) return;
      const targetRow = startRow + ri;
      if(targetRow >= JARD_FLAT_ROWS) return;
      const el = document.getElementById('jflat-'+cols[colIdx]+'-'+targetRow);
      if(el) el.value = val.trim();
    });
  });
  for(let i=startRow;i<Math.min(startRow+rowsTxt.length,JARD_FLAT_ROWS);i++) markJardFlatFilled(i);
  showToast(`✅ اتلصق ${rowsTxt.length} صف بنجاح`);
}

async function saveJardSession(){
  const from = document.getElementById('jard-from').value;
  const to = document.getElementById('jard-to').value;
  const hall = document.getElementById('jard-hall').value;
  const hallManager = document.getElementById('jard-hall-manager').value.trim();
  if(!from || !to){ showToast('⚠️ حدد فترة الجرد من وإلى'); return; }

  const flatRows = [];
  for(let i=0;i<JARD_FLAT_ROWS;i++){
    const line = Number(document.getElementById('jflat-line-'+i).value)||0;
    const code = document.getElementById('jflat-article-'+i).value;
    const qty = Number(document.getElementById('jflat-qty-'+i).value)||0;
    const halakRaw = document.getElementById('jflat-halak-'+i).value;
    const halak = halakRaw === '' ? null : (Number(halakRaw)||0);
    const eslahRaw = document.getElementById('jflat-eslah-'+i).value;
    const eslah = eslahRaw === '' ? null : (Number(eslahRaw)||0);
    if(line || code || qty || halak || eslah) flatRows.push({line, code, qty, halak, eslah});
  }

  const lines = pendingJardLineIds.map(id => {
    const lineNum = Number(document.getElementById('jline-num-'+id).value)||0;
    const articles = flatRows.filter(r=>r.line===lineNum).map(r=>({code:r.code, qty:r.qty, halak:r.halak, eslah:r.eslah}));
    const dH = Number(document.getElementById('jline-deficit-h-'+id).value)||0;
    const dM = Number(document.getElementById('jline-deficit-m-'+id).value)||0;
    const dSign = (dH<0 || dM<0) ? -1 : 1;
    const deficitMinutes = dSign * (Math.abs(dH)*60 + Math.abs(dM));
    return {
      line: lineNum,
      supervisor: document.getElementById('jline-supervisor-'+id).value.trim(),
      targetProduction: Number(document.getElementById('jline-target-'+id).value)||0,
      production: Number(document.getElementById('jline-prod-'+id).value)||0,
      deficitMinutes,
      needles: Number(document.getElementById('jline-needles-'+id).value)||0,
      maintOther: document.getElementById('jline-maint-'+id).value.trim(),
      articles
    };
  }).filter(l => l.line);

  if(!lines.length){ showToast('⚠️ لازم يكون في خط واحد على الأقل'); return; }

  const unmatched = flatRows.filter(r => !lines.some(l=>l.line===r.line));
  if(unmatched.length){ showToast(`⚠️ في ${unmatched.length} صف كتبت فيهم رقم خط مش موجود في الصالة دي — اتجاهلوا`); }

  if(editingJardSessionId){
    const idx = JARD.findIndex(s=>s.id===editingJardSessionId);
    if(idx>-1) JARD[idx] = {...JARD[idx], hall, from, to, hallManager, lines};
    editingJardSessionId = null;
    await saveJard();
    showToast('✅ اتحفظ التعديل على الجرد');
  } else {
    JARD.push({
      id: 'j'+Date.now()+Math.random().toString(36).slice(2,6),
      hall, from, to, hallManager, lines, enteredBy: currentUser.user, ts: new Date().toISOString()
    });
    await saveJard();
    showToast(`✅ اتحفظ جرد ${hall} من ${from} إلى ${to}`);
  }
  renderJardTab();
}

function collectJardFlatRows(){
  const rows = [];
  for(let i=0;i<JARD_FLAT_ROWS;i++){
    const lineEl = document.getElementById('jflat-line-'+i);
    if(!lineEl) break;
    const line = lineEl.value;
    const code = document.getElementById('jflat-article-'+i).value;
    const qty = document.getElementById('jflat-qty-'+i).value;
    const halak = document.getElementById('jflat-halak-'+i).value;
    const eslah = document.getElementById('jflat-eslah-'+i).value;
    if(!line && !code && !qty) continue;
    rows.push({line, code, qty, halak, eslah});
  }
  return rows;
}
function printJardMissingField(fieldKey, fieldLabel, printTitle){
  if(editingJardSessionId===null){ showToast('⚠️ افتح جرد للتعديل الأول عشان تطبع الأرتيكلات الناقصة'); return; }
  const hall = document.getElementById('jard-hall').value;
  const from = document.getElementById('jard-from').value;
  const to = document.getElementById('jard-to').value;
  const rows = collectJardFlatRows().filter(r => r[fieldKey] === '' || r[fieldKey]===undefined || r[fieldKey]===null);
  if(!rows.length){ showToast(`✅ كل الأرتيكلات مسجلها ${fieldLabel}`); return; }

  // تجميع الأرتيكلات الناقصة في كارت لكل خط، بنفس ستايل قوة الصالة/السهر (كروت مجمّعة في صفحة واحدة لاند سكيب)
  const lineMap = new Map();
  rows.forEach(r => {
    const key = r.line || '-';
    if(!lineMap.has(key)) lineMap.set(key, []);
    lineMap.get(key).push(r);
  });
  const linesOrdered = [...lineMap.keys()].sort((a,b)=>String(a).localeCompare(String(b),'en',{numeric:true}));

  const cardsHtml = linesOrdered.map(line => {
    const items = lineMap.get(line);
    return `
      <div class="power-print-card">
        <table class="print-onepage power-print-table">
          <thead>
            <tr><th colspan="3">خط ${line}</th></tr>
            <tr><th>أرتيكل</th><th>العدد</th><th>${fieldLabel}</th></tr>
          </thead>
          <tbody>
            ${items.map(r=>`<tr><td><b>${r.code||'-'}</b></td><td>${r.qty||'-'}</td><td></td></tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }).join('');

  const body = `<div class="power-print-grid">${cardsHtml}</div>`;
  document.getElementById('print-rank-output').innerHTML = buildPrintLayout(printTitle, `${hall} — من ${from} إلى ${to}`, body);
  document.body.classList.add('print-rank-only');
  document.getElementById('print-rank-output').classList.add('landscape-mode', 'hp-compact-print');
  window.print();
  setTimeout(()=>{
    document.body.classList.remove('print-rank-only');
    document.getElementById('print-rank-output').classList.remove('landscape-mode', 'hp-compact-print');
  }, 800);
}

function aggregateJardLines(sessions){
  const map = new Map();
  sessions.forEach(s => {
    s.lines.forEach(l => {
      if(!map.has(l.line)) map.set(l.line, {
        line:l.line, supervisor:l.supervisor||'', targetProduction:0, production:0,
        deliveries:0, halak:0, eslah:0, deficitMinutes:0, needles:0, maintOther:[]
      });
      const agg = map.get(l.line);
      if(l.supervisor) agg.supervisor = l.supervisor;
      agg.targetProduction += l.targetProduction||0;
      agg.production += l.production||0;
      agg.deficitMinutes += l.deficitMinutes||0;
      agg.needles += l.needles||0;
      if(l.maintOther) agg.maintOther.push(l.maintOther);
      (l.articles||[]).forEach(a => {
        agg.deliveries += a.qty||0; agg.halak += a.halak||0; agg.eslah += a.eslah||0;
      });
    });
  });
  return [...map.values()].map(a => {
    const deficitProduction = a.targetProduction - a.production;
    const deficitProductionPct = a.targetProduction ? deficitProduction/a.targetProduction : 0;
    const halakPct = a.deliveries ? a.halak/a.deliveries : 0;
    const eslahPct = a.deliveries ? a.eslah/a.deliveries : 0;
    const successPct = 1 - (deficitProductionPct + halakPct + eslahPct);
    return {...a, deficitProduction, deficitProductionPct, halakPct, eslahPct, successPct};
  }).sort((a,b)=>a.line-b.line);
}
function hallTotals(lines){
  const t = lines.reduce((t,l)=>({
    targetProduction:t.targetProduction+l.targetProduction, production:t.production+l.production,
    deliveries:t.deliveries+l.deliveries,
    halak:t.halak+l.halak, eslah:t.eslah+l.eslah, deficitMinutes:t.deficitMinutes+l.deficitMinutes, needles:t.needles+l.needles
  }), {targetProduction:0,production:0,deliveries:0,halak:0,eslah:0,deficitMinutes:0,needles:0});
  const deficitProduction = t.targetProduction - t.production;
  const deficitProductionPct = t.targetProduction ? deficitProduction/t.targetProduction : 0;
  const halakPct = t.deliveries ? t.halak/t.deliveries : 0;
  const eslahPct = t.deliveries ? t.eslah/t.deliveries : 0;
  const successPct = 1 - (deficitProductionPct + halakPct + eslahPct);
  return {...t, deficitProduction, deficitProductionPct, halakPct, eslahPct, successPct};
}

function applyJardFilter(){
  const from = document.getElementById('jf-from').value;
  const to = document.getElementById('jf-to').value;
  const hall = document.getElementById('jf-hall').value;
  const results = document.getElementById('jard-results');
  if(!from || !to){
    results.innerHTML = '<div class="empty-state">🔎 حدد من تاريخ وإلى تاريخ الأول عشان تشوف الجرد.</div>';
    window.__jardLines = null;
    return;
  }

  const sessionsAll = JARD.filter(s => s.from <= to && s.to >= from);
  if(!sessionsAll.length){ results.innerHTML = '<div class="empty-state">مفيش جرد متسجل في الفترة دي.</div>'; window.__jardLines=null; return; }

  if(hall !== '__ALL__'){
    const sessions = sessionsAll.filter(s => s.hall === hall);
    if(!sessions.length){ results.innerHTML = '<div class="empty-state">مفيش جرد متسجل لصالة ' + hall + ' في الفترة دي.</div>'; window.__jardLines=null; return; }
    const lines = aggregateJardLines(sessions);
    const hallManager = [...sessions].sort((a,b)=>b.from.localeCompare(a.from))[0].hallManager || '';
    results.innerHTML = jardHallBlockHtml(hall, lines, hallManager);
    window.__jardLines = {[hall]: lines};
    return;
  }

  const hallsPresent = [...new Set(sessionsAll.map(s=>s.hall))];
  const perHall = hallsPresent.map(h => {
    const sessions = sessionsAll.filter(s=>s.hall===h);
    const lines = aggregateJardLines(sessions);
    const t = hallTotals(lines);
    const hallManager = [...sessions].sort((a,b)=>b.from.localeCompare(a.from))[0].hallManager || '';
    return {hall:h, lines, totals:t, hallManager};
  }).sort((a,b) => b.totals.successPct - a.totals.successPct);

  window.__jardLines = {};
  perHall.forEach(h => window.__jardLines[h.hall] = h.lines);

  results.innerHTML = `
    <div class="section-title">🏆 ترتيب الصالات (حسب نسبة نجاح الخط = تسليمات وهالك وإصلاح)</div>

        </div>
      `).join('')}
    </div>
    ${perHall.map(h => jardHallBlockHtml(h.hall, h.lines, h.hallManager)).join('')}
  `;
}

function parseHMToMinutes(str){
  if(!str) return 0;
  const parts = String(str).split(':');
  if(parts.length===2){
    const h = parseInt(parts[0])||0, m = parseInt(parts[1])||0;
    return h*60+m;
  }
  const n = parseFloat(str);
  return isNaN(n) ? 0 : Math.round(n*60); // لو كتب رقم لوحده، اعتبره ساعات
}
function minutesToHM(mins){
  const h = Math.floor(mins/60), m = mins%60;
  return `${h}:${String(m).padStart(2,'0')}`;
}
const LINE_WEEKLY_CAPACITY_MIN = 57*60; // سعة الخط الأسبوعية = 57 ساعة
function updateLineTimeTotal(lineId){
  let totalMinutes = 0, articleCount = 0;
  for(let i=0;i<TARGET_ROWS;i++){
    const article = document.getElementById('trow-'+lineId+'-article-'+i);
    const hEl = document.getElementById('trow-'+lineId+'-h-'+i);
    const mEl = document.getElementById('trow-'+lineId+'-m-'+i);
    if(!article) continue;
    if(article.value.trim()) articleCount++;
    const h = Math.abs(Number(hEl ? hEl.value : 0)||0);
    const m = Math.abs(Number(mEl ? mEl.value : 0)||0);
    totalMinutes += h*60 + m;
  }
  const lineTarget = Number(document.getElementById('target-line-total-input-'+lineId)?.value) || 0;
  const el = document.getElementById('target-line-total-'+lineId);
  if(el){
    const usedH = Math.floor(totalMinutes/60), usedM = totalMinutes%60;
    const remaining = LINE_WEEKLY_CAPACITY_MIN - totalMinutes;
    let remainingText, remainingColor;
    if(remaining >= 0){
      remainingText = `⏳ لسه فاضلك ${Math.floor(remaining/60)} ساعة و${remaining%60} دقيقة من أصل 57 ساعة — تقدر تحط أرتيكلات تانية`;
      remainingColor = remaining < 180 ? 'var(--amber-dark)' : 'var(--muted)';
    } else {
      remainingText = `⚠️ الخط اتعدى سعته الأسبوعية بـ ${Math.floor(-remaining/60)} ساعة و${(-remaining)%60} دقيقة`;
      remainingColor = 'var(--red)';
    }
    el.innerHTML = `عدد الأرتيكلات المكتوبة: ${articleCount} — إجمالي الوقت المكتوب: ${usedH} ساعة و${usedM} دقيقة — إجمالي تارجت الخط: ${fmtNum(lineTarget)}<br><span style="color:${remainingColor};font-weight:700;">${remainingText}</span>`;
  }
  updateHallProductionTotal();
}

}
function updateHallProductionTotal(){

function handleGenericPaste(e, startRow, startCol, idPrefix, cols, maxRows, onDone){
  const text = (e.clipboardData || window.clipboardData).getData('text/plain') || (e.clipboardData || window.clipboardData).getData('text');
  if(!text) return;
  e.preventDefault();
  e.stopPropagation();
  const cleanedText = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\u00A0/g,' ').trim();
  const rowsTxt = cleanedText.split('\n').map(r => r.trim()).filter(r=>r.length);
  let baseRow = startRow;
  let baseCol = startCol;
  const activeId = e.target && e.target.id;
  if(activeId && activeId.startsWith(idPrefix)){
    const parts = activeId.slice(idPrefix.length).split('-');
    const colName = parts[0];
    const rowIndex = Number(parts[1]);
    const colIndex = cols.indexOf(colName);
    if(!isNaN(rowIndex) && colIndex >= 0){
      baseRow = rowIndex;
      baseCol = colIndex;
    }
  }
  rowsTxt.forEach((rowText, ri) => {
    const cells = rowText.includes('\t') ? rowText.split('\t') : rowText.split(/;|,/);
    cells.forEach((val, ci) => {
      const colIdx = baseCol + ci;
      if(colIdx >= cols.length) return;
      const targetRow = baseRow + ri;
      if(targetRow >= maxRows) return;
      const el = document.getElementById(idPrefix+cols[colIdx]+'-'+targetRow);
      if(el){
        el.value = val.trim();
      }
    });
  });
  showToast(`✅ اتلصق ${rowsTxt.length} صف بنجاح`);
  if(onDone) onDone();
}

function handleTargetRowPaste(e, startRow, startCol, idPrefix, cols, maxRows, onDone){
  handleGenericPaste(e, startRow, startCol, idPrefix, cols, maxRows, onDone);
}
async function saveTargetPlan(){
  const from = document.getElementById('target-from').value;
  const to = document.getElementById('target-to').value;
  const hall = document.getElementById('target-hall').value;
  const hallManager = document.getElementById('target-hall-manager').value.trim();
  const hallTargetDeliveries = document.getElementById('target-hall-deliveries').value.trim();
  if(!from || !to){ showToast('⚠️ حدد فترة التارجت من وإلى'); return; }

  const lines = pendingTargetLineIds.map(id => {
    const lineNum = Number(document.getElementById('target-num-'+id).value)||0;
    const rows = [];
    for(let i=0;i<TARGET_ROWS;i++){
      const article = document.getElementById('trow-'+id+'-article-'+i).value;
      const qty = document.getElementById('trow-'+id+'-qty-'+i).value;
      const h = document.getElementById('trow-'+id+'-h-'+i).value;
      const m = document.getElementById('trow-'+id+'-m-'+i).value;
      if(article || qty || h || m) rows.push({article, qty, h: Number(h)||0, m: Number(m)||0});
    }
    const lineTarget = Number(document.getElementById('target-line-total-input-'+id).value) || 0;
    const floorWork = Array.from({length:TARGET_WORK_ROWS}).map((_,i) => ({
      article: document.getElementById('target-floor-article-'+id+'-'+i).value,
      qty: document.getElementById('target-floor-qty-'+id+'-'+i).value
    })).filter(r=>r.article||r.qty);
    const lineWork = Array.from({length:TARGET_WORK_ROWS}).map((_,i) => ({
      article: document.getElementById('target-line-article-'+id+'-'+i).value,
      qty: document.getElementById('target-line-qty-'+id+'-'+i).value
    })).filter(r=>r.article||r.qty);
    return { line: lineNum, supervisor: document.getElementById('target-supervisor-'+id).value.trim(), lineTarget, rows, floorWork, lineWork };
  }).filter(l => l.line);

  if(!lines.length){ showToast('⚠️ لازم يكون في خط واحد على الأقل'); return; }

  if(editingTargetPlanId){
    const idx = TARGET_PLANS.findIndex(p=>p.id===editingTargetPlanId);
    if(idx>-1) TARGET_PLANS[idx] = {...TARGET_PLANS[idx], hall, from, to, hallManager, hallTargetDeliveries, lines};
    editingTargetPlanId = null;
    await saveTargetPlans();
    showToast('✅ اتحفظ التعديل على خطة التارجت');
  } else {
    TARGET_PLANS.push({
      id: 't'+Date.now()+Math.random().toString(36).slice(2,6),
      hall, from, to, hallManager, hallTargetDeliveries, lines, enteredBy: currentUser.user, ts: new Date().toISOString()
    });
    await saveTargetPlans();
    showToast(`✅ اتحفظت خطة تارجت ${hall} من ${from} إلى ${to}`);
  }
  renderTargetRegTab();

/* دالة موحّدة لتجميع بيانات ملخص التارجت — يستخدمها العرض على الشاشة وطباعة الملخص مع بعض */
function getTargetSummaryData(from, to, hall){
  let plans = TARGET_PLANS.filter(p => p.from <= to && p.to >= from);
  if(hall !== '__ALL__') plans = plans.filter(p=>p.hall===hall);
  if(!plans.length) return null;

  const map = new Map();
  plans.forEach(p => {
    const key = p.hall || '__ALL__';
    if(!map.has(key)) map.set(key, {hall:key, production:0, targetDeliveries:0, articles:0, floor:0, line:0});
    const agg = map.get(key);
    // sum per-plan values
    (p.lines||[]).forEach(l => {
      (l.rows||[]).forEach(r => {
        if(r.article) agg.articles++;
        const n = normalizeNumber(r.qty||0); if(n) agg.production += n;
      });
      (l.floorWork||[]).forEach(w => { agg.floor += normalizeNumber(w.qty||0); });
      (l.lineWork||[]).forEach(w => { agg.line += normalizeNumber(w.qty||0); });
    });
    agg.targetDeliveries += normalizeNumber(p.hallTargetDeliveries||0);
  });

  const rows = [...map.values()];
  const totals = rows.reduce((a,e)=>({production:a.production+e.production, targetDeliveries:a.targetDeliveries+e.targetDeliveries, articles:a.articles+e.articles, floor:a.floor+e.floor, line:a.line+e.line}), {production:0,targetDeliveries:0,articles:0,floor:0,line:0});

  return {rows, totals};
}

/* ==================================================================
   ============ تنفيذ التارجت (تعليم الأرتيكلات المنفّذة + حساب عجز المشرفين) ============
   ============ المنطق: كل أرتيكل مستهدف بيتعلّم عليه لما يشتغل. لو اشتغل جزء بس
   ============ من وقته، الباقي بيتحوّل تلقائي لأرتيكل جديد "متبقي" لسه محتاج يتعلّم عليه.
   ============ العجز = مجموع وقت الأرتيكلات اللي لسه معلّمتش عليها (أصلية أو متبقية).
   ================================================================== */
function execCanEdit(){
  // تعليم الأرتيكلات في تنفيذ التارجت مقصور على حسام عماد بس — أي حد تاني يقدر يشوف بس من غير تعديل
  if(!currentUser) return false;
  return currentUser.user === 'Hossam.Emad';
}
function newExecItemId(){ return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function getOrInitPlanExec(plan){
  let pe = TARGET_EXEC.find(x=>x.planId===plan.id);
  if(!pe){ pe = {planId:plan.id, lines:[]}; TARGET_EXEC.push(pe); }
  let changed = false;
  (plan.lines||[]).forEach(l => {
    let le = pe.lines.find(x=>x.line===l.line);
    if(!le){ le = {line:l.line, items:[]}; pe.lines.push(le); changed = true; }
    (l.rows||[]).forEach((r, idx) => {
      if(!(r.article || r.qty || r.h || r.m)) return;
      const existing = le.items.find(it => it.origIdx === idx);
      if(!existing){
        le.items.push({
          id: newExecItemId(), origIdx: idx,
          article: r.article||'', qty: r.qty||'', h: Number(r.h)||0, m: Number(r.m)||0,
          baseTime: '',
          done:false, actualH:null, actualM:null, doneAt:null, doneBy:null
        });
        changed = true;
      } else if(!existing.done){
        // الأرتيكل ده لسه ما اتعلّمش عليه، فمفيش مشكلة نحدّث المستهدف بتاعه لو الخطة الأصلية
        // اتعدّلت بعد ما هو اتسجّل — عشان تنفيذ التارجت يفضل متابع لآخر تعديل في الخطة.
        // الأرتيكلات اللي خلصت (done) بنسيبها زي ما هي عشان السجل التاريخي مايتغيرش.
        const newArticle = r.article||'', newQty = r.qty||'', newH = Number(r.h)||0, newM = Number(r.m)||0;
        if(existing.article!==newArticle || existing.qty!==newQty || existing.h!==newH || existing.m!==newM){
          existing.article = newArticle; existing.qty = newQty; existing.h = newH; existing.m = newM;
          changed = true;
        }
      }
    });
  });
  if(changed) saveTargetExec();
  return pe;
}
function execItemAmounts(it, previewReqMin){
  // بيرجع مقدار الوقت اللي اتحسب "اتعلّم عليه" ومقدار اللي "متبقي/عجز" للأرتيكل ده، ولو
  // فيه وقت أساسي مسجل (baseTime)، بيستخدم المتبقي الحقيقي المتوقع (الأساسي - المستهدف)
  // كمرجع، عشان لو الوقت المطلوب في الجديد أقل من المتوقع، يظهر ده كزيادة/شطارة (عجز سالب)
  // مش كعجز كامل بالمطلوب زي ما هو، وده بينعكس على إجمالي العجز في الخط/الصالة مش بس على شكل الرقم لوحده.
  // لو اتبعت previewReqMin (رقم مش null/undefined)، الدالة بتحسب "معاينة" الفرق زي لو الأرتيكل
  // اتعلّم عليه بالوقت ده بالظبط، حتى لو لسه فعليًا ماتعلّمش عليه (مفيدة عشان تعرض الفرق وهو لسه بيكتب).
  const schedMin = (Number(it.h)||0)*60 + (Number(it.m)||0);
  const hasPreview = previewReqMin !== undefined && previewReqMin !== null;
  if(!it.done && !hasPreview) return {schedMin, execMin:0, pendMin:schedMin, diffMin:null, usingBase:false};
  const reqMin = hasPreview ? previewReqMin : ((it.actualH!=null ? Number(it.actualH) : 0)*60 + (it.actualM!=null ? Number(it.actualM) : 0));
  const baseMin = parseHMToMinutes(it.baseTime);
  if(baseMin > 0){
    const expectedRemaining = baseMin - schedMin;
    const diffMin = reqMin - expectedRemaining;
    return {schedMin, execMin: schedMin - diffMin, pendMin: diffMin, diffMin, usingBase:true};
  }
  const diffMin = schedMin - reqMin;
  return {schedMin, execMin: diffMin, pendMin: reqMin, diffMin, usingBase:false};
}
function execLineTotals(execLine){
  // execMin = اللي اتعلّم عليه فعلاً، pendMin = العجز/المتبقي (ممكن يبقى سالب لو فيه زيادة/شطارة مسجلة بالأساسي)
  let execMin = 0, pendMin = 0;
  (execLine.items||[]).forEach(it => {
    const a = execItemAmounts(it);
    execMin += a.execMin; pendMin += a.pendMin;
  });
  const totalMin = execMin + pendMin;
  return {
    execMin, pendMin, totalMin,
    deficitPct: totalMin>0 ? pendMin/totalMin : 0,
    completionPct: totalMin>0 ? execMin/totalMin : 0
  };
}

function execPlanInnerHtml(plan, pe){
  let hallExecMin=0, hallPendMin=0;
  const lineCards = (plan.lines||[]).map(l => {
    const le = pe.lines.find(x=>x.line===l.line) || {line:l.line, items:[]};
    const t = execLineTotals(le);
    hallExecMin += t.execMin; hallPendMin += t.pendMin;
    return renderExecLineCard(plan, l, le);
  }).join('');
  const hallTotal = hallExecMin+hallPendMin;
  const hallDeficitPct = hallTotal>0 ? hallPendMin/hallTotal : 0;
  const ranking = (plan.lines||[]).map(l=>{
    const le = pe.lines.find(x=>x.line===l.line) || {line:l.line, items:[]};
    const t = execLineTotals(le);
    return {line:l.line, supervisor:l.supervisor||'-', deficitPct:t.deficitPct, pendMin:t.pendMin};
  }).sort((a,b)=>a.deficitPct-b.deficitPct);
  const rankingHtml = ranking.map((r,i)=>`
    <div class="record-row">
      <div class="rtop">
        <div><div class="rname">${i+1}. خط ${r.line} — ${r.supervisor}</div><div class="rmeta">العجز: ${fmtMinutes(r.pendMin)} (${fmtPct(r.deficitPct)})</div></div>
      </div>
    </div>`).join('') || '<div class="empty-state">مفيش خطوط</div>';

  return `
    <div class="section-title">🎯 ${plan.hall} ${plan.hallManager?`<span style="font-weight:600;color:var(--muted);font-size:11px;">— مدير الصالة: ${plan.hallManager}</span>`:''}</div>
    <div class="data-note" style="margin-bottom:8px;">الفترة: ${plan.from} → ${plan.to}</div>
    <div class="jard-hall-summary" style="margin-bottom:10px;">
      <h4><span>إجماليات تنفيذ الصالة</span></h4>
      <div class="jr-metrics">
        <div class="wm"><div class="l">التارجت</div><div class="v">${fmtMinutes(hallTotal)}</div></div>
        <div class="wm"><div class="l">إجمالي اللي اتعلّم عليه</div><div class="v" style="color:var(--green);">${fmtMinutes(hallExecMin)}</div></div>
        <div class="wm"><div class="l">العجز</div><div class="v" style="color:var(--red);">${fmtMinutes(hallPendMin)}</div><div class="p">${fmtPct(hallDeficitPct)}</div></div>
      </div>
    </div>
    ${lineCards}
    <div class="section-title" style="margin-top:10px;">🏆 ترتيب خطوط الصالة حسب نسبة العجز (الأقل عجز الأول)</div>
    ${rankingHtml}
  `;
}
function renderTargetExecPlan(plan){

function refreshExecPlanCard(plan){

  // (تعليم أرتيكل، حذف، تعديل يدوي) هيعيد رسم الكارت من غير ما يحدّث مستهدف من التارجت الحالي،

function updateExecDiffPreview(planId, lineNum, itemId){
  // بيدي معاينة حية لـ"الفرق" وهو لسه بيكتب في خانة "الجديد"، من غير ما يعلّم الأرتيكل كـ"تم"،
  // عشان يعرف كتب صح ولا غلط قبل ما يدوس ✔️.
  const pe = TARGET_EXEC.find(x=>x.planId===planId);
  const le = pe && pe.lines.find(x=>x.line===lineNum);
  const it = le && le.items.find(x=>x.id===itemId);
  const cell = document.getElementById('texec-diff-'+itemId);
  if(!it || it.done || !cell) return;
  const ahEl = document.getElementById('texec-ah-'+itemId);
  const amEl = document.getElementById('texec-am-'+itemId);
  const reqH = ahEl ? (Number(ahEl.value)||0) : 0;
  const reqM = amEl ? (Number(amEl.value)||0) : 0;
  const a = execItemAmounts(it, reqH*60 + reqM);
  const diffColor = a.usingBase
    ? (a.diffMin < 0 ? 'var(--green)' : (a.diffMin > 0 ? 'var(--red)' : 'var(--muted)'))
    : (a.diffMin > 0 ? 'var(--green)' : (a.diffMin < 0 ? 'var(--red)' : 'var(--muted)'));
  const baseMark = a.usingBase ? `<span title="محسوبة بناءً على الوقت الأساسي (${it.baseTime})" style="font-size:9px;">⚡</span>` : '';
  cell.innerHTML = `<b style="color:${diffColor};">${fmtSignedMinutes(a.diffMin)}</b>${baseMark} <span style="font-size:9px;color:var(--muted);">(معاينة)</span>`;
}
function toggleExecItem(planId, lineNum, itemId, cbEl){
  if(!execCanEdit()){ cbEl.checked = !cbEl.checked; showToast('🔒 مفيش صلاحية تعديل'); return; }
  const pe = TARGET_EXEC.find(x=>x.planId===planId);
  const le = pe && pe.lines.find(x=>x.line===lineNum);
  const it = le && le.items.find(x=>x.id===itemId);
  if(!it) return;

  if(cbEl.checked){
    const ahEl = document.getElementById('texec-ah-'+itemId);
    const amEl = document.getElementById('texec-am-'+itemId);
    const reqH = ahEl ? (Number(ahEl.value)||0) : 0;
    const reqM = amEl ? (Number(amEl.value)||0) : 0;
    const schedMin = (Number(it.h)||0)*60 + (Number(it.m)||0);
    const reqMin = reqH*60+reqM;
    it.done = true; it.actualH = reqH; it.actualM = reqM;
    it.doneAt = new Date().toISOString(); it.doneBy = currentUser.user;

    const diffMin = schedMin - reqMin;
    if(reqMin === 0) showToast('✅ اتعلّم الأرتيكل بالكامل — مفيش حاجة متبقية مطلوبة');
    else if(diffMin > 0) showToast(`✅ اتعلّم منه ${fmtMinutes(diffMin)} — لسه متبقي ${fmtMinutes(reqMin)} مطلوب في الجديد`);
    else if(diffMin === 0) showToast('⏳ اتسجّل — المطلوب في الجديد لسه زي المستهدف بالظبط');
    else showToast(`⚠️ المطلوب في الجديد زاد عن المستهدف الأصلي بـ ${fmtMinutes(-diffMin)}`);
  } else {
    it.done = false; it.actualH = null; it.actualM = null; it.doneAt = null; it.doneBy = null;
  }
  markExecDirty();
  refreshExecPlanCard(TARGET_PLANS.find(x=>x.id===planId));
}
function editExecItemField(planId, lineNum, itemId, field, value){
  const pe = TARGET_EXEC.find(x=>x.planId===planId);
  const le = pe && pe.lines.find(x=>x.line===lineNum);
  const it = le && le.items.find(x=>x.id===itemId);
  if(!it || it.done) return;
  if(field==='h' || field==='m') it[field] = Number(value)||0;
  else it[field] = value;
  markExecDirty();
  refreshExecPlanCard(TARGET_PLANS.find(x=>x.id===planId));
}
function deleteExecItem(planId, lineNum, itemId){
  const pe = TARGET_EXEC.find(x=>x.planId===planId);
  const le = pe && pe.lines.find(x=>x.line===lineNum);
  if(!le) return;
  const it = le.items.find(x=>x.id===itemId);
  if(it && it.done){ showToast('⚠️ مينفعش تمسح أرتيكل اتعلّم عليه بالفعل'); return; }
  le.items = le.items.filter(x=>x.id!==itemId);
  markExecDirty();
  refreshExecPlanCard(TARGET_PLANS.find(x=>x.id===planId));
}
function addManualExecItem(planId, lineNum){
  const pe = TARGET_EXEC.find(x=>x.planId===planId);

    return;
  }
  let plans = TARGET_PLANS.filter(p => p.from <= to && p.to >= from);
  if(hall !== '__ALL__') plans = plans.filter(p=>p.hall===hall);
  if(!plans.length){ showToast('⚠️ مفيش بيانات تنفيذ للطباعة'); return; }

  const body = plans.map(p => {
    const pe = getOrInitPlanExec(p);
    let hallExecMin=0, hallPendMin=0;
    // شبكة الخطوط بقت CSS Grid بعدد أعمدة = عدد خطوط الصالة بالظبط (مش flex بنسبة مئوية).
    // الطريقة دي بتضمن إن عرض الصفحة يتوزع بالتساوي 100% مهما كان عدد الخطوط (4 أو 5)، من غير
    // ما نصطدم بقاعدة max-width الثابتة (20%) الموجودة في الـ CSS الأساسي لكارت الخط.
    const lineCount = (p.lines||[]).length || 1;
    const linesHtml = (p.lines||[]).map(l => {
      const le = pe.lines.find(x=>x.line===l.line) || {line:l.line, items:[]};
      const t = execLineTotals(le);
      hallExecMin += t.execMin; hallPendMin += t.pendMin;
      const rows = le.items || [];
      return `
        <div class="power-print-card target-card" style="flex:none;max-width:none;width:100%;">
          <table class="print-onepage target-print-table">
            <thead>
              <tr><th colspan="5">خط ${l.line}${l.supervisor? ' — '+l.supervisor : ''}</th></tr>
              <tr><th>أرتيكل</th><th>مستهدف</th><th>المطلوب في الجديد</th><th>الفرق</th><th>الحالة</th></tr>
            </thead>
            <tbody>
              ${rows.length ? rows.map(r=>`<tr><td><b>${r.article||'-'}</b></td><td>${fmtMinutes((r.h||0)*60+(r.m||0))}</td><td>${r.done? fmtMinutes((r.actualH||0)*60+(r.actualM||0)) : '-'}</td><td>${r.done? fmtSignedMinutes(((r.h||0)*60+(r.m||0)) - ((r.actualH||0)*60+(r.actualM||0))) : '-'}</td><td>${r.done?'تم':'لسه'}</td></tr>`).join('') : '<tr><td colspan="5">لا يوجد</td></tr>'}
              <tr class="total-row"><td colspan="2">إجمالي اللي اتعلّم عليه</td><td colspan="3"><b>${fmtMinutes(t.execMin)}</b></td></tr>
              <tr class="total-row"><td colspan="2">إجمالي العجز</td><td colspan="3"><b>${fmtMinutes(t.pendMin)} (${fmtPct(t.deficitPct)})</b></td></tr>
            </tbody>
          </table>
        </div>`;
    }).join('');
    const hallTotal = hallExecMin+hallPendMin;
    const hallDeficitPct = hallTotal>0 ? hallPendMin/hallTotal : 0;
    return `
      <h2>${p.hall}${p.hallManager? ` <span style="font-size:13px;font-weight:600;">— مدير الصالة: ${p.hallManager}</span>` : ''}</h2>
      <h3>الفترة: ${p.from} إلى ${p.to} — إجمالي عجز الصالة: ${fmtMinutes(hallPendMin)} (${fmtPct(hallDeficitPct)})</h3>
      <div class="power-print-grid" style="display:grid;grid-template-columns:repeat(${lineCount}, 1fr);align-items:start;">${linesHtml}</div>
    `;
  }).join('<div style="height:2px;background:#E7DCCF;margin:8px 0;"></div>');

  document.getElementById('print-rank-output').innerHTML = buildPrintLayout(
    'MILANO SPORT SHOES — تنفيذ التارجت والعجز',
    hall === '__ALL__' ? `كل الصالات — من ${from} إلى ${to}` : `${hall} — من ${from} إلى ${to}`,
    body
  );
  document.body.classList.add('print-rank-only');
  document.getElementById('print-rank-output').classList.add('landscape-mode', 'hp-compact-print');
  window.print();
  setTimeout(()=>{
    document.body.classList.remove('print-rank-only');
    document.getElementById('print-rank-output').classList.remove('landscape-mode', 'hp-compact-print');
  }, 800);
}

function updateHpActual(hall, l){
  const basic = Number(document.getElementById('hp-basic-'+hall+'-'+l).value)||0;
  const clear = Number(document.getElementById('hp-clear-'+hall+'-'+l).value)||0;
  const absent = Number(document.getElementById('hp-absent-'+hall+'-'+l).value)||0;
  const actualEl = document.getElementById('hp-actual-'+hall+'-'+l);
  if(actualEl && actualEl.dataset.manual !== '1') actualEl.value = String(basic-clear-absent);
}
function markHpActualEdited(hall, l){
  const actualEl = document.getElementById('hp-actual-'+hall+'-'+l);
  if(actualEl) actualEl.dataset.manual = '1';
}
function parseHpNumericInput(val){
  const normalized = String(val ?? '').replace(/,/g, '').trim();
  return normalized === '' ? 0 : Number(normalized);
}
// allow authorized users to set a manual actual value for a given date/hall/line
async function setHpViewActual(date, hall, line, val){
  const num = Number(val) || 0;
  // update all records for that date
  let changed = false;
  HALL_POWER.filter(p=>p.date===date).forEach(p=>{
    (p.halls||[]).forEach(h=>{
      if(h.hall !== hall) return;
      (h.lines||[]).forEach(l=>{
        if(String(l.line) === String(line)){
          l.manualActual = num;
          changed = true;
        }
      });
    });
  });
  if(changed){
    await saveHallPowerToDb();
    showToast('✅ تم حفظ الفعلي المعدّل');
    applyHpFilter();
  } else {
    showToast('⚠️ لم أجد السجل للحفظ');
  }
}
// allow authorized users to set a manual actual value across a whole date range for a given hall/line
async function setHpViewActualRange(from, to, hall, line, val){
  const num = Number(val) || 0;
  let changed = false;
  HALL_POWER.filter(p => p.date >= from && p.date <= to).forEach(p=>{
    (p.halls||[]).forEach(h=>{
      if(h.hall !== hall) return;
      (h.lines||[]).forEach(l=>{
        if(String(l.line) === String(line)){
          l.manualActual = num;
          changed = true;
        }
      });
    });
  });
  if(changed){
    await saveHallPowerToDb();
    showToast('✅ تم حفظ الفعلي المعدّل على كل أيام الفترة');
    applyHpFilter();
  } else {
    showToast('⚠️ لم أجد سجلات في الفترة دي للحفظ');
  }
}
async function saveHallPower(){
  const date = document.getElementById('hp-date').value;
  if(!date){ showToast('⚠️ حدد التاريخ'); return; }
  const halls = HALL_POWER_HALLS.map(hall => ({
    hall,
    lines: (HALL_POWER_LINES[hall]||[]).map(l => ({
      line: l,
      basic: Number(document.getElementById('hp-basic-'+hall+'-'+l).value)||0,
      clearance: Number(document.getElementById('hp-clear-'+hall+'-'+l).value)||0,
      absence: Number(document.getElementById('hp-absent-'+hall+'-'+l).value)||0,
      manualActual: parseHpNumericInput(document.getElementById('hp-actual-'+hall+'-'+l).value)
    }))
  }));
  if(editingHallPowerId){
    const idx = HALL_POWER.findIndex(p=>p.id===editingHallPowerId);
    if(idx>-1) HALL_POWER[idx] = {...HALL_POWER[idx], date, halls};
    editingHallPowerId = null;
    await saveHallPowerToDb();
    showToast('✅ اتحفظ التعديل');
  } else {
    HALL_POWER.push({id:'hp'+Date.now()+Math.random().toString(36).slice(2,6), date, halls, enteredBy: currentUser.user, ts: new Date().toISOString()});
    await saveHallPowerToDb();
    showToast(`✅ اتحفظت قوة كل الصالات يوم ${date}`);
  }
  renderHallPowerRegTab();
}
function cancelHpEdit(){ editingHallPowerId = null; renderHallPowerRegTab(); }
function renderHpList(){

  let records = [...HALL_POWER];
  if(date) records = records.filter(p => p.date === date);

        <div class="ractions">
          <button class="op-btn" onclick="editHallPower('${p.id}')">✏️</button>

}
function editHallPower(id){
  const p = HALL_POWER.find(x=>x.id===id);
  if(!p) return;
  editingHallPowerId = id;
  renderHallPowerRegTab();
  document.getElementById('hp-edit-label').textContent = `— بتعدّل يوم ${p.date}`;
  document.getElementById('hp-date').value = p.date;
  (p.halls||[]).forEach(h => {
    h.lines.forEach(l => {
      const bEl = document.getElementById('hp-basic-'+h.hall+'-'+l.line);
      if(!bEl) return;
      bEl.value = l.basic||'';
      document.getElementById('hp-clear-'+h.hall+'-'+l.line).value = l.clearance||'';
      document.getElementById('hp-absent-'+h.hall+'-'+l.line).value = l.absence||'';
      const actualEl = document.getElementById('hp-actual-'+h.hall+'-'+l.line);
      const currentActual = typeof l.manualActual !== 'undefined' ? l.manualActual : (l.basic||0) - (l.clearance||0) - (l.absence||0);

      updateHpActual(h.hall, l.line);

function applyHpFilter(){
  const from = document.getElementById('hpf-from').value;
  const to = document.getElementById('hpf-to').value;
  const hall = document.getElementById('hpf-hall').value;
  const results = document.getElementById('hp-results');
  if(!from || !to){
    results.innerHTML = '<div class="empty-state">🔎 حدد من تاريخ وإلى تاريخ الأول عشان تشوف قوة الصالة.</div>';
    return;
  }
  let recs = HALL_POWER.filter(p => p.date >= from && p.date <= to);
  if(!recs.length){ results.innerHTML = '<div class="empty-state">مفيش بيانات قوة صالة في الفترة دي.</div>'; return; }

  // تجميع لكل خط: مجموع تصفية، مجموع غياب، متوسط فعلي
  const lineMap = new Map(); // key: hall|line
  recs.forEach(p => (p.halls||[]).forEach(h => {
    if(hall !== '__ALL__' && h.hall !== hall) return;
    h.lines.forEach(l => {
      const key = h.hall+'|'+l.line;
      if(!lineMap.has(key)) lineMap.set(key, {hall:h.hall, line:l.line, basicSum:0, clearanceSum:0, absenceSum:0, actualSum:0, days:0});
      const e = lineMap.get(key);
      e.basicSum += l.basic||0;
      e.clearanceSum += l.clearance||0;
      e.absenceSum += l.absence||0;
      // prefer manualActual if present on the recorded line
      e.actualSum += (typeof l.manualActual !== 'undefined') ? (Number(l.manualActual)||0) : ((l.basic||0)-(l.clearance||0)-(l.absence||0));
      if(typeof l.manualActual !== 'undefined') e.manualActual = l.manualActual;
      e.days++;
    });
  }));
  if(!lineMap.size){ results.innerHTML = '<div class="empty-state">مفيش بيانات قوة صالة في الفترة دي.</div>'; return; }
  const entries = [...lineMap.values()].map(e => ({...e,
    avgActual: e.days? Math.round(e.actualSum/e.days) : 0,
    avgBasic: e.days? Math.round(e.basicSum/e.days) : 0
  }));

  const maxClearance = Math.max(...entries.map(e=>e.clearanceSum));
  const maxAbsence = Math.max(...entries.map(e=>e.absenceSum));
  const topClearanceLines = entries.filter(e=>e.clearanceSum===maxClearance && maxClearance>0);
  const topAbsenceLines = entries.filter(e=>e.absenceSum===maxAbsence && maxAbsence>0);

  const isRange = from !== to;

  // إجمالي التصفية والغياب لكل يوم في الفترة (لعرضها كمربع صغير جنب باقي الملخص)
  let dailyChipsHtml = '';
  if(isRange){
    const dailyMap = new Map(); // date -> {clearance, absence}
    recs.forEach(p => {
      let cSum=0, aSum=0;
      (p.halls||[]).forEach(h => {
        if(hall !== '__ALL__' && h.hall !== hall) return;
        (h.lines||[]).forEach(l => { cSum += l.clearance||0; aSum += l.absence||0; });
      });
      dailyMap.set(p.date, {clearance:cSum, absence:aSum});
    });
    const dailyEntries = [...dailyMap.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
    const dayLabel = d => { const parts=d.split('-'); return parts.length===3? `${parts[2]}/${parts[1]}` : d; };
    const clearanceChips = dailyEntries.map(([d,v])=>`<span class="hp-daily-chip">${dayLabel(d)}: <b>${fmtNum(v.clearance)}</b></span>`).join('');
    const absenceChips = dailyEntries.map(([d,v])=>`<span class="hp-daily-chip">${dayLabel(d)}: <b>${fmtNum(v.absence)}</b></span>`).join('');
    dailyChipsHtml = `
      <div class="hp-mini-box hp-daily-box">
        <div class="hp-mini-title">📅 إجمالي التصفية يوميًا</div>
        <div class="hp-daily-chips">${clearanceChips || '—'}</div>
      </div>
      <div class="hp-mini-box hp-daily-box">
        <div class="hp-mini-title">📅 إجمالي الغياب يوميًا</div>
        <div class="hp-daily-chips">${absenceChips || '—'}</div>
      </div>`;
  }

  results.innerHTML = `
    <div class="hp-summary-row" style="margin-bottom:12px;">
      <div class="hp-mini-box">
        <div class="hp-mini-title">🏆 أعلى تصفية (${fmtNum(maxClearance)})</div>
        <div class="hp-mini-val">${topClearanceLines.length? topClearanceLines.map(e=>`<span class="power-max-badge">${e.hall} — خط ${e.line}</span>`).join('') : 'لا يوجد'}</div>
      </div>
      <div class="hp-mini-box">
        <div class="hp-mini-title">🏆 أعلى غياب (${fmtNum(maxAbsence)})</div>
        <div class="hp-mini-val">${topAbsenceLines.length? topAbsenceLines.map(e=>`<span class="power-max-badge">${e.hall} — خط ${e.line}</span>`).join('') : 'لا يوجد'}</div>
      </div>
      ${dailyChipsHtml}
    </div>
    <div class="section-title">${isRange? '📊 متوسط العدد الفعلي لكل خط خلال الفترة' : '📋 التفاصيل ليوم '+from}</div>
    ${[...new Set(entries.map(e=>e.hall))].map(h => `
      <div class="jard-hall-summary">
        <h4><span>${h}</span></h4>
        <div class="jard-line-row head"><span>خط</span><span>أساسي</span><span>${isRange?'متوسط فعلي':'فعلي'}</span><span>إجمالي تصفية</span><span>إجمالي غياب</span></div>
        ${entries.filter(e=>e.hall===h).sort((a,b)=>String(a.line).localeCompare(String(b.line),'en',{numeric:true})).map(e=>{
          const canEdit = hallPowerCanEdit();
          let actualCell;
          if(!canEdit){
            actualCell = isRange? fmtNum(e.avgActual) : fmtNum(e.actualSum);
          } else if(isRange){
            actualCell = `<input type="number" id="hpview-actual-${e.hall}-${e.line}" value="${(typeof e.manualActual!=='undefined'? e.manualActual : e.avgActual)}" onchange="setHpViewActualRange('${from}','${to}','${e.hall}','${e.line}', this.value)">`;
          } else {
            actualCell = `<input type="number" id="hpview-actual-${e.hall}-${e.line}" value="${(typeof e.manualActual!=='undefined'? e.manualActual : e.actualSum)}" onchange="setHpViewActual('${from}','${e.hall}','${e.line}', this.value)">`;
          }
          return `<div class="jard-line-row"><span><b>${e.line}</b></span><span>${isRange?e.avgBasic:fmtNum(e.basicSum)}</span><span>${actualCell}</span><span>${fmtNum(e.clearanceSum)}</span><span>${fmtNum(e.absenceSum)}</span></div>`;
        }).join('')}
      </div>
    `).join('')}
  `;
}

        (h.lines||[]).forEach(l => { cSum += l.clearance||0; aSum += l.absence||0; });
      });
      dailyMap.set(p.date, {clearance:cSum, absence:aSum});
    });
    const dailyEntries = [...dailyMap.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
    const dayLabel = d => { const parts=d.split('-'); return parts.length===3? `${parts[2]}/${parts[1]}` : d; };
    const chipStyle = 'display:inline-block;background:#F3F1EC;border-radius:4px;padding:1.5px 5px;font-size:8.5px;font-weight:800;margin:1px;white-space:nowrap;color:#1F1F1F;';
    const clearanceChips = dailyEntries.map(([d,v])=>`<span style="${chipStyle}">${dayLabel(d)}:${fmtNum(v.clearance)}</span>`).join('');
    const absenceChips = dailyEntries.map(([d,v])=>`<span style="${chipStyle}">${dayLabel(d)}:${fmtNum(v.absence)}</span>`).join('');
    dailyChipsHtml = `
      <div style="background:#fff;border:1px solid #DAD4C6;border-radius:8px;padding:5px 5px 4px;text-align:center;overflow:hidden;max-height:52px;">
        <div style="font-size:7.5px;color:#6B7280;margin-bottom:0;">تصفية يوميًا</div>
        <div style="line-height:1.25;margin-top:1px;">${clearanceChips || '—'}</div>
      </div>
      <div style="background:#fff;border:1px solid #DAD4C6;border-radius:8px;padding:5px 5px 4px;text-align:center;overflow:hidden;max-height:52px;">
        <div style="font-size:7.5px;color:#6B7280;margin-bottom:0;">غياب يوميًا</div>
        <div style="line-height:1.25;margin-top:1px;">${absenceChips || '—'}</div>
      </div>`;
  }

  const statsHtml = `
    <div style="display:grid;grid-template-columns:${isRange?'0.7fr 0.7fr 1.3fr 1.3fr':'repeat(2,1fr)'};gap:5px;margin:0 auto 6px;max-width:100%;">
      <div style="background:#fff;border:1px solid #DAD4C6;border-radius:8px;padding:4px 3px;text-align:center;">
        <div style="font-size:7px;color:#6B7280;margin-bottom:1px;">أعلى تصفية</div>
        <div style="font-size:8.5px;font-weight:800;line-height:1.25;">${topClearance ? `${topClearance.hall} — خط ${topClearance.line} (${fmtNum(topClearance.clearanceSum)})` : '-'}</div>
      </div>
      <div style="background:#fff;border:1px solid #DAD4C6;border-radius:8px;padding:4px 3px;text-align:center;">
        <div style="font-size:7px;color:#6B7280;margin-bottom:1px;">أعلى غياب</div>
        <div style="font-size:8.5px;font-weight:800;line-height:1.25;">${topAbsence ? `${topAbsence.hall} — خط ${topAbsence.line} (${fmtNum(topAbsence.absenceSum)})` : '-'}</div>
      </div>
      ${dailyChipsHtml}
    </div>`;

  // الترتيب ثابت زي ما هو في HALL_POWER_HALLS: A B C D E G ثم اللسان ثم الكنترول ثم الجودة
  const hallCards = hallsOrdered.map(h => {
    const rows = entries.filter(e=>e.hall===h).sort((a,b)=>String(a.line).localeCompare(String(b.line),'en',{numeric:true}));
    const hallActual = rows.reduce((a,e)=>a+(isRange ? e.actualSum/e.days : e.actualSum), 0);
    return `
      <div class="power-print-card hp-print-card">
        <table class="print-onepage hp-print-table">
          <thead>
            <tr><th colspan="5">${h}</th></tr>
            <tr><th>الخط</th><th>أساسي</th><th>تصفية</th><th>غياب</th><th>${isRange?'م.فعلي':'فعلي'}</th></tr>
          </thead>
          <tbody>
            ${rows.map(e=>`
              <tr>
                <td><b>خط ${e.line}</b></td>
                <td>${isRange ? Math.round(e.basicSum/e.days) : fmtNum(e.basicSum)}</td>
                <td>${fmtNum(e.clearanceSum)}</td>
                <td>${fmtNum(e.absenceSum)}</td>
                <td><b>${isRange ? Math.round(e.actualSum/e.days) : fmtNum(e.actualSum)}</b></td>
              </tr>`).join('')}
            <tr class="total-row"><td colspan="4">إجمالي الصالة</td><td>${Math.round(hallActual)}</td></tr>
          </tbody>
        </table>
      </div>`;
  });

  const totalBarHtml = `
    <div class="power-print-total-bar">
      <span class="ptb-label">إجمالي كل الصالات</span>
      <span class="ptb-item"><span>أساسي</span><b>${fmtNum(totals.basic)}</b></span>
      <span class="ptb-item"><span>تصفية</span><b>${fmtNum(totals.clear)}</b></span>
      <span class="ptb-item"><span>غياب</span><b>${fmtNum(totals.abs)}</b></span>
      <span class="ptb-item"><span>${isRange?'م.فعلي':'فعلي'}</span><b>${fmtNum(totals.act)}</b></span>
    </div>`;

  const cardsPerRow = 4;
  let gridRowsHtml = '';
  for(let i=0; i<hallCards.length; i+=cardsPerRow){
    gridRowsHtml += `<div class="power-print-grid">${hallCards.slice(i, i+cardsPerRow).join('')}</div>`;
  }

  const bodyHtml = `
    ${statsHtml}
    ${gridRowsHtml}
    ${totalBarHtml}`;


  document.getElementById('print-rank-output').innerHTML = buildPrintLayout('MILANO SPORT SHOES — قوة الصالة', `${isRange ? `من ${from} إلى ${to}` : `يوم ${from}`}${hall!=='__ALL__' ? ' — '+hall : ' — كل الصالات'}`, bodyHtml);
  document.body.classList.add('print-rank-only');
  document.getElementById('print-rank-output').classList.add('landscape-mode', 'hp-compact-print');
  window.print();
  setTimeout(()=>{
    document.body.classList.remove('print-rank-only');
    document.getElementById('print-rank-output').classList.remove('landscape-mode', 'hp-compact-print');
  }, 800);
}

async function saveNightPower(){
  const date = document.getElementById('np-date').value;
  if(!date){ showToast('⚠️ حدد التاريخ'); return; }
  const halls = NIGHT_HALLS.map(h => ({hall:h, count: Number(document.getElementById('np-count-'+h).value)||0}));
  if(editingNightPowerId){
    const idx = NIGHT_POWER.findIndex(p=>p.id===editingNightPowerId);
    if(idx>-1) NIGHT_POWER[idx] = {...NIGHT_POWER[idx], date, halls};
    editingNightPowerId = null;
    await saveNightPowerToDb();
    showToast('✅ اتحفظ التعديل');
  } else {
    NIGHT_POWER.push({id:'np'+Date.now()+Math.random().toString(36).slice(2,6), date, halls, enteredBy: currentUser.user, ts: new Date().toISOString()});

}

function applyNpFilter(){
  const from = document.getElementById('npf-from').value;
  const to = document.getElementById('npf-to').value;
  const hall = document.getElementById('npf-hall').value;
  const results = document.getElementById('np-results');
  if(!from || !to){
    results.innerHTML = '<div class="empty-state">🔎 حدد من تاريخ وإلى تاريخ الأول عشان تشوف قوة السهر.</div>';
    return;
  }
  let recs = NIGHT_POWER.filter(p => p.date >= from && p.date <= to);
  if(!recs.length){ results.innerHTML = '<div class="empty-state">مفيش بيانات قوة سهر في الفترة دي.</div>'; return; }

  const hallMap = new Map();
  recs.forEach(p => (p.halls||[]).forEach(h => {
    if(hall !== '__ALL__' && h.hall !== hall) return;
    if(!hallMap.has(h.hall)) hallMap.set(h.hall, {hall:h.hall, sum:0, days:0});
    const e = hallMap.get(h.hall);
    e.sum += h.count||0; e.days++;
  }));
  if(!hallMap.size){ results.innerHTML = '<div class="empty-state">مفيش بيانات قوة سهر في الفترة دي.</div>'; return; }
  const entries = [...hallMap.values()].map(e => ({...e, avg: e.days? Math.round(e.sum/e.days) : 0}));
  const isRange = from !== to;
  const total = entries.reduce((a,e)=>a+e.sum, 0);
  const totalAvg = recs.length ? Math.round(total/recs.length) : 0;
  const showHallExtremes = hall === '__ALL__' && entries.length > 1;
  const topHall = showHallExtremes ? [...entries].sort((a,b)=>b.sum-a.sum)[0] : null;

        <tbody>

        </tbody>
      </table>

  const totalCard = `

      <table class="print-onepage power-print-table">
        <thead>
          <tr><th colspan="${isRange?2:1}">الإجمالي</th></tr>

        </thead>
        <tbody>
          <tr>${isRange ? `<td><b>${totalAvg}</b></td><td><b>${fmtNum(total)}</b></td>` : `<td><b>${fmtNum(total)}</b></td>`}</tr>

  const body = `${statsHtml}<div class="power-print-grid">${hallsHtml}${totalCard}</div>`;

  document.body.classList.add('print-rank-only');
  document.getElementById('print-rank-output').classList.add('landscape-mode', 'hp-compact-print');
  window.print();

/* ==========================================================================
   التنقل بالأسهم بين الخانات (كود / تارجت / إنتاج / إصلاح / هالك ... إلخ)
   - فوق/تحت: ينقل لنفس "العمود" في الصف اللي فوق أو تحت (بيحسب المسافة
     الفعلية على الشاشة مش ترتيب الكود، فبيشتغل صح في أي جدول أو كروت
     (الجرد / التارجت / تسجيل الأداء) من غير ما نحتاج نظبط كل جدول لوحده.
   - يمين/شمال: بينقل للخانة اللي جنبها فعليًا على الشاشة، وبس لما يكون
     المؤشر عند حافة النص (بداية الخانة أو نهايتها) عشان ميبوظش تعديل رقم
     مكون من أكتر من خانة (زي لما تكون بتتحرك جوه رقم بخانتين أو تلاتة).
   ========================================================================== */
(function(){
  const NAV_SELECTOR = 'input[type="number"], input[type="text"], input[type="tel"]';

  function isNavigable(el){
    if(!el || typeof el.matches !== 'function') return false;
    if(!el.matches(NAV_SELECTOR)) return false;
    if(el.disabled || el.readOnly) return false;
    if(el.offsetParent === null) return false; // مخفي حاليًا
    return true;
  }

  function getCandidates(){
    return Array.from(document.querySelectorAll(NAV_SELECTOR)).filter(isNavigable);
  }

  function findTarget(current, key){
    const cur = current.getBoundingClientRect();
    const curCX = cur.left + cur.width/2;
    const curCY = cur.top + cur.height/2;
    const rowTol = Math.max(cur.height*0.65, 14);
    let best = null, bestScore = Infinity;

    for(const el of getCandidates()){
      if(el === current) continue;
      const r = el.getBoundingClientRect();
      const dx = (r.left + r.width/2) - curCX;
      const dy = (r.top + r.height/2) - curCY;

      if(key === 'ArrowDown'){
        if(dy <= rowTol*0.4) continue;
        const score = dy + Math.abs(dx)*3;
        if(score < bestScore){ bestScore = score; best = el; }
      } else if(key === 'ArrowUp'){
        if(dy >= -rowTol*0.4) continue;
        const score = -dy + Math.abs(dx)*3;
        if(score < bestScore){ bestScore = score; best = el; }
      } else if(key === 'ArrowRight'){
        if(Math.abs(dy) > rowTol || dx <= 2) continue;
        if(dx < bestScore){ bestScore = dx; best = el; }
      } else if(key === 'ArrowLeft'){
        if(Math.abs(dy) > rowTol || dx >= -2) continue;
        if(-dx < bestScore){ bestScore = -dx; best = el; }
      }
    }
    return best;
  }

  function focusTarget(target){
    target.focus();
    try{ target.select(); }catch(err){ /* بعض المتصفحات بترفض select() على number */ }
  }

  document.addEventListener('keydown', function(e){
    const key = e.key;
    if(key !== 'ArrowUp' && key !== 'ArrowDown' && key !== 'ArrowLeft' && key !== 'ArrowRight') return;
    if(e.ctrlKey || e.metaKey || e.altKey || e.shiftKey) return; // سيبي الاختصارات القياسية زي هي

    const el = e.target;
    if(!isNavigable(el)) return;

    // الأربع اتجاهات كلهم بيتنقلوا فورًا لأقرب خانة في نفس الاتجاه، بالظبط
    // زي فوق وتحت، من غير ما نستنى المؤشر يوصل لحافة النص.
    const target = findTarget(el, key);
    e.preventDefault(); // نمنع تغيير القيمة التلقائي لـ input[type=number] أو تحريك المؤشر جوه النص
    if(target) focusTarget(target);
  });
})();

/* ==========================================================================
   تحديد كذا خانة بالماوس (زي إكسل) + نسخ/لصق المجموعة
   - اسحب بالماوس فوق أكتر من خانة عشان تتحدد كلها (بتتلون بالأزرق).
   - Shift + كليك على خانة تانية: يوسّع التحديد من آخر خانة كانت متحددة لحد الخانة دي.
   - Ctrl/Cmd + C: بينسخ كل الخانات المحددة (لو أكتر من خانة).
   - Ctrl/Cmd + V (أو لصق عادي) وانت محدد أكتر من خانة: بيوزع القيم المنسوخة
     على نفس شكل التحديد، صف تحت صف وعمود جنب عمود.
   - Esc أو كليك بره الخانات: يمسح التحديد.
   - ملحوظة: لو خانة واحدة بس متركز عليها (من غير تحديد جماعي)، اللصق
     بيشتغل زي ما هو من غير أي تغيير (نظام اللصق الحالي لكل جدول لوحده).
   ========================================================================== */
(function(){
  const NAV_SELECTOR = 'input[type="number"], input[type="text"], input[type="tel"]';
  let isDragging = false;
  let dragMoved = false;
  let startX = 0, startY = 0, curX = 0, curY = 0;
  let selectedCells = [];
  let lastAnchor = null;
  let rectEl = null;

  function isNavigable(el){
    if(!el || typeof el.matches !== 'function') return false;
    if(!el.matches(NAV_SELECTOR)) return false;
    if(el.disabled || el.readOnly) return false;
    if(el.offsetParent === null) return false;
    return true;
  }

  function getCandidates(){
    return Array.from(document.querySelectorAll(NAV_SELECTOR)).filter(isNavigable);
  }

  function clearSelection(){
    selectedCells.forEach(el => el.classList.remove('cell-selected'));
    selectedCells = [];
  }

  function ensureRect(){
    if(!rectEl){
      rectEl = document.createElement('div');
      rectEl.id = 'cell-select-rect';
      document.body.appendChild(rectEl);
    }
    return rectEl;
  }

  function showRect(){
    const r = ensureRect();
    const left = Math.min(startX, curX), top = Math.min(startY, curY);
    const w = Math.abs(curX - startX), h = Math.abs(curY - startY);
    r.style.left = left + 'px'; r.style.top = top + 'px';
    r.style.width = w + 'px'; r.style.height = h + 'px';
    r.style.display = 'block';
  }

  function hideRect(){
    if(rectEl) rectEl.style.display = 'none';
  }

  function selectByRect(left, top, right, bottom){
    const next = [];
    getCandidates().forEach(el => {
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      if(cx >= left && cx <= right && cy >= top && cy <= bottom) next.push(el);
    });
    selectedCells.forEach(el => { if(!next.includes(el)) el.classList.remove('cell-selected'); });
    next.forEach(el => el.classList.add('cell-selected'));
    selectedCells = next;
  }

  // بيرتب الخانات المحددة في صفوف وأعمدة حسب مكانها الفعلي على الشاشة
  function groupIntoRows(cells){
    const items = cells.map(el => {
      const r = el.getBoundingClientRect();
      return { el, cx: r.left + r.width/2, cy: r.top + r.height/2, h: r.height };
    });
    items.sort((a, b) => a.cy - b.cy);
    const rows = [];
    items.forEach(it => {
      let row = rows.find(row => Math.abs(row.cy - it.cy) < Math.max(it.h * 0.6, 10));
      if(!row){ row = { cy: it.cy, items: [] }; rows.push(row); }
      row.items.push(it);
    });
    rows.forEach(row => row.items.sort((a, b) => a.cx - b.cx));
    return rows.map(row => row.items.map(it => it.el));
  }

  document.addEventListener('mousedown', function(e){
    const el = e.target;
    if(!isNavigable(el)){
      if(!(el.closest && el.closest('#cell-select-rect'))) clearSelection();
      return;
    }
    if(e.shiftKey && lastAnchor && lastAnchor !== el){
      const ra = lastAnchor.getBoundingClientRect();
      const rb = el.getBoundingClientRect();
      const left = Math.min(ra.left + ra.width/2, rb.left + rb.width/2);
      const right = Math.max(ra.left + ra.width/2, rb.left + rb.width/2);
      const top = Math.min(ra.top + ra.height/2, rb.top + rb.height/2);
      const bottom = Math.max(ra.top + ra.height/2, rb.top + rb.height/2);
      selectByRect(left - 4, top - 4, right + 4, bottom + 4);
      e.preventDefault();
      return;
    }
    clearSelection();
    lastAnchor = el;
    isDragging = true;
    dragMoved = false;
    startX = e.clientX; startY = e.clientY;
    curX = startX; curY = startY;
  });

  document.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    curX = e.clientX; curY = e.clientY;
    if(!dragMoved && (Math.abs(curX - startX) > 4 || Math.abs(curY - startY) > 4)){
      dragMoved = true;
      document.body.classList.add('cells-being-selected');
      if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
    }
    if(dragMoved){
      showRect();
      selectByRect(Math.min(startX, curX), Math.min(startY, curY), Math.max(startX, curX), Math.max(startY, curY));
    }
  });

  document.addEventListener('mouseup', function(){
    if(!isDragging) return;
    isDragging = false;
    hideRect();
    document.body.classList.remove('cells-being-selected');
    if(!dragMoved){
      clearSelection();
    }
  });

  document.addEventListener('copy', function(e){
    if(selectedCells.length < 2) return; // سيبي النسخ العادي لنص جوه خانة واحدة زي ما هو
    const rows = groupIntoRows(selectedCells);
    const text = rows.map(row => row.map(el => el.value || '').join('\t')).join('\n');
    e.clipboardData.setData('text/plain', text);
    e.preventDefault();
    if(typeof showToast === 'function') showToast(`✅ اتنسخ ${selectedCells.length} خانة`);
  }, true);

  function fireInput(el){
    el.dispatchEvent(new Event('input', { bubbles: true }));
    el.dispatchEvent(new Event('change', { bubbles: true }));
  }

  document.addEventListener('paste', function(e){
    if(selectedCells.length < 2) return; // سيبي نظام اللصق الأصلي لكل جدول يشتغل زي ما هو
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if(!text) return;
    e.preventDefault();
    e.stopPropagation();
    const grid = text.replace(/\r/g, '').split('\n').filter((l, i, arr) => !(i === arr.length - 1 && l === '')).map(l => l.split('\t'));
    const flat = [];
    grid.forEach(row => row.forEach(v => flat.push(v)));
    const rows = groupIntoRows(selectedCells);
    let vi = 0;
    rows.forEach(row => row.forEach(el => {
      if(flat.length === 1) el.value = flat[0];
      else if(vi < flat.length) el.value = flat[vi++];
      fireInput(el);
    }));
    if(typeof showToast === 'function') showToast('✅ اتلصقت القيم في الخانات المحددة');
  }, true);

  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') clearSelection();
  });
})();

/* ---------- تحديد الصف اللي بتكتب فيه دلوقتي في تسجيل الأداء ---------- */
(function(){
  let activeRow = null;
  document.addEventListener('focusin', function(e){
    const table = e.target.closest && e.target.closest('.entry-table');
    if(!table) return;
    const tr = e.target.closest('tr');
    if(activeRow && activeRow !== tr) activeRow.classList.remove('row-active');
    if(tr){ tr.classList.add('row-active'); activeRow = tr; }
  });
})();

bootApp();
</script>
</body>
</html>
